<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fisio Residência — Banco de Questões</title>
<meta name="theme-color" content="#1a1a2e">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Fisio Quiz">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  :root {
    --bg: #f0f4f8;
    --card: #ffffff;
    --primary: #0e7490;
    --primary-dark: #0a5770;
    --accent: #06b6d4;
    --correct: #16a34a;
    --wrong: #dc2626;
    --neutral: #6b7280;
    --text: #1e293b;
    --light: #e2e8f0;
    --radius: 12px;
    --shadow: 0 2px 12px rgba(0,0,0,.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* ── header ── */
  header {
    background: var(--primary);
    color: #fff;
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 10px;
    position: sticky;
    top: 0;
    z-index: 10;
    box-shadow: 0 2px 8px rgba(0,0,0,.2);
  }
  header h1 { font-size: 1.1rem; font-weight: 700; }
  .stats { display: flex; gap: 16px; font-size: .85rem; align-items: center; }
  .stat { background: rgba(255,255,255,.15); border-radius: 20px; padding: 4px 12px; }
  .stat span { font-weight: 700; }

  /* ── layout ── */
  .layout { display: grid; grid-template-columns: 260px 1fr; gap: 20px; max-width: 1100px; margin: 20px auto; padding: 0 16px; }
  @media (max-width: 768px) { .layout { grid-template-columns: 1fr; } }

  /* ── sidebar ── */
  .sidebar { display: flex; flex-direction: column; gap: 14px; }
  .panel {
    background: var(--card);
    border-radius: var(--radius);
    padding: 16px;
    box-shadow: var(--shadow);
  }
  .panel h3 { font-size: .8rem; text-transform: uppercase; letter-spacing: .05em; color: var(--neutral); margin-bottom: 10px; }
  .filter-btn {
    display: block; width: 100%; text-align: left;
    background: none; border: none; cursor: pointer;
    padding: 7px 10px; border-radius: 8px;
    font-size: .88rem; color: var(--text);
    transition: background .15s;
  }
  .filter-btn:hover { background: var(--light); }
  .filter-btn.active { background: var(--primary); color: #fff; font-weight: 600; }
  .count-badge {
    float: right; background: var(--light); border-radius: 10px;
    padding: 1px 7px; font-size: .75rem; color: var(--neutral);
  }
  .filter-btn.active .count-badge { background: rgba(255,255,255,.25); color: #fff; }

  .action-btns { display: flex; flex-direction: column; gap: 8px; }
  .btn {
    padding: 10px 16px; border-radius: 8px; border: none;
    cursor: pointer; font-size: .88rem; font-weight: 600;
    transition: all .15s; text-align: center;
  }
  .btn-primary { background: var(--primary); color: #fff; }
  .btn-primary:hover { background: var(--primary-dark); }
  .btn-outline { background: none; border: 2px solid var(--primary); color: var(--primary); }
  .btn-outline:hover { background: var(--primary); color: #fff; }

  /* score ring */
  .score-ring {
    display: flex; align-items: center; gap: 14px;
    padding: 8px 0;
  }
  svg.ring { flex-shrink: 0; }
  .ring-text { font-size: .8rem; color: var(--neutral); }
  .ring-text strong { display: block; font-size: 1.3rem; color: var(--text); }

  /* ── question card ── */
  .main { }
  .progress-bar {
    height: 6px; background: var(--light); border-radius: 3px; margin-bottom: 16px; overflow: hidden;
  }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width .3s; }

  .q-card {
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 28px;
  }
  .q-meta {
    display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap;
  }
  .tag {
    font-size: .75rem; font-weight: 600; border-radius: 20px;
    padding: 3px 10px; background: var(--light); color: var(--neutral);
  }
  .tag.area { background: #e0f2fe; color: #0369a1; }
  .tag.fonte { background: #f0fdf4; color: #166534; }

  .q-num { font-size: .8rem; color: var(--neutral); margin-bottom: 6px; }
  .q-text { font-size: .97rem; line-height: 1.7; margin-bottom: 24px; }

  .options { display: flex; flex-direction: column; gap: 10px; }
  .option {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 12px 16px; border-radius: 10px;
    border: 2px solid var(--light);
    cursor: pointer; transition: all .15s;
    font-size: .92rem; line-height: 1.5;
    text-align: left; background: none; width: 100%;
    color: var(--text);
  }
  .option:hover:not(:disabled) { border-color: var(--accent); background: #f0fdff; }
  .letter {
    flex-shrink: 0; width: 28px; height: 28px;
    border-radius: 50%; background: var(--light);
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: .85rem; color: var(--neutral);
  }
  .option.selected .letter { background: var(--primary); color: #fff; }
  .option.selected { border-color: var(--primary); background: #e0f2fe; }
  .option.correct { border-color: var(--correct); background: #f0fdf4; }
  .option.correct .letter { background: var(--correct); color: #fff; }
  .option.wrong { border-color: var(--wrong); background: #fff1f1; }
  .option.wrong .letter { background: var(--wrong); color: #fff; }
  .option:disabled { cursor: default; }

  /* self-assess */
  .assess-row {
    display: none; gap: 10px; margin-top: 20px; justify-content: center;
  }
  .assess-row.visible { display: flex; }
  .btn-correct { background: var(--correct); color: #fff; flex: 1; }
  .btn-correct:hover { background: #15803d; }
  .btn-wrong { background: var(--wrong); color: #fff; flex: 1; }
  .btn-wrong:hover { background: #b91c1c; }

  /* gabarito reveal */
  .gabarito-info {
    display: none; margin-top: 16px; padding: 12px 16px;
    background: #fefce8; border-radius: 8px; border-left: 4px solid #ca8a04;
    font-size: .9rem;
  }
  .gabarito-info.visible { display: block; }

  /* navigation */
  .nav-row {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: 24px; gap: 10px;
  }
  .nav-btn { padding: 10px 22px; }
  .nav-info { font-size: .85rem; color: var(--neutral); text-align: center; }

  /* empty state */
  .empty { text-align: center; padding: 60px 20px; color: var(--neutral); }
  .empty h2 { font-size: 1.2rem; margin-bottom: 8px; }
</style>
</head>
<body>

<header>
  <h1>🩺 Fisio Residência — Banco de Questões</h1>
  <div class="stats">
    <div class="stat">Total <span id="hTotal">0</span></div>
    <div class="stat">Respondidas <span id="hAnswered">0</span></div>
    <div class="stat">Score <span id="hScore">—</span></div>
  </div>
</header>

<div class="layout">
  <!-- sidebar -->
  <aside class="sidebar">

    <div class="panel">
      <h3>Área</h3>
      <div id="areaFilters"></div>
    </div>

    <div class="panel">
      <h3>Fonte</h3>
      <div id="fonteFilters"></div>
    </div>

    <div class="panel">
      <h3>Ações</h3>
      <div class="action-btns">
        <button class="btn btn-primary" onclick="embaralhar()">🔀 Embaralhar</button>
        <button class="btn btn-outline" onclick="resetar()">🔄 Reiniciar</button>
        <button class="btn btn-outline" onclick="filtrarErros()">❌ Ver erros</button>
      </div>
    </div>

    <div class="panel">
      <h3>Desempenho</h3>
      <div class="score-ring">
        <svg class="ring" width="64" height="64" viewBox="0 0 64 64">
          <circle cx="32" cy="32" r="26" fill="none" stroke="#e2e8f0" stroke-width="8"/>
          <circle id="ringCircle" cx="32" cy="32" r="26" fill="none"
            stroke="#0e7490" stroke-width="8" stroke-linecap="round"
            stroke-dasharray="163.4" stroke-dashoffset="163.4"
            transform="rotate(-90 32 32)"/>
        </svg>
        <div class="ring-text">
          <strong id="ringPct">—</strong>
          de acerto
        </div>
      </div>
    </div>

  </aside>

  <!-- main -->
  <main class="main">
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div id="questionArea"></div>
  </main>
</div>

<script>
// ── dados ──────────────────────────────────────────────────────────────────
const QUESTOES_RAW = [{"id": "ENR_2023_2024__AOCP__1", "numero": 1, "enunciado": "Dentre as descritas a seguir, qual das ações\ntomadas pelo profissional de saúde é considerada\na prioritária para reduzir a infecção associada ao\ncuidado em saúde?", "alternativas": {"A": "Estímulo à antibioticoterapia profilática.", "B": "Higienização das mãos dos profissionais de saúde.", "C": "Minimização de procedimentos invasivos e não invasivos.", "D": "Aumento da rotatividade da equipe de saúde entre os setores.", "E": "Adoção de mecanismos para que a falha humana não ocorra."}, "gabarito": "B", "fonte": "ENR 2023/2024 (AOCP)", "area": "Geral"}, {"id": "ENR_2023_2024__AOCP__2", "numero": 2, "enunciado": "Luciana, 24 anos, é acadêmica da residência\nmultiprofissional em saúde e foi orientada pelo\ntutor a verificar sua situação vacinal em relação a\nCovid-19. No cartão de vacina de Luciana,\nconstam 3 doses de vacina monovalente\n(Covid-19). Pelo esquema vacinal registrado,\nsabe-se que Luciana está apta a receber a dose de\nreforço bivalente, pois foi respeitado o intervalo\nde", "alternativas": {"A": "4 meses da última dose recebida.", "B": "2 meses da última dose recebida.", "C": "4 semanas da última dose recebida.", "D": "2 semanas da última dose recebida.", "E": "12 semanas da última dose recebida."}, "gabarito": "A", "fonte": "ENR 2023/2024 (AOCP)", "area": "Geral"}, {"id": "ENR_2023_2024__AOCP__3", "numero": 3, "enunciado": "É o eixo estruturante que organiza a\ndescentralização das ações e serviços de saúde\nno país e se materializa por meio da organização\ndas Redes de Atenção à Saúde – RAS – o", "alternativas": {"A": "equidade.", "B": "regionalização.", "C": "governança.", "D": "intergestão.", "E": "abrangência."}, "gabarito": "B", "fonte": "ENR 2023/2024 (AOCP)", "area": "Geral"}, {"id": "ENR_2023_2024__AOCP__4", "numero": 4, "enunciado": "A seguinte imagem ilustra os cinco tipos de\ntecnologias de gestão da clínica: as diretrizes\nclínicas, a gestão da condição de saúde, a gestão\nde caso, a auditoria clínica e a lista de espera.\nNesse contexto, é correto afirmar que, para\nalcançar seus objetivos, as diretrizes clínicas\ndevem", "alternativas": {"A": "utilizar o método de auditoria que confronta a prática real com padrões predefinidos e busca pela economia de escopo.", "B": "combinar medicina baseada em evidência, avaliação tecnológica em saúde, avaliação econômica dos serviços de saúde e garantia de qualidade.", "C": "alterar os padrões de cuidados sem causar danos aos resultados em relação aos pacientes e com menores custos.", "D": "abordar um modelo voltado ao profissional de saúde que responde a um doente por meio de procedimentos curativos, cuidadores e reabilitadores.", "E": "proporcionar os elementos fundamentais para uma participação reativa das pessoas usuárias em sua atenção, recolhendo e acolhendo seu grau de confiança."}, "gabarito": "B", "fonte": "ENR 2023/2024 (AOCP)", "area": "Neurofuncional"}, {"id": "ENR_2023_2024__AOCP__5", "numero": 5, "enunciado": "O movimento pela democratização da saúde, que\ntomou corpo no Brasil durante a segunda metade\nda década de setenta, possibilitou a formulação\ndo projeto da Reforma Sanitária Brasileira. Esse\nprocesso teve como marco institucional a", "alternativas": {"A": "8ª Conferência Nacional de Saúde.", "B": "5ª Ação Integrada de Saúde.", "C": "comissão intersetorial do SUS.", "D": "formação das caixas de aposentadorias e pensões.", "E": "Lei Eloy Chaves."}, "gabarito": "A", "fonte": "ENR 2023/2024 (AOCP)", "area": "Neurofuncional"}, {"id": "ENR_2023_2024__AOCP__6", "numero": 6, "enunciado": "Das várias abordagens adotadas na avaliação em\nsaúde, o modelo mais empregado é o de\nDonabedian (1980), de estruturação sistêmica,\nque estabelece a tríade estrutura – processo –\nresultado. Assim, é correto afirmar que se\nrelaciona à Estrutura os indicadores", "alternativas": {"A": "que expressam os reflexos das medidas implementadas na saúde da população.", "B": "que refletem a forma de atuação para avaliar e comparar as alterações nos perfis epidemiológicos de uma determinada população.", "C": "que envolvem auditoria de prontuários, supervisões periódicas e pesquisas de opinião pública.", "D": "organizacionais que indicam a existência de recursos, fluxos e protocolos.", "E": "explícitos que refletem a forma de atuação de uma equipe para garantir a qualidade do processo de prestação de serviços de acordo com padrões de excelência técnica."}, "gabarito": "D", "fonte": "ENR 2023/2024 (AOCP)", "area": "Geral"}, {"id": "ENR_2023_2024__AOCP__7", "numero": 7, "enunciado": "Maria, 32 anos e obesa, procura a Unidade de\nPronto Atendimento (UPA) devido a uma crise\nhipertensiva. Relata não fazer uso de\nmedicamentos e que, sempre que precisa de\natendimento de saúde, costuma ir diretamente à\nUPA. Após ser medicada, recebe alta e\nencaminhamento para um especialista.\nConsiderando a Rede de Atenção à Saúde das\nPessoas com Doenças Crônicas, realizar o\ndiagnóstico, o rastreamento e o tratamento da sua\npopulação adstrita de acordo com os protocolos e\nas diretrizes clínicas estabelecidas pelo Sistema\nÚnico de Saúde é uma competência de qual dos\ncomponentes da Rede?", "alternativas": {"A": "Unidades de acesso aberto.", "B": "Ambulatorial especializada.", "C": "Hospitalar.", "D": "Urgência e emergência.", "E": "Atenção Básica."}, "gabarito": "E", "fonte": "ENR 2023/2024 (AOCP)", "area": "Saúde Coletiva / SUS"}, {"id": "ENR_2023_2024__AOCP__8", "numero": 8, "enunciado": "Sobre o Conselho de Saúde, assinale a alternativa\ncorreta.", "alternativas": {"A": "É subordinado ao Poder Executivo.", "B": "É convocado a cada 4 anos para discutir as políticas de saúde.", "C": "É criado por meio de portaria específica, e sua dissolução depende de aprovação do judiciário.", "D": "É composto por pessoas de diferentes grupos da sociedade, sendo 25% delas representantes de usuários do SUS.", "E": "Tem caráter deliberativo, ou seja, toma decisões que devem ser cumpridas pelo poder público."}, "gabarito": "E", "fonte": "ENR 2023/2024 (AOCP)", "area": "Geral"}, {"id": "ENR_2023_2024__AOCP__9", "numero": 9, "enunciado": "Os acadêmicos da residência multiprofissional\ndiscutiram com a equipe de saúde do Hospital\nUniversitário a importância da assistência segura.\nPara isso, os acadêmicos listaram as\ncontribuições da segurança do paciente para a\nqualidade do cuidado de saúde, que estão\ndescritas a seguir, EXCETO", "alternativas": {"A": "ampliar a atenção nas questões colocadas pela ergonomia e pela psicologia.", "B": "chamar atenção para o impacto do erro e as consequências do dano.", "C": "disseminar situações nas quais são requeridos níveis elevados de produção e resultados.", "D": "mostrar com clareza como o cuidado de saúde pode ser danoso para os pacientes.", "E": "introduzir novas ferramentas e técnicas para a melhoria do cuidado de saúde."}, "gabarito": "C", "fonte": "ENR 2023/2024 (AOCP)", "area": "Neurofuncional"}, {"id": "ENR_2023_2024__AOCP__10", "numero": 10, "enunciado": "Após exposição a uma situação de risco para\ninfecção sexualmente transmissível, um jovem\nprocura o Centro de Testagem e Aconselhamento\n(CTA) para atendimento. Considerado um serviço\nespecial de acesso aberto, no contexto das redes\nde atenção em saúde, é correto afirmar que o CTA", "alternativas": {"A": "é um serviço de atenção terciária.", "B": "deve ser referenciado pela atenção primária.", "C": "é uma das portas de entrada do SUS.", "D": "tem acesso restrito à população LGBTQIAP+.", "E": "tem o atendimento vinculado ao cadastro nas equipes de saúde da família."}, "gabarito": "C", "fonte": "ENR 2023/2024 (AOCP)", "area": "Neurofuncional"}, {"id": "ENR_2023_2024__AOCP__11", "numero": 11, "enunciado": "Ao desenvolver atividades de Educação em Saúde\nna comunidade de Santa Luzia, visando à\nprevenção de zoonoses, um grupo de acadêmicos\nabordou, com um grupo de moradores, a questão\ndo controle vetorial do mosquito Aedes. Os\nacadêmicos deram ênfase à adoção das práticas\nde manejo ambiental, que tem como principais\natividades a proteção, a destruição ou a\ndestinação adequada de criadouros, as quais\ndevem ser executadas, prioritariamente, pelo\npróprio morador e/ou proprietário. Essa\nabordagem é relacionada ao controle", "alternativas": {"A": "químico.", "B": "mecânico.", "C": "fracionado.", "D": "biológico.", "E": "sustentável."}, "gabarito": "B", "fonte": "ENR 2023/2024 (AOCP)", "area": "Geral"}, {"id": "ENR_2023_2024__AOCP__12", "numero": 12, "enunciado": "O profissional de saúde, ao realizar um\natendimento, explica para o paciente sobre seu\ntratamento, fornecendo todas as informações\nnecessárias e lhe dá a liberdade de escolha. Ao\nadotar essa postura, o profissional está em\nconsonância com o princípio fundamental da\nBioética denominado", "alternativas": {"A": "autonomia.", "B": "reconhecimento.", "C": "empatia.", "D": "beneficência.", "E": "conhecimento."}, "gabarito": "A", "fonte": "ENR 2023/2024 (AOCP)", "area": "Saúde Coletiva / SUS"}, {"id": "ENR_2023_2024__AOCP__13", "numero": 13, "enunciado": "As ações de vigilância e controle de roedores\ndevem ser executadas, de forma temporária ou\npermanente, em área determinada (área-alvo), a\nfim de reduzir ou eliminar o risco iminente de\ntransmissão de doenças (ou a própria doença),\nem particular, a doença denominada", "alternativas": {"A": "criptococose.", "B": "febre maculosa.", "C": "giardíase.", "D": "leptospirose.", "E": "leishmaniose."}, "gabarito": "D", "fonte": "ENR 2023/2024 (AOCP)", "area": "Geral"}, {"id": "ENR_2023_2024__AOCP__14", "numero": 14, "enunciado": "Os governos, em todo o mundo, estão buscando\nsoluções inovadoras e transformadoras do\nsistema que assegurem a disponibilidade, a\nvariedade e a distribuição adequada da força de\ntrabalho de saúde. Uma das soluções mais\npromissoras reside na colaboração\ninterprofissional. Assim, como resultado da\nprática colaborativa, espera-se essencialmente", "alternativas": {"A": "compromisso com a cogestão.", "B": "estratégias inovadoras de ensino.", "C": "gestão transversal da atenção básica.", "D": "força de trabalho voltada para a clínica.", "E": "serviços de saúde de excelência."}, "gabarito": "E", "fonte": "ENR 2023/2024 (AOCP)", "area": "Saúde Coletiva / SUS"}, {"id": "ENR_2023_2024__AOCP__15", "numero": 15, "enunciado": "Entre os modelos assistenciais de atenção à\nsaúde, é uma característica da forma de\norganização do modelo de vigilância à saúde", "alternativas": {"A": "a organização hospitalocêntrica e médico-centrada.", "B": "organizar-se por modos de transmissão e fatores de risco de doenças.", "C": "as operações sobre problemas e grupos populacionais.", "D": "ser voltado principalmente para campanhas sanitárias.", "E": "ser direcionado à tecnologia médica (indivíduo)."}, "gabarito": "C", "fonte": "ENR 2023/2024 (AOCP)", "area": "Geral"}, {"id": "ENR_2023_2024__AOCP__16", "numero": 16, "enunciado": "Os profissionais da equipe de saúde da Unidade\nBásica de Saúde (UBS) Vila Mariana, durante\nreunião do Conselho Local, abordaram a\npossibilidade de modificar o horário de alguns\natendimentos. Relataram que muitos usuários\ndiziam que não conseguiam participar das\natividades de Educação em Saúde promovidas\npela equipe multiprofissional, pois, no horário da\nmanhã, muitos trabalhavam e não poderiam se\nausentar. Os profissionais, usuários e\nconselheiros conseguiram adequar um horário\ndiferenciado para melhorar a adesão da\npopulação. No caso relatado, é descrita uma das\nDiretrizes da Atenção Básica que é o", "alternativas": {"A": "consolidação do cuidado.", "B": "educação permanente.", "C": "participação da comunidade.", "D": "gestão direcionada.", "E": "cooperação da rede."}, "gabarito": "C", "fonte": "ENR 2023/2024 (AOCP)", "area": "Neurofuncional"}, {"id": "ENR_2023_2024__AOCP__17", "numero": 17, "enunciado": "São ações priorizadas pela Política Nacional de\nPromoção à Saúde, EXCETO", "alternativas": {"A": "ofertar e apoiar ações para incremento de exames periódicos e acompanhamento especializado para hipertensos e diabéticos com impacto na redução de internamentos por doenças cardiovasculares.", "B": "investir na sensibilização e capacitação dos gestores e profissionais de saúde na identificação e encaminhamento adequado de situações de violência intrafamiliar e sexual.", "C": "apoiar a restrição de acesso a bebidas alcoólicas de acordo com o perfil epidemiológico de dado território, protegendo segmentos vulneráveis e priorizando situações de violência e danos sociais.", "D": "realizar ações educativas de sensibilização da população para a promoção de “comunidades livres de tabaco”, divulgando ações relacionadas ao tabagismo e seus diferentes aspectos.", "E": "mapear e apoiar as ações de práticas corporais/atividades físicas existentes nos serviços de atenção básica e na Estratégia de Saúde da Família."}, "gabarito": "A", "fonte": "ENR 2023/2024 (AOCP)", "area": "Neurofuncional"}, {"id": "ENR_2023_2024__AOCP__18", "numero": 18, "enunciado": "Maurício é profissional de saúde e atua em uma\nUnidade Básica. Sua postura de escuta e\ncompromisso em dar respostas às necessidades\nde saúde trazidas pelo usuário, de maneira que\ninclua sua cultura, seus saberes e sua capacidade\nde avaliar riscos, é compatível com a diretriz da\nPolítica Nacional de Humanização (PNH)\nconhecida como", "alternativas": {"A": "educação em saúde.", "B": "promoção da saúde.", "C": "ambiência.", "D": "acolhimento.", "E": "intersetorialidade."}, "gabarito": "D", "fonte": "ENR 2023/2024 (AOCP)", "area": "Saúde Coletiva / SUS"}, {"id": "ENR_2023_2024__AOCP__19", "numero": 19, "enunciado": "A chegada a um município de novos moradores\ncom determinada doença aumentará a prevalência\ndessa doença. Da mesma maneira, a saída de\npessoas doentes diminuirá sua frequência, ou\nseja, sem se modificar o risco e a sobrevida pode\nhaver flutuação nos casos existentes de\ndeterminada doença em função de processos\nmigratórios. Além deste, é correto afirmar que um\ndos outros fatores que influenciam para o\naumento da prevalência de um agravo à saúde é", "alternativas": {"A": "a sazonalidade que influencia diretamente no surgimento dos agravos agudos e crônicos.", "B": "a falta de tratamento que diminui o tempo de sobrevivência, o que pode levar a uma diminuição do tempo de duração da doença.", "C": "a redução no tempo e duração dos casos que se alcança por meio da prevenção primária.", "D": "a maior frequência com que surgem casos novos (incidência).", "E": "o aumento do número de casos novos, que ocorre pela melhoria das ações de prevenção primária e secundária."}, "gabarito": "D", "fonte": "ENR 2023/2024 (AOCP)", "area": "Neurofuncional"}, {"id": "ENR_2023_2024__AOCP__20", "numero": 20, "enunciado": "Em epidemiologia, existem vários modelos para\nse representar o processo saúde-doença,\nprincipalmente quando este está associado aos\naspectos etiológicos das doenças. Analise a\nseguinte figura e assinale a alternativa que\ncorresponde ao modelo apresentado.\nFonte: adaptado de Pereira, 2013.", "alternativas": {"A": "Modelo da cadeia de eventos.", "B": "Modelo da dupla ecológica.", "C": "Modelo das causas – múltiplos efeitos.", "D": "Modelo sistêmico.", "E": "Modelo da etiologia social da doença."}, "gabarito": "B", "fonte": "ENR 2023/2024 (AOCP)", "area": "Saúde Coletiva / SUS"}, {"id": "ENR_2023_2024__AOCP__21", "numero": 21, "enunciado": "Paciente do sexo masculino apresentou dores\nconstantes em joelho esquerdo após trauma\ndireto durante jogo de futebol. Foi solicitada\nressonância nuclear magnética (RNM) de joelho,\npois a radiografia não apresentou alterações. Foi\ndetectado hipersinal em epífise distal posterior de\nfêmur, na ponderação T2 com FAT SAT. Sobre o\ncaso clínico apresentado, assinale e alternativa\ncorreta.", "alternativas": {"A": "Esse achado indica fratura de fêmur do tipo espiral.", "B": "A ponderação T2 com FAT SAT não é a mais apropriada para esse tipo de avaliação.", "C": "O achado sugere presença de edema ósseo.", "D": "Para a condição apresentada, testes específicos fisioterapêuticos poderiam ser mais assertivos no diagnóstico do paciente do que a realização do exame de imagem.", "E": "O plano em que foi detectada essa alteração na RNM foi o coronal."}, "gabarito": "C", "fonte": "ENR 2023/2024 (AOCP)", "area": "Neurofuncional"}, {"id": "ENR_2023_2024__AOCP__22", "numero": 22, "enunciado": "Paciente amputado após acidente automobilístico,\nnível transfemoral proximal, é submetido à\navaliação fisioterapêutica para iniciar o\ntratamento pré-protetização. Assinale a alternativa\nque apresenta a maior possibilidade de\nposicionamento vicioso que esse paciente pode\ndesenvolver, de acordo com o nível de amputação\napresentado.", "alternativas": {"A": "Extensão e abdução de quadril.", "B": "Extensão e adução de quadril.", "C": "Flexão e abdução de quadril.", "D": "Flexão e adução de quadril.", "E": "Adução e rotação interna de quadril."}, "gabarito": "C", "fonte": "ENR 2023/2024 (AOCP)", "area": "Geral"}, {"id": "ENR_2023_2024__AOCP__23", "numero": 23, "enunciado": "Bebê do sexo feminino, 4 meses, é levada pela\nmãe ao fisioterapeuta após alta hospitalar devido\nà bronquiolite. O fisioterapeuta detectou os\nseguintes achados na avaliação: ausculta\npulmonar com roncos difusos, sinais vitais\nestáveis e SpO2 de 93%. Em relação ao caso\nclínico apresentado, assinale a alternativa que\ncorresponde à conduta mais indicada para essa\npaciente.", "alternativas": {"A": "Técnicas de remoção de secreção.", "B": "Vibração manual torácica.", "C": "Tapotagem.", "D": "Oxigenoterapia.", "E": "ELTGol."}, "gabarito": "A", "fonte": "ENR 2023/2024 (AOCP)", "area": "Hospitalar / UTI"}, {"id": "ENR_2023_2024__AOCP__24", "numero": 24, "enunciado": "Paciente do sexo masculino, 56 anos, apresenta\nhemiparesia e espasticidade à esquerda, além\ndisso apresenta dificuldade na marcha,\ndeambulando com auxílio de andador e AFO.\nRelata que sofreu um acidente vascular encefálico\nhá 4 meses. Considerando as inúmeras\npossibilidades de técnicas fisioterapêuticas\nindicadas para esse paciente, assinale a\nalternativa que apresenta corretamente a\nabordagem fisioterapêutica mais adequada para\numa melhora temporária da alteração do tônus\napresentado pelo paciente, a fim de facilitar a\ncontinuidade do atendimento.", "alternativas": {"A": "Liberação miofascial em hemicorpo esquerdo.", "B": "Fortalecimento global com foco em quadríceps e gastrocnêmio.", "C": "Exercícios de calistenia.", "D": "Fisioterapia aquática com alongamento passivo prolongado nos membros afetados.", "E": "Alteração da órtese AFO pela SMO."}, "gabarito": "D", "fonte": "ENR 2023/2024 (AOCP)", "area": "Neurofuncional"}, {"id": "ENR_2023_2024__AOCP__25", "numero": 25, "enunciado": "Uma mãe preocupada com o diagnóstico clínico\ndo seu filho, um bebê de 7 meses, leva-o para\navaliação e intervenção fisioterapêutica. Na\navaliação, foi detectada hipotonia generalizada,\ndificuldade no controle da postura, dificuldade de\nsustentar a cabeça e dificuldade em manipular\nobjetos menores. A criança não apresenta\nnenhum histórico de complicações respiratórias.\nCom base no caso clínico apresentado, qual das\nseguintes condições é mais provável de ser a\ncausa da hipotonia muscular observada nesse\nbebê?", "alternativas": {"A": "Síndrome de West.", "B": "Paralisia cerebral espástica.", "C": "Atrofia muscular espinhal do tipo 1.", "D": "Transtorno de déficit de atenção e hiperatividade.", "E": "Síndrome de Down."}, "gabarito": "E", "fonte": "ENR 2023/2024 (AOCP)", "area": "Neurofuncional"}, {"id": "ENR_2023_2024__AOCP__26", "numero": 26, "enunciado": "A respeito do Código de Ética em fisioterapia, que\nrege e determina as regras e deveres que o\nprofissional deve adotar, assim como suas\natualizações, assinale a alternativa correta.", "alternativas": {"A": "Foi aprovado pela resolução 424, no ano de 2005, e tratou de diversos assuntos, incluindo o relacionamento do fisioterapeuta com a equipe.", "B": "Hoje, para iniciar o exercício profissional, o fisioterapeuta deve ter realizado a apresentação do trabalho de conclusão de curso da graduação em fisioterapia e portar uma declaração de conclusão de curso, até que seja emitido o CREFITO de sua região.", "C": "A atualização cadastral no respectivo conselho deve acontecer a cada 5 anos, respeitadas as regras específicas quanto ao recadastramento nacional.", "D": "O fisioterapeuta avalia sua capacidade técnica e somente aceita atribuição ou assume encargo quando capaz de desempenho seguro para o cliente/paciente/usuário, em respeito aos direitos humanos.", "E": "No capítulo III do Código de Ética aprovado pela Resolução 424, há uma publicação que permite o teleatendimento, facilitando as intervenções no período de pandemia pelo vírus Sars-Cov-2."}, "gabarito": "D", "fonte": "ENR 2023/2024 (AOCP)", "area": "Neurofuncional"}, {"id": "ENR_2023_2024__AOCP__27", "numero": 27, "enunciado": "Fisioterapeuta realiza uma avaliação domiciliar de\numa paciente idosa e viúva, 79 anos, que foi\nencaminhada por meio do serviço de atenção\nprimária do serviço público no qual a profissional\nestá alocada. A idosa relata dores fortes nas\narticulações dos membros inferiores e rigidez\nmatinal, devido a gonartrose bilateral, que\ndificulta a realização de atividades instrumentais\nde vida diária, como limpar sua casa e ir ao\nmercado. O fisioterapeuta observou que não há\nsinais inflamatórios agudos nas articulações\nacometidas. A paciente mora sozinha e tem uma\ncondição socioeconômica desfavorável. Além\ndisso, seu único filho a visita uma vez por mês\npara levar compras de mercado, entretanto muitas\nvezes ainda falta alimento, e as condições\nhigiênicas da casa são preocupantes. Com base\nnos dados apresentados, como o fisioterapeuta\npode melhorar a qualidade de vida dessa\npaciente?", "alternativas": {"A": "Encaminhando-a para um serviço privado, a fim de ter um atendimento e intervenção mais rápida e eficaz.", "B": "Orientando-a na realização de alongamentos ativos domiciliares, pois vão diminuir a dor e facilitar a realização das atividades instrumentais de vida diária.", "C": "Acionando a assistente social do seu serviço para uma visita domiciliar, e encaminhando-a para o serviço de atenção domiciliar para atendimento fisioterapêutico.", "D": "Ligando para o filho a fim de tentar estabelecer visitas com maiores frequências à sua mãe, expondo a situação em que ela se encontra e destacando que ele é o responsável legal por ela.", "E": "Encaminhando-a para uma instituição pública de longa permanência para idosos, pois ela não pode ficar sozinha nas condições em que se encontra."}, "gabarito": "C", "fonte": "ENR 2023/2024 (AOCP)", "area": "Neurofuncional"}, {"id": "ENR_2023_2024__AOCP__28", "numero": 28, "enunciado": "Idoso, 75 anos, preocupado com alterações da\nsenescência, procura fisioterapeuta para\nintervenção em promoção da saúde. Ao realizar\ntestes funcionais no paciente, o profissional\npercebe um déficit no condicionamento\ncardiorrespiratório. Sabendo da importância\ndessa variável para uma boa qualidade de vida do\nidoso, assinale a alternativa que apresenta o teste\nrealizado para identificar essa alteração no\npaciente.", "alternativas": {"A": "Espirometria.", "B": "Teste de marcha estacionária.", "C": "Teste da rampa.", "D": "Teste de romberg.", "E": "Timed Up and Go."}, "gabarito": "B", "fonte": "ENR 2023/2024 (AOCP)", "area": "Saúde Coletiva / SUS"}, {"id": "ENR_2023_2024__AOCP__29", "numero": 29, "enunciado": "Uma adolescente de 11 anos procura, pela\nprimeira vez, atendimento fisioterapêutico para\nsua condição: escoliose com um ângulo de Cobb\nde 37º detectado na radiografia. A paciente relata\ndor em coluna torácica, que piora durante o dia.\nAlém disso, a angulação vem aumentando\ndiscretamente nos últimos meses. Considerando\no caso clínico apresentado, assinale a alternativa\ncorreta.", "alternativas": {"A": "O fisioterapeuta deve associar terapias posturais ao uso da órtese colete de Milwaukee ou similar.", "B": "O fisioterapeuta deve encaminhá-la ao médico ortopedista para intervenção cirúrgica.", "C": "No momento, o fisioterapeuta deve priorizar a promoção de analgesia, independentemente da progressão da curvatura.", "D": "Deve ser realizado exercício de fortalecimento muscular, com foco em ganho de força de cadeia posterior, e alongamento de cadeia posterior.", "E": "Somente as terapias posturais são suficientes para a correção da escoliose."}, "gabarito": "A", "fonte": "ENR 2023/2024 (AOCP)", "area": "Geral"}, {"id": "ENR_2023_2024__AOCP__30", "numero": 30, "enunciado": "Paciente do sexo feminino, 32 anos, com\ndiagnóstico de espondilite anquilosante, procura\natendimento fisioterapêutico para alívio das dores\ne melhora da qualidade de vida. Ao exame físico,\no profissional detecta sinal de Volkmann positivo\ne percebe também a presença de esclerite. A\nrespeito do teste realizado no exame físico da\npaciente, assinale a alternativa que apresenta\ncorretamente o que o sinal positivo indicou.", "alternativas": {"A": "Rigidez da articulação coxofemoral.", "B": "Limitação de amplitude de movimento em coluna lombar.", "C": "Fraqueza muscular de iliopsoas.", "D": "Comprometimento da articulação sacroilíaca.", "E": "Fraqueza de abdominais inferiores."}, "gabarito": "D", "fonte": "ENR 2023/2024 (AOCP)", "area": "Neurofuncional"}, {"id": "ENR_2023_2024__AOCP__31", "numero": 31, "enunciado": "Paciente do sexo feminino, 21 anos, foi internada\nem unidade de terapia intensiva devido à queda\nde uma sobreloja, com fratura de arcos costais à\ndireita, sendo necessário colocar dreno de tórax.\nAinda se encontra em ventilação mecânica\ninvasiva via tubo orotraqueal, com sonda vesical,\nsonda nasogástrica e cateter venoso central.\nSobre os acessos da paciente, assinale a\nalternativa INCORRETA.", "alternativas": {"A": "A sonda nasogástrica utilizada pela paciente pode objetivar a drenagem de conteúdo gástrico.", "B": "A extremidade distal do tubo orotraqueal deve ser posicionada 2 centímetros acima da carina.", "C": "Devido à utilização do dreno de tórax, deve-se ter cuidado ao posicionar a paciente em DLD, para o dreno não dobrar.", "D": "A sonda vesical, também chamada de sonda de Foley, objetiva o esvaziamento da bexiga quando o paciente não consegue realizá-lo de forma espontânea.", "E": "O cateter venoso central possui sua extremidade distal localizada no ventrículo esquerdo, a fim de bombear rapidamente uma grande quantidade de medicação para todo o corpo."}, "gabarito": "E", "fonte": "ENR 2023/2024 (AOCP)", "area": "Hospitalar / UTI"}, {"id": "ENR_2023_2024__AOCP__32", "numero": 32, "enunciado": "Paciente adulto, do sexo masculino, foi internado\nem unidade de terapia intensiva após a\ndescoberta de um tumor cerebral. Foi submetido a\ncirurgia neurológica e, no momento,\nencontrava-se com monitorização de pressão\nintracraniana (PIC), além de estar sedado,\nintubado e em ventilação mecânica invasiva. O\nfisioterapeuta começou a mobilizar o paciente no\nleito e observou que a PIC começou a se elevar.\nAssinale a alternativa que apresenta corretamente\no valor de PIC que, quando atingido, o\nfisioterapeuta deve interromper sua intervenção a\nfim de normalizar essa pressão.", "alternativas": {"A": "Acima de 5 mmHg.", "B": "Acima de 10 mmHg.", "C": "Acima de 20 mmHg.", "D": "Acima de 30 mmHg.", "E": "Acima de 60 mmHg."}, "gabarito": "D", "fonte": "ENR 2023/2024 (AOCP)", "area": "Hospitalar / UTI"}, {"id": "ENR_2023_2024__AOCP__33", "numero": 33, "enunciado": "Sobre a atuação fisioterapêutica nas políticas\npúblicas de saúde, assinale a alternativa correta.", "alternativas": {"A": "Programas de fisioterapia geralmente são financiados exclusivamente por organizações privadas, tendo pouca relação com políticas públicas.", "B": "Apenas os fisioterapeutas autônomos podem se beneficiar das políticas públicas, enquanto aqueles que trabalham em hospitais públicos não têm acesso a esses recursos, já que são serviços terceirizados.", "C": "O programa eMulti retoma, inova e fortalece o cuidado multiprofissional na Atenção Primária, a partir da experiência do Nasf, que era parte estruturante do SUS. O fisioterapeuta é parte integrante desse programa.", "D": "O programa eMulti existe desde 1986, porém foi colocado em prática no ano de 2022.", "E": "A inclusão do fisioterapeuta no atendimento integral de pacientes no serviço público de saúde é exclusiva para a população idosa, já que esta intervenção aumenta a resolubilidade dos casos e a prevenção de incapacidades, tendo em vista o aumento da expectativa de vida e aumento exponencial dessa população."}, "gabarito": "C", "fonte": "ENR 2023/2024 (AOCP)", "area": "Saúde Coletiva / SUS"}, {"id": "ENR_2023_2024__AOCP__34", "numero": 34, "enunciado": "Um paciente de 70 anos foi internado em Unidade\nde Terapia Intensiva (UTI) devido a infecção\nurinária grave que evoluiu para insuficiência\nrespiratória. Além disso, o paciente possui\ndiagnóstico de sarcopenia. Ele necessitou de\nventilação mecânica invasiva para suporte\nventilatório e, durante o período de ventilação\nmecânica, apresentou dificuldade em sincronizar\nseus esforços respiratórios com o ciclo do\nventilador, resultando em desconforto. A\nmonitorização mostrou depressão na curva de\npressão que não gera disparo do ciclo\nrespiratório. Assinale a alternativa que apresenta\ncorretamente a assincronia respiratória mais\nprovável desse paciente.", "alternativas": {"A": "Disparo ineficaz.", "B": "Multidisparos.", "C": "Autodisparo.", "D": "Fluxo insuficiente.", "E": "Duplo disparo."}, "gabarito": "A", "fonte": "ENR 2023/2024 (AOCP)", "area": "Hospitalar / UTI"}, {"id": "ENR_2023_2024__AOCP__35", "numero": 35, "enunciado": "Trabalho em equipe é aquele em que profissionais\ncom diferentes habilidades, talentos e\nexperiências reúnem-se para compartilhar um\npropósito. Sobre o trabalho em equipe, analise as\nassertivas e assinale a alternativa que aponta a(s)\ncorreta(s).\nI. Pode-se definir e exemplificar como sendo\numa equipe multidisciplinar: diversos\nprofissionais de diferentes áreas da saúde\nque se reúnem esporadicamente para discutir\na respeito de um paciente em comum.\nII. Na equipe interdisciplinar, os profissionais da\nsaúde tratam isoladamente os pacientes, não\nhavendo comunicação entre eles.\nIII. A equipe transdisciplinar encoraja não\napenas a comunicação, mas o tratamento\ncruzado entre as disciplinas, como, por\nexemplo, profissionais reunidos para\ndiscussão de políticas em saúde com\nprofissionais da área da saúde, políticos,\nsociólogos e filósofos.", "alternativas": {"A": "I, II e III.", "B": "Apenas I.", "C": "Apenas II.", "D": "Apenas III.", "E": "Apenas I e III."}, "gabarito": "D", "fonte": "ENR 2023/2024 (AOCP)", "area": "Geral"}, {"id": "ENR_2023_2024__AOCP__36", "numero": 36, "enunciado": "Um atleta de salto em distância de 20 anos\nprocura o fisioterapeuta relatando dor na região\npatelar do joelho direito, que se intensifica\ndurante atividades esportivas envolvendo corrida,\nsaltos e agachamentos. A avaliação inicial sugere\nque ele pode estar sofrendo de tendinopatia\npatelar. Dentre as alternativas a seguir, qual\napresenta uma abordagem correta para avaliação\ne tratamento desse atleta?", "alternativas": {"A": "Realizar uma radiografia para avaliar a anatomia do joelho e prescrever repouso esportivo por 2 semanas.", "B": "Realizar um teste de ressonância magnética para confirmar o diagnóstico e prescrever fitoterápicos e crioterapia para o alívio da dor.", "C": "Realizar o teste de Thompson e aplicar terapia com gelo no local da dor.", "D": "Realizar o teste de Salto unipodal (hop test) e prescrever um programa de exercícios de fortalecimento excêntrico do bíceps femoral.", "E": "Avaliar as alterações biomecânicas que podem estar sendo a causa da condição, e tratar com base nas alterações detectadas."}, "gabarito": "E", "fonte": "ENR 2023/2024 (AOCP)", "area": "Musculoesquelética"}, {"id": "ENR_2023_2024__AOCP__37", "numero": 37, "enunciado": "Uma jogadora de vôlei de 32 anos comparece ao\nconsultório de fisioterapia após sofrer uma queda\nsobre o braço direito no último jogo. Ela relata dor\nprofunda no ombro, principalmente durante o\nmovimento. O fisioterapeuta realizou o teste de\nO'Brien, que positivou. A respeito desse caso\nclínico, assinale a alternativa que apresenta a\npossível condição da paciente.", "alternativas": {"A": "Lesão do manguito rotador.", "B": "Rompimento de tendão do bíceps braquial.", "C": "Bursite subacromnial.", "D": "Lesão do plexo braquial.", "E": "Lesão SLAP."}, "gabarito": "E", "fonte": "ENR 2023/2024 (AOCP)", "area": "Neurofuncional"}, {"id": "ENR_2023_2024__AOCP__38", "numero": 38, "enunciado": "Paciente do sexo masculino, 62 anos, fumante\ncrônico, com antecedentes de hipertensão arterial\ne diabetes mellitus tipo 2, apresenta-se à\nemergência com febre, tosse, dispneia, dor no\npeito e produção de escarro purulento nos\núltimos três dias. Pressão Arterial: 140/90 mmHg,\nnormocárdico, taquipneico (26 irpm), temperatura\nde 38,5ºC e SpO2 de 86% em ar ambiente.\nApresenta, ainda, desconforto respiratório, e\nausculta pulmonar revela murmúrio vesicular\ndiminuído globalmente com roncos difusos. Em\ntomografia de tórax, observa-se consolidação\nmultifocal bilateral nas bases pulmonares, com\náreas de broncograma aéreo.\nFoi medicado e encaminhado para enfermaria. No\nmomento, encontra-se normotérmico, com\nmelhora do padrão respiratório, frequência\nrespiratória de 19 irpm, SpO2 de 90% em ar\nambiente, e as demais variáveis mantiveram-se\ncomo estavam na emergência. Considerando o\ncaso clínico, assinale a alternativa que apresenta\ncorretamente a melhor intervenção\nfisioterapêutica.", "alternativas": {"A": "Realizar técnicas de remoção de secreção, como o ELTGol.", "B": "Fazer implementação de oxigenoterapia via cânula nasal.", "C": "Realizar técnicas de reexpansão pulmonar.", "D": "Sugerir instalação de via aérea avançada, devido à gravidade do caso.", "E": "Realizar aspiração de vias aéreas a fim de gerar desobstrução brônquica."}, "gabarito": "A", "fonte": "ENR 2023/2024 (AOCP)", "area": "Hospitalar / UTI"}, {"id": "ENR_2023_2024__AOCP__39", "numero": 39, "enunciado": "Paciente de sexo feminino, 65 anos, foi admitida\nna Unidade de Terapia Intensiva (UTI) após ter\nsofrido um Infarto Agudo do Miocárdio (IAM)\nextenso. Foi submetida a uma cirurgia de\nrevascularização miocárdica (ponte de safena)\ncom sucesso. Atualmente, está no primeiro dia de\npós-operatório, SpO2 de 93% em oxigenoterapia\nvia máscara de venturi a 50%. Sinais vitais\nestáveis e ausculta pulmonar com murmúrio\nvesicular diminuído bilateralmente, sem ruídos\nadventícios. Apresenta troponina sérica elevada,\nhemograma normal e gasometria arterial com\nacidose respiratória descompensada.\nConsiderando o caso clínico, assinale a\nalternativa que apresenta uma conduta apropriada\npara essa paciente.", "alternativas": {"A": "Estimulação costal para reexpansão pulmonar.", "B": "Realização de incentivador inspiratório alinear a fluxo.", "C": "Instalação de BIPAP intermitente.", "D": "Oscilação oral de alta frequência.", "E": "Freno labial."}, "gabarito": "C", "fonte": "ENR 2023/2024 (AOCP)", "area": "Hospitalar / UTI"}, {"id": "ENR_2023_2024__AOCP__40", "numero": 40, "enunciado": "Paciente do sexo masculino, 75 anos, é\nsubmetido à consulta fisioterapêutica para iniciar\ntratamento de doença crônica. Ele possui\ndiagnóstico de insuficiência mitral, enfisema\npulmonar e sarcopenia. Encontra-se com sinais\nvitais estáveis e SpO2 satisfatória em ar ambiente.\nRadiografia de tórax mostra hiperinsuflação\npulmonar difusa e áreas de hipertransparência. O\nfisioterapeuta realizou a espirometria,\nmanovacuometria e ausculta pulmonar desse\npaciente. Assinale a alternativa que corresponde à\ncondição que possivelmente o paciente NÃO\napresentou na avaliação fisioterapêutica.", "alternativas": {"A": "VEF1 reduzido.", "B": "PI max acima do valor de normalidade.", "C": "Índice de Tiffeneau reduzido.", "D": "PE max diminuída.", "E": "Ausculta pulmonar com murmúrio vesicular diminuído."}, "gabarito": "B", "fonte": "ENR 2023/2024 (AOCP)", "area": "Hospitalar / UTI"}, {"id": "ENR_2023_2024__AOCP__41", "numero": 41, "enunciado": "A Distrofia Muscular de Duchenne (DMD) é uma\ndoença genética rara, caracterizada por uma\ndegeneração progressiva dos músculos. Como\nresultado, os pacientes com DMD experimentam\nfraqueza muscular progressiva que afeta a\nmobilidade, a função cardíaca e a função\nrespiratória. A fisioterapia desempenha um papel\nfundamental no manejo da DMD, ajudando a\nmelhorar a qualidade de vida dos pacientes e a\nmaximizar sua função física. Em relação a essa\ncondição que tem forte atuação fisioterapêutica,\nassinale a alternativa correta.", "alternativas": {"A": "É causada por mutações no gene SMN1.", "B": "Afeta principalmente o sexo feminino.", "C": "Caracteriza-se por uma perda progressiva muscular no sentido crânio caudal.", "D": "Os primeiros sinais começam a aparecer na infância, como dificuldade de andar, andar na ponta dos pés e presença do sinal de Gowers.", "E": "Ao iniciar-se a fisioterapia precocemente, o paciente pode ter uma expectativa normal, sem comprometimento motor na vida adulta."}, "gabarito": "D", "fonte": "ENR 2023/2024 (AOCP)", "area": "Geral"}, {"id": "ENR_2023_2024__AOCP__42", "numero": 42, "enunciado": "O pneumotórax é uma condição patológica que se\ncaracteriza pela presença de ar entre as duas\ncamadas da pleura, que podem resultar em\ncolapso parcial ou total do pulmão. Os sintomas\nincluem dificuldade respiratória e dor torácica.\nDiante disso, assinale a alternativa que apresenta\ncorretamente uma das alterações vistas em\ntomografia computadorizada de tórax nessa\ncondição.", "alternativas": {"A": "Reforço da trama vascular em área afetada.", "B": "Hiperdensidade na área afetada, com possibilidade de desvio do mediastino ipsilateral.", "C": "Hipodensidade na área acometida, com possibilidade de desvio do mediastino contralateral.", "D": "Presença de broncograma aéreo na área afetada.", "E": "Presença de vidro fosco na área afetada."}, "gabarito": "C", "fonte": "ENR 2023/2024 (AOCP)", "area": "Neurofuncional"}, {"id": "ENR_2023_2024__AOCP__43", "numero": 43, "enunciado": "A gasometria arterial é um exame que mede os\nníveis de gases no sangue arterial, incluindo o\noxigênio (O2) e o dióxido de carbono (CO2), bem\ncomo o pH do sangue. Esse exame é de extrema\nimportância no diagnóstico e no manejo de\ndoenças respiratórias por várias razões, sendo\nindispensável o fisioterapeuta saber interpretá-lo.\nUm paciente que apresenta uma gasometria com\npH de 7,28; PaCO2 de 58 mmHg; HCO3 de 25 mEq,\nPaO2 de 95 mmHg e BE de 0, apresenta qual\ndistúrbio hemogasométrico primário?", "alternativas": {"A": "Acidose respiratória.", "B": "Alcalose metabólica.", "C": "Acidose metabólica.", "D": "Alcalose respiratória.", "E": "Alcalose mista."}, "gabarito": "A", "fonte": "ENR 2023/2024 (AOCP)", "area": "Neurofuncional"}, {"id": "ENR_2023_2024__AOCP__44", "numero": 44, "enunciado": "O fisioterapeuta tem uma importante participação\nna ventilação mecânica invasiva do paciente,\nauxiliando na sua condução, desde o preparo e\najuste do ventilador artificial no início da\nventilação, evolução do paciente durante a\nventilação mecânica, desmame do suporte\nventilatório, até a extubação. Sabendo da\nimportância do conhecimento desses ajustes,\nsupõe-se que um paciente esteja na modalidade\nVCV (Ventilação por Volume Controlado), com\nfrequência respiratória de 15 irpm, fazendo uma\nrelação de 1:3. Qual seria o tempo inspiratório do\npaciente?", "alternativas": {"A": "0,8 segundos.", "B": "0,9 segundos.", "C": "1 segundo.", "D": "1,2 segundos.", "E": "1,4 segundos."}, "gabarito": "C", "fonte": "ENR 2023/2024 (AOCP)", "area": "Hospitalar / UTI"}, {"id": "ENR_2023_2024__AOCP__45", "numero": 45, "enunciado": "A Paralisia Braquial Obstétrica (PBO) é uma\ncondição neuromuscular que ocorre em\nrecém-nascidos como resultado de lesões nos\nnervos braquiais. Essas lesões podem ocorrer\ndurante o parto, quando há tração excessiva ou\ncompressão do plexo braquial. Considerando a\nPBO, analise as assertivas e assinale a alternativa\nque aponta a(s) correta(s).\nI. A prevalência de PBO é maior em\nrecém-nascidos com características de\nmacrossomia.\nII. O prognóstico é determinado pelo exame de\neletroneuromiografia, que localiza e\ndetermina a intensidade da lesão, sendo que\nas do tipo neurotmese são as de prognóstico\nmais favorável.\nIII. A fisioterapia atua evitando as posturas\nviciosas e tendências a deformidades através\nda cinesioterapia pediátrica. Além disso,\norienta os posicionamentos corretos aos pais\ne/ou cuidadores.", "alternativas": {"A": "Apenas I e II.", "B": "Apenas II e III.", "C": "Apenas I.", "D": "Apenas III.", "E": "Apenas I e III."}, "gabarito": "E", "fonte": "ENR 2023/2024 (AOCP)", "area": "Neurofuncional"}, {"id": "ENR_2023_2024__AOCP__46", "numero": 46, "enunciado": "Paciente do sexo masculino, 28 anos, deu entrada\nem unidade de terapia intensiva devido à\nintoxicação exógena, com rebaixamento do nível\nde consciência, que evoluiu para necessidade de\nventilação mecânica invasiva. Possui 1,60 m de\naltura e não apresenta nenhuma doença de base.\nApós 2 horas do início da ventilação mecânica\ninvasiva, uma gasometria arterial coletada revelou\num laudo de acidose metabólica. Paciente\nencontra-se com os sinais vitais estáveis e SpO2\nsatisfatória, em parâmetros ventilatórios mínimos,\nsem drive respiratório. Há diversas possibilidades\nde ajustes na ventilação mecânica invasiva desse\npaciente, desde que a biomecânica e a ventilação\nprotetora estejam bem estabelecidas. Sendo\nassim, assinale a alternativa que apresenta um\najuste ventilatório que NÃO seria recomendado\npara esse paciente.", "alternativas": {"A": "Ajustar volume corrente na faixa de 410 ml.", "B": "Aumentar a frequência respiratória a fim de compensar a alteração gasométrica detectada.", "C": "Ajustar FiO2 de acordo com a SpO2 desejada.", "D": "Ajustar tempo inspiratório de 1,1 segundo.", "E": "Ajustar PEEP de 5 cm H2O."}, "gabarito": "B", "fonte": "ENR 2023/2024 (AOCP)", "area": "Hospitalar / UTI"}, {"id": "ENR_2023_2024__AOCP__47", "numero": 47, "enunciado": "Um paciente com SDRA grave é um desafio para a\nequipe de saúde quando se trata de ventilação\nmecânica, pois apresenta-se com a complacência\npulmonar restrita e possui altos riscos de ser\nvítima de lesão induzida pela ventilação mecânica.\nSendo assim, assinale a alternativa que apresenta\ncorretamente um item importante a ser calculado\nna ventilação mecânica desse paciente, que é um\ndos principais indicadores de risco de ele estar\nsofrendo injúria pulmonar.", "alternativas": {"A": "Pressão de pico.", "B": "Pico de fluxo.", "C": "Auto PEEP.", "D": "Driving pressure.", "E": "Pendelluft."}, "gabarito": "D", "fonte": "ENR 2023/2024 (AOCP)", "area": "Hospitalar / UTI"}, {"id": "ENR_2023_2024__AOCP__48", "numero": 48, "enunciado": "A artrite gotosa, também conhecida como gota, é\numa condição reumática que pode ser resultante\nde níveis elevados de ácido úrico no sangue.\nDevido à intensidade da dor apresentada nas\nfases de agudização da doença pelos pacientes\nafetados, é de extrema importância conhecê-la\npara uma intervenção fisioterapêutica adequada.\nSobre a artrite gotosa, assinale a alternativa\ncorreta.", "alternativas": {"A": "É contraindicada a terapia através do gelo nas áreas afetadas, já que estas podem acelerar a cristalização dos monouratos de sódio.", "B": "Por tratar-se de uma doença com períodos de exacerbação relativamente curtos, não desenvolve degeneração articular importante.", "C": "Acomete, principalmente, o esqueleto axial, sendo que essa informação auxilia no diagnóstico diferencial de doenças como artrite reumatoide e osteoartrite.", "D": "A podagra, inflamação da articulação metatarsofalângica do hálux, é um sinal comum no estágio inicial da doença.", "E": "O principal recurso fisioterapêutico utilizado nessa condição é a eletroterapia, já que a dor intensa não permite que o paciente consiga realizar exercícios de impacto."}, "gabarito": "D", "fonte": "ENR 2023/2024 (AOCP)", "area": "Musculoesquelética"}, {"id": "ENR_2023_2024__AOCP__49", "numero": 49, "enunciado": "Apesar de seu tamanho relativamente pequeno, o\nmúsculo piriforme desempenha um papel\nsignificativo na biomecânica dos membros\ninferiores. Sendo assim, assinale a alternativa que\napresenta sua origem e inserção,\nrespectivamente.", "alternativas": {"A": "Superfície anterior do sacro / trocanter maior do fêmur.", "B": "Borda externa do forame obturado / tuberosidade isquiática.", "C": "Linha púbica / superfície posterior do sacro.", "D": "Linha glútea inferior / crista obturatória.", "E": "Incisura isquiática menor / linha intertrocantérica."}, "gabarito": "A", "fonte": "ENR 2023/2024 (AOCP)", "area": "Neurofuncional"}, {"id": "ENR_2023_2024__AOCP__50", "numero": 50, "enunciado": "Teste ortopédico que objetiva avaliar as\narticulações do quadril, realizado com o paciente\nem decúbito dorsal. Terapeuta posiciona um\nmembro inferior do paciente em flexão, abdução e\nrotação externa de quadril, fazendo uma\ncompressão na região medial do joelho que foi\nposicionado, a outra mão do terapeuta deve\nestabilizar a espinha ilíaca anterossuperior\ncontralateral.\nO enunciado refere-se ao", "alternativas": {"A": "teste de Trendelenburg.", "B": "teste de Lachman.", "C": "teste de Patrik-Fabere.", "D": "teste de McMurray.", "E": "teste de Ely."}, "gabarito": "C", "fonte": "ENR 2023/2024 (AOCP)", "area": "Musculoesquelética"}, {"id": "ENR_2023_2024__AOCP__51", "numero": 51, "enunciado": "Sobre a aspiração de vias aéreas e a avaliação da\nexpectoração e características do muco\napresentados por um paciente, assinale a\nalternativa correta.", "alternativas": {"A": "A secreção purulenta indica que o fisioterapeuta deve instilar soro durante a aspiração para fluidificá-la.", "B": "A presença de secreção mucoide indica que não há necessidade de técnicas de remoção de secreção, já que não estão infectadas.", "C": "Na inspeção da expectoração, deve-se identificar a quantidade, viscosidade e temperatura da secreção.", "D": "O fato de o paciente apresentar secreção hemática significa que possui um déficit na cascata de coagulação.", "E": "É contraindicada temporariamente, ou deve ser analisada com muito critério, a necessidade de aspiração de vias aéreas em pacientes que apresentam contagem de plaquetas abaixo de 30000 mm3."}, "gabarito": "E", "fonte": "ENR 2023/2024 (AOCP)", "area": "Geral"}, {"id": "ENR_2023_2024__AOCP__52", "numero": 52, "enunciado": "A Resolução nº 501, do Conselho Federal de\nFisioterapia e Terapia Ocupacional (Coffito), foi\npublicada no dia 25 de janeiro, reconhecendo a\natuação do fisioterapeuta em unidade de\nemergência. Desse modo, a resolução assegura\nmais um espaço de atuação para o profissional.\nAlém disso, o Ministério da Saúde também\noferece respaldo à presença do fisioterapeuta\nnessas unidades. O texto reconhece a atuação do\nfisioterapeuta e também aponta que esses\nprofissionais devem ser capacitados em Suporte\nBásico de Vida e Suporte Avançado de Vida\nCardiovascular em Adultos (ACLS). Sabendo da\nimportância da atuação do fisioterapeuta nesse\nâmbito, assinale a alternativa que apresenta\nquantas compressões torácicas devem ser\nrealizadas em uma parada cardiorrespiratória.", "alternativas": {"A": "No mínimo 60.", "B": "Entre 100 a 120.", "C": "No mínimo 80.", "D": "Entre 60 a 100.", "E": "Entre 120 e 150."}, "gabarito": "B", "fonte": "ENR 2023/2024 (AOCP)", "area": "Geral"}, {"id": "ENR_2023_2024__AOCP__53", "numero": 53, "enunciado": "A fibromialgia é uma condição caracterizada por\ndor generalizada, fadiga, distúrbios do sono e\nsensibilidade aumentada em pontos específicos\ndo corpo. Não tem uma causa única bem definida,\nmas acredita-se que envolva anormalidades no\nprocessamento da dor pelo sistema nervoso\ncentral. O tratamento da fibromialgia é\nmultifacetado, sendo que a fisioterapia\ndesempenha um papel importante no manejo da\ndoença. É importante que o fisioterapeuta avalie e\nreavalie o paciente para acompanhar o\ntratamento, e uma das formas de realizá-lo é\naplicar o questionário “Fibromyalgia Impact\nQuestionnaire” (FIQ) que foi validado para língua\nportuguesa. Sobre esse instrumento, assinale a\nalternativa correta.", "alternativas": {"A": "Sua versão completa avalia as regiões do corpo em que o paciente sente mais dor, compostas por 13 áreas no total.", "B": "Quanto maior o valor, melhor a qualidade de vida.", "C": "Sua pontuação é resultante da soma total de 10 perguntas, sendo que cada resposta “sim” soma 2 pontos, “não” = 0 ponto e “às vezes” soma 1 ponto.", "D": "É composto por 10 itens que avaliam a capacidade funcional, profissional, sintomas físicos e psicológicos.", "E": "O valor máximo é de 20 pontos."}, "gabarito": "D", "fonte": "ENR 2023/2024 (AOCP)", "area": "Cardiorrespiratória"}, {"id": "ENR_2023_2024__AOCP__54", "numero": 54, "enunciado": "As alavancas biomecânicas são conceitos\nfundamentais na fisioterapia e na compreensão\ndos movimentos e forças envolvidos no corpo\nhumano. Elas desempenham um papel importante\nna análise e no tratamento de lesões\nmusculoesqueléticas. Assinale a alternativa que\napresenta corretamente a alavanca que possui\nmaior vantagem mecânica no corpo humano.", "alternativas": {"A": "Alavanca interfixa.", "B": "Alavanca de primeira classe.", "C": "Alavanca de segunda classe.", "D": "Alavanca de terceira classe.", "E": "Alavanca interpotente."}, "gabarito": "C", "fonte": "ENR 2023/2024 (AOCP)", "area": "Musculoesquelética"}, {"id": "ENR_2023_2024__AOCP__55", "numero": 55, "enunciado": "A utilização da fisioterapia instrumental na\ncinesioterapia respiratória auxilia nos resultados\nque podem ser obtidos em nossa intervenção.\nSendo assim, assinale a alternativa que apresenta\num incentivador que tem como principal objetivo\nmelhorar a força muscular respiratória.", "alternativas": {"A": "CliniFLO®.", "B": "Voldyne®.", "C": "Triflo®.", "D": "Shaker®.", "E": "Threshold® IMT."}, "gabarito": "E", "fonte": "ENR 2023/2024 (AOCP)", "area": "Geral"}, {"id": "ENR_2023_2024__AOCP__56", "numero": 56, "enunciado": "Um jovem de 21 anos pulou em uma cachoeira e\nnão sabia que, onde executou o salto, a\nprofundidade era extremamente rasa, sofrendo\numa lesão medular a nível de T9. Após 3 meses\ndo incidente e acompanhamento com equipe\ninterdisciplinar, foi definido que o paciente\napresenta um quadro de paraplegia. Assinale a\nalternativa que apresenta corretamente a órtese\nque seria melhor indicada para esse paciente,\npara alcançar uma deambulação terapêutica.", "alternativas": {"A": "AFO.", "B": "HKAFO.", "C": "Tutor curto.", "D": "Forrester-Brown.", "E": "Atlanta brace."}, "gabarito": "B", "fonte": "ENR 2023/2024 (AOCP)", "area": "Neurofuncional"}, {"id": "ENR_2023_2024__AOCP__57", "numero": 57, "enunciado": "O conhecimento da fisiologia do sistema\nmuscular pelo fisioterapeuta é de extrema\nimportância para a profissão, tendo em vista que\nhá diversas condições que afetam esse sistema,\ncomo, por exemplo, lesões musculares no meio\nesportivo. Nesse sentido, a respeito dos\nmúsculos estriados esqueléticos, assinale a\nalternativa INCORRETA.", "alternativas": {"A": "A camada mais externa que envolve o músculo é denominada endomísio.", "B": "O ventre muscular é formado por fascículos envolvidos em uma camada de tecido conjuntivo, denominado perimísio.", "C": "O tendão é uma estrutura formada por tecido conjuntivo denso modelado que une os músculos estriados esqueléticos aos ossos.", "D": "O diafragma é considerado um músculo estriado esquelético.", "E": "O perimísio e o epimísio são revestimentos desses músculos, sendo que o perimísio é uma camada mais profunda quando comparada ao epimísio."}, "gabarito": "A", "fonte": "ENR 2023/2024 (AOCP)", "area": "Geral"}, {"id": "ENR_2023_2024__AOCP__58", "numero": 58, "enunciado": "A Disfunção Temporomandibular (DTM) refere-se\na um grupo de condições que afetam a articulação\ntemporomandibular, os músculos da mastigação\ne as estruturas associadas à mandíbula e ao\ncrânio. Essas condições podem causar dor,\nlimitação da abertura da boca, crepitações na\narticulação e outros sintomas relacionados à\nmandíbula. A fisioterapia desempenha um papel\nimportante no tratamento da DTM, ajudando a\naliviar a dor, melhorar a função da mandíbula e\npromover a qualidade de vida dos pacientes.\nSabendo da importância do conhecimento pelo\nfisioterapeuta de todas as estruturas que\nenvolvem essa articulação, assinale a alternativa\nque apresenta corretamente uma ação muscular\ndo pterigóideo lateral, quando contraído\nsimultaneamente e bilateralmente.", "alternativas": {"A": "Lateralização da mandíbula.", "B": "Retrusão da mandíbula.", "C": "Protrusão da mandíbula.", "D": "Abertura da boca.", "E": "Estabilização da ATM."}, "gabarito": "C", "fonte": "ENR 2023/2024 (AOCP)", "area": "Geral"}, {"id": "ENR_2023_2024__AOCP__59", "numero": 59, "enunciado": "Paciente do sexo feminino, 65 anos, obesa,\ntabagista de longa data, apresentou rebaixamento\ndo nível de consciência no domicílio, sendo\nacionado o serviço de emergência. Foi levada\ndiretamente para uma unidade de terapia\nintensiva ao chegar no hospital, e logo foi\nintubada e colocada em ventilação mecânica\ninvasiva, devido às complicações que apresentou.\nAo ser direcionada ao seu leito de UTI, o\nfisioterapeuta faz uma rápida avaliação e detecta\nas seguintes informações: paciente em ventilação\nmecânica invasiva via tubo orotraqueal e\nausculta pulmonar assimétrica, diminuída em\nhemitórax esquerdo, sem ruídos adventícios,\nsinais vitais estáveis e saturação periférica de\noxigênio em 89%. Tendo em vista as informações\napresentadas, sobre a ventilação mecânica e via\naérea da paciente, assinale a alternativa correta.", "alternativas": {"A": "O fisioterapeuta deve utilizar uma frequência respiratória baixa com volumes correntes elevados (10 ml/kg).", "B": "O fisioterapeuta deve avaliar a possibilidade de uma intubação seletiva e aplicar uma estratégia ventilatória protetora.", "C": "O fisioterapeuta deve introduzir o tubo orotraqueal de 1 a 2 centímetros.", "D": "O fisioterapeuta deve realizar manobras de recrutamento alveolar frequentes para melhorar a oxigenação.", "E": "O fisioterapeuta deve manter pressão de CUFF entre 50 e 55 mmHg."}, "gabarito": "B", "fonte": "ENR 2023/2024 (AOCP)", "area": "Hospitalar / UTI"}, {"id": "ENR_2023_2024__AOCP__60", "numero": 60, "enunciado": "Paciente do sexo masculino, 28 anos, internado\nem enfermaria hospitalar por pós-operatório de\nretirada de nódulo carcinogênico em pulmão\nesquerdo. Após avaliação fisioterapêutica, foram\nregistrados os sinais vitais, sendo que o paciente\napresentava-se eupneico, taquicárdico e\nnormotenso. Assinale a alternativa que apresenta\ncorretamente o possível valor em que se\nencontrava um dos sinais vitais desse paciente.", "alternativas": {"A": "Frequência cardíaca de 132 bpm.", "B": "Frequência respiratória de 28 irpm.", "C": "Pressão arterial de 145/95 mmHg.", "D": "Frequência cardíaca de 48 bpm.", "E": "Frequência respiratória de 10 irpm."}, "gabarito": "A", "fonte": "ENR 2023/2024 (AOCP)", "area": "Cardiorrespiratória"}, {"id": "ENR_FGV_2024_2025_Tipo_1_1", "numero": 1, "enunciado": "O Inamps se constituía como a política pública de saúde que\nvigorava antes da criação do SUS e foi extinto pela lei federal\n8.689, em 1993.\n(Fonte: https://www.epsjv.fiocruz.br/instituto-nacional-de-assistencia-medica-da-\nprevidencia-social-inamps)\nSobre o Instituto Nacional de Assistência Médica da Previdência\nSocial (INAMPS), avalie as afirmativas e assinale (V) para a\nverdadeira e (F) para a falsa.\n( ) Modelo previdenciário contribuitivo hospitalocêntrico,\ninclusivo e priorizava a atenção básica à saúde.\n( ) Modelo universal de saúde responsável pela melhoria nos\nindicadores de saúde, como o de mortalidade infantil.\n( ) Modelo de gestão que reduziu os custos médico-hospitalares\ndevido ao maior controle orçamentário em saúde.\nAs afirmativas são, respectivamente,", "alternativas": {"A": "V – V – F.", "B": "F – F – V.", "C": "V – F – F.", "D": "F – V – V.", "E": "F – V – F."}, "gabarito": "C", "fonte": "ENR FGV 2024/2025 Tipo 1", "area": "Neurofuncional"}, {"id": "ENR_FGV_2024_2025_Tipo_1_2", "numero": 2, "enunciado": "A respeito da 8ª Conferência Nacional de Saúde, realizada em\nBrasília, no ano de 1986, assinale a afirmativa correta.", "alternativas": {"A": "Estabeleceu um marco histórico, mas ainda sem participação popular.", "B": "Propôs a criação de um sistema de saúde público e de um privado, independentes.", "C": "Criou o arcabouço do SUS e a Comissão Nacional da Reforma Sanitária (CNRS).", "D": "Teve como tema central efetivando o SUS – acesso, qualidade e humanização na atenção à saúde com controle social.", "E": "Criou o Sistema Nacional de Vigilância Epidemiológica."}, "gabarito": "C", "fonte": "ENR FGV 2024/2025 Tipo 1", "area": "Saúde Coletiva / SUS"}, {"id": "ENR_FGV_2024_2025_Tipo_1_3", "numero": 3, "enunciado": "O Decreto nº 7.508/2011, como figura jurídica que dará\nconcretude a cada ente federado frente aos compromissos\ncomuns, instituiu", "alternativas": {"A": "a alocação dos recursos do Fundo Nacional de Saúde (FNS).", "B": "o Contrato Organizativo da Ação Pública da Saúde (COAP).", "C": "o Pacto pela Saúde em defesa do SUS, pela vida e pela gestão.", "D": "os percentuais mínimos a serem investidos nas ações e serviços de saúde.", "E": "a participação direta e indireta de capital externo na assistência à saúde."}, "gabarito": "B", "fonte": "ENR FGV 2024/2025 Tipo 1", "area": "Neurofuncional"}, {"id": "ENR_FGV_2024_2025_Tipo_1_4", "numero": 4, "enunciado": "Segundo o Art. 3º da Portaria de Consolidação nº 3/2017 do\nMinistério da Saúde, temos como Rede Temática de Atenção\nà Saúde, a", "alternativas": {"A": "Rede de Atenção às Urgências e Emergências (RUE).", "B": "Rede Nacional de Prevenção da Violência e Promoção da Saúde (RNPVS).", "C": "Rede Nacional de Atenção Integral da Saúde do Trabalhador (RAIST).", "D": "Rede Brasileira de Avaliação de Tecnologias em Saúde (Rebrats).", "E": "Rede Nacional de Vigilância Epidemiológica Hospitalar (Renaveh)."}, "gabarito": "A", "fonte": "ENR FGV 2024/2025 Tipo 1", "area": "Saúde Coletiva / SUS"}, {"id": "ENR_FGV_2024_2025_Tipo_1_5", "numero": 5, "enunciado": "Segundo a Portaria de Consolidação nº 3/2017 do Ministério da\nSaúde, a Rede de Atenção à Saúde (RAS) é definida como arranjos\norganizativos de ações e serviços de saúde, de diferentes\ndensidades tecnológicas, que integradas por meio de sistemas de\napoio técnico, logístico e de gestão, buscam garantir a\nintegralidade do cuidado.\n(Fonte: https://bvsms.saude.gov.br/bvs/saudelegis/\ngm/2017/prc0003_03_10_2017.html#CAPITULOI)\nA esse respeito, analise as afirmativas a seguir.\nI. Nem todos os pontos de atenção à saúde são importantes\npara que os objetivos da rede de atenção à saúde sejam\ncumpridos.\nII. Os pontos de atenção à saúde espaços em que se ofertam\ndeterminados serviços de saúde, por meio de uma produção\nsingular.\nIII. Um dos objetivos da RAS é promover a integração sistêmica\nde ações e serviços de saúde com provisão de atenção\ncontínua, integral, de qualidade, responsável e humanizada.\nEstá correto o que se afirma em", "alternativas": {"A": "I, apenas.", "B": "II, apenas.", "C": "I e II, apenas.", "D": "I e III, apenas.", "E": "II e III, apenas."}, "gabarito": "E", "fonte": "ENR FGV 2024/2025 Tipo 1", "area": "Geral"}, {"id": "ENR_FGV_2024_2025_Tipo_1_6", "numero": 6, "enunciado": "A Equipe do Núcleo de Saúde da Família e Atenção Básica\n(NASF-AB), como competência específica, deve", "alternativas": {"A": "planejar, estrategicamente, a implantação das Unidades Básicas de Saúde.", "B": "formar equipes multidisciplinares, a partir de indicações do Ministério da Saúde.", "C": "participar do planejamento conjunto com as equipes que atuam na Atenção Básica a que estão vinculadas.", "D": "ser responsável pela composição da equipe multiprofissional, definindo os profissionais e a carga horária da equipe.", "E": "atuar de forma integrada à Rede de Atenção à Saúde a partir de normativas do Conselho Nacional de Saúde."}, "gabarito": "C", "fonte": "ENR FGV 2024/2025 Tipo 1", "area": "Neurofuncional"}, {"id": "ENR_FGV_2024_2025_Tipo_1_7", "numero": 7, "enunciado": "Segundo a Política Nacional de Atenção Básica (PNAB), uma\nUnidade Básica de Saúde (UBS), em relação à infraestrutura e à\nambiência, deve\nI. estar adequada ao quantitativo de população adscrita e suas\nespecificidades.\nII. considerar a densidade demográfica, perfil da população e as\nações e serviços de saúde a serem realizados.\nIII. ter pontos de apoio para o atendimento de populações\ndispersas (rurais, ribeirinhas, assentamentos etc.).\nEstá correto o que se afirma em", "alternativas": {"A": "I, apenas.", "B": "II, apenas.", "C": "I e II, apenas.", "D": "II e III, apenas.", "E": "I, II e III."}, "gabarito": "E", "fonte": "ENR FGV 2024/2025 Tipo 1", "area": "Saúde Coletiva / SUS"}, {"id": "ENR_FGV_2024_2025_Tipo_1_8", "numero": 8, "enunciado": "Segundo a Portaria nº 198/2004, que institui a Política Nacional\nde Educação Permanente em Saúde como estratégia do Sistema\nÚnico de Saúde para a formação e o desenvolvimento de\ntrabalhadores para o setor, a condução locorregional da Política\nNacional de Educação Permanente em Saúde será efetivada\nmediante um Colegiado de Gestão configurado como polo de\neducação permanente em saúde para o SUS com as funções de\nI. identificar necessidades de formação e de desenvolvimento\ndos trabalhadores de saúde e construir estratégias e\nprocessos que qualifiquem a atenção e a gestão em saúde e\nfortaleçam o controle social no setor na perspectiva de\nproduzir impacto positivo sobre a saúde individual e coletiva;\nII. mobilizar a formação de gestores de sistemas, ações e\nserviços para a integração da rede de atenção como cadeia\nde cuidados progressivos à saúde (rede única de atenção\nintercomplementar e de acesso ao conjunto das necessidades\nde saúde individuais e coletivas);\nIII. articular e estimular a transformação das práticas de saúde e\nde educação na saúde no conjunto do SUS e das instituições\nde ensino, tendo em vista a implementação das diretrizes\ncurriculares nacionais para o conjunto dos cursos da área da\nsaúde e a transformação de toda a rede de serviços e de\ngestão em rede-escola.\nEstá correto o que se afirma em", "alternativas": {"A": "I, apenas.", "B": "II, apenas.", "C": "I e II, apenas.", "D": "II e III, apenas.", "E": "I, II e III."}, "gabarito": "E", "fonte": "ENR FGV 2024/2025 Tipo 1", "area": "Saúde Coletiva / SUS"}, {"id": "ENR_FGV_2024_2025_Tipo_1_9", "numero": 9, "enunciado": "Assinale a opção que indica o princípio da Política Nacional de\nHumanização que visa ao aumento do grau de comunicação intra\ne intergrupos e à transformação dos modos de relação e de\ncomunicação entre os sujeitos implicados nos processos de\nprodução de saúde.", "alternativas": {"A": "Pluralidade.", "B": "Diversidade.", "C": "Verticalidade.", "D": "Transversalidade.", "E": "Heterogeneidade."}, "gabarito": "D", "fonte": "ENR FGV 2024/2025 Tipo 1", "area": "Saúde Coletiva / SUS"}, {"id": "ENR_FGV_2024_2025_Tipo_1_10", "numero": 10, "enunciado": "Assinale a opção que indica a finalidade primordial da Política\nNacional de Saúde da Pessoa Idosa, Portaria nº 2.528/GM de\n2006.", "alternativas": {"A": "Garantir a permanência de portadores de doenças que necessitem de assistência médica ou de enfermagem permanente, em instituições asilares de caráter social.", "B": "Recuperar, manter e promover a autonomia e a independência dos indivíduos idosos, direcionando medidas coletivas e individuais de saúde.", "C": "Priorizar o controle e a prevenção de agravos de doenças crônicas não-transmissíveis em idosos.", "D": "Garantir o acesso de idosos aos sistemas de saúde, em especial à centros especializados de Geriatria.", "E": "Prover assistência multidisciplinar ao idoso, visto que a incapacidade funcional e as limitações físicas, cognitivas e sensoriais são consequências inevitáveis do envelhecimento."}, "gabarito": "B", "fonte": "ENR FGV 2024/2025 Tipo 1", "area": "Cardiorrespiratória"}, {"id": "ENR_FGV_2024_2025_Tipo_1_11", "numero": 11, "enunciado": "Em relação à humanização no âmbito do SUS, assinale a\nafirmativa correta.", "alternativas": {"A": "Trata-se de um programa que atravessa as diferentes ações e instâncias gestoras do SUS.", "B": "Enfatiza a idealização do “homem” na construção de um sentido positivo.", "C": "Oferece um eixo articulador das práticas em saúde, destacando o aspecto subjetivo nelas presente.", "D": "Constrói trocas solidárias e comprometidas com a estrita tarefa de produção de saúde.", "E": "São ações voltadas aos sujeitos de sua ação, ou seja, seus usuários."}, "gabarito": "C", "fonte": "ENR FGV 2024/2025 Tipo 1", "area": "Saúde Coletiva / SUS"}, {"id": "ENR_FGV_2024_2025_Tipo_1_12", "numero": 12, "enunciado": "Assinale a opção que, segundo a Resolução nº 588/2018 do\nConselho Nacional de Saúde (CNS), apresenta a definição de\nvigilância em saúde.", "alternativas": {"A": "Processo contínuo e sistemático de coleta, consolidação, análise de dados e disseminação de informações sobre eventos relacionados à saúde, visando ao planejamento e à implementação de medidas de Saúde Pública.", "B": "Ações que propiciam o conhecimento e a investigação diagnóstica de doenças e agravos e a verificação da qualidade de produtos de interesse de saúde pública e do padrão de conformidade de amostras ambientais.", "C": "Promoção da saúde como parte da integralidade do cuidado na Rede de Atenção à Saúde, articuladas com as demais redes de proteção social, abrangendo atividades voltadas para adoção de práticas sociais e de saúde centradas na equidade, na participação e no controle social.", "D": "Ações de monitoramento contínuo da situação de saúde da população do País, Estado, Região, Município ou áreas de abrangência de equipes de atenção à saúde, por estudos e análises que identifiquem e expliquem problemas de saúde e o comportamento dos principais indicadores de saúde.", "E": "Conjunto articulado de ações e serviços preventivos e curativos, individuais e coletivos, exigidos para cada caso em todos os níveis de complexidade do sistema."}, "gabarito": "A", "fonte": "ENR FGV 2024/2025 Tipo 1", "area": "Saúde Coletiva / SUS"}, {"id": "ENR_FGV_2024_2025_Tipo_1_13", "numero": 13, "enunciado": "O Art. 16 da Resolução nº 588/2018 do Conselho Nacional de\nSaúde (CNS), estabelece que o financiamento das ações da\nvigilância em saúde, é garantido de forma", "alternativas": {"A": "autônoma, apenas pelo município.", "B": "dual, pelas esferas estadual e municipal.", "C": "unívoca, apenas na esfera federal.", "D": "recíproca, pelos estados e pela União.", "E": "tripartite, pelas esferas federal, estadual e municipal."}, "gabarito": "E", "fonte": "ENR FGV 2024/2025 Tipo 1", "area": "Neurofuncional"}, {"id": "ENR_FGV_2024_2025_Tipo_1_14", "numero": 14, "enunciado": "As opções a seguir apresentam princípios da chamada Bioética\nPrincipialista, à exceção de uma. Assinale-a.", "alternativas": {"A": "Autonomia.", "B": "Integralidade.", "C": "Não-maleficiência.", "D": "Beneficência.", "E": "Justiça."}, "gabarito": "B", "fonte": "ENR FGV 2024/2025 Tipo 1", "area": "Saúde Coletiva / SUS"}, {"id": "ENR_FGV_2024_2025_Tipo_1_15", "numero": 15, "enunciado": "A Portaria nº 837/2014 estabelece que a Equipe de Saúde da\nPopulação Ribeirinha (eSFR) será composta por, no mínimo,", "alternativas": {"A": "dois médicos, preferencialmente da especialidade de Família e Comunidade; um enfermeiro, preferencialmente especialista em Saúde da Família; um microscopista; e dois agentes de saúde.", "B": "um médico, preferencialmente da especialidade de Família e Comunidade; um enfermeiro, preferencialmente especialista em Saúde da Família; e um auxiliar ou técnico de enfermagem.", "C": "um médico, preferencialmente da especialidade de Família e Comunidade; um enfermeiro, preferencialmente especialista em Saúde da Família; um cirurgião dentista, especialista em Saúde da Família; e um auxiliar ou técnico de enfermagem.", "D": "um médico, preferencialmente da especialidade de Família e Comunidade; um enfermeiro, preferencialmente especialista em Saúde da Família; um cirurgião dentista, especialista em Saúde da Família; e quatro agentes de saúde.", "E": "um médico, preferencialmente da especialidade de Família e Comunidade; um enfermeiro, preferencialmente especialista em Saúde da Família; um cirurgião dentista, especialista em Saúde da Família; um técnico ou auxiliar em saúde bucal; e dois auxiliares ou técnicos de enfermagem."}, "gabarito": "B", "fonte": "ENR FGV 2024/2025 Tipo 1", "area": "Saúde Coletiva / SUS"}, {"id": "ENR_FGV_2024_2025_Tipo_1_16", "numero": 16, "enunciado": "A estratégia Consultório na Rua foi instituída pela Política\nNacional de Atenção Básica, em 2011, e visa ampliar o acesso da\npopulação em situação de rua aos serviços de saúde.\nTodas as ações realizadas pelas equipes de Consultório na Rua\n(eCR) devem ser registradas na(o)", "alternativas": {"A": "Rede Nacional de Dados em Saúde (RNDS).", "B": "Agência Nacional de Vigilância Sanitária (ANVISA).", "C": "Sistema de Informação de Agravos de Notificação (Sinan).", "D": "Sistema de Informação em Saúde para Atenção Básica (Sisab).", "E": "Sistema de Dados de Populações Vulneráveis (SDPV)."}, "gabarito": "D", "fonte": "ENR FGV 2024/2025 Tipo 1", "area": "Neurofuncional"}, {"id": "ENR_FGV_2024_2025_Tipo_1_17", "numero": 17, "enunciado": "Segundo a Norma Regulamentadora de Segurança e Saúde no\nTrabalho em Estabeleciment
