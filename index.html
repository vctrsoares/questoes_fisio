ndo levar a morte precoce na adolescência tardia se não for\nadequadamente acompanhada. A partir dessas premissas são recomendações no tratamento fisioterapêutico da\nDMD:", "alternativas": {"A": "estimular o fortalecimento muscular com exercícios funcionais, promovendo treinos de alta intensidade no solo intercalados por exercícios excêntricos", "B": "evitar atividades com exercícios funcionais submáximos, com treinos de alta intensidade no solo e na piscina, precedidos de exercícios excêntricos", "C": "retardar a degeneração progressiva com atividades funcionais de alta intensidade, intercaladas de exercícios passivos e exercícios excêntricos", "D": "estimular atividades com exercícios funcionais submáximos, atividades funcionais na piscina, evitar treinos de alta intensidade e exercícios excêntricos"}, "gabarito": "D", "fonte": "UFRJ 2021-2022", "area": "Neurofuncional"}, {"id": "UFRJ_2021_2022_37", "numero": 37, "enunciado": "Criança prematura com 6 anos de idade cronológica foi avaliada para tratamento em Fisioterapia por\napresentar alterações no desenvolvimento motor. O exame do desenvolvimento demonstrou uma criança\ninteressada e comunicativa que apresentava importante retardo motor: apresenta bom controle de cabeça em\nsupino e prono, se interessa e manipula objetos com liberdade; rola sem dissociação de cinturas, sendo esta sua\nprincipal forma de locomoção no ambiente; arrasta-se em prono tracionando-se com os membros superiores, sem\na participação dos membros inferiores. Seu equilíbrio sentado é precário para idade, demonstrando cifose\nexacerbada e grande instabilidade, quando apoiado consegue usar os membros superiores para brincar. Não\nalcança nem permanece na postura de pé sem auxílio, quando colocado, necessita dos braços para se manter,\ntenta dar passos, mas observa-se intensa extensão, adução e rotação interna de membros inferiores, chegando a\ncruzá-los (movimento em tesoura). Na avaliação do tônus evidenciou Ashworth grau 3 em membros inferiores e\ngrau 1 em membros superiores. Já evidencia limitação para flexão dorsal no tornozelo (equinovaro). De acordo\ncom o quadro motor descrito e o Sistema de Classificação da Função Motora Grossa (GMFCS) pode-se\nclassificar a criança como paralisia cerebral na forma: 11", "alternativas": {"A": "quadriplégica espástica, GMFCS", "B": "diplégica espástica, GMFCS", "C": "hemiplégica espástica, GMFCS", "D": "diplégica discinética, GMFCS"}, "gabarito": "B", "fonte": "UFRJ 2021-2022", "area": "Neurofuncional"}, {"id": "UFRJ_2021_2022_39", "numero": 39, "enunciado": "A bronquiolite viral aguda cursa com um quadro inflamatório agudo, é muito comum em alguns meses do ano\ne pode ser potencialmente grave em lactentes. Pode-se afirmar que são características da doença:", "alternativas": {"A": "II, III", "B": "III", "C": "I e IV", "D": "I, II, IV"}, "gabarito": "A", "fonte": "UFRJ 2021-2022", "area": "Geral"}, {"id": "UFRJ_2021_2022_41", "numero": 41, "enunciado": "Homem, politraumatizado em decorrência de acidente de moto, deu entrada na emergência com\nrebaixamento do nível de consciência, Glasgow: 7 (O - 1, V - 2, M - 4), pupilas anisocóricas, fotorreagentes,\nreflexo córneo palpebral reduzido e insuficiência respiratória, precisando ser submetido a intubação endotraqueal\ne encaminhado para o centro cirúrgico para drenagem de hematoma cerebral. No momento, encontra-se sedado\ncom Fentanil a 4 ml/h + Dormonid a 10 ml/h, RASS – 4. Pupilas isocóricas e mióticas. Em ventilação mecânica\ninvasiva no modo controlado a pressão (PCV) = 10 cmH O, PEEP: 6 cmH O e FiO : 40%, saturando a 97%.\n2 2 2\nDreno torácico a esquerda (borbulha e oscila). Hemodinamicamente controlado com Noradrenalina a 2 ml/h.\nPanturrilhas livres, sem sinais de TVP. De acordo com a última avaliação do paciente pode-se afirmar que:", "alternativas": {"A": "I, II e III", "B": "I, IV e V", "C": "I, II e IV", "D": "II, III e V"}, "gabarito": "B", "fonte": "UFRJ 2021-2022", "area": "Hospitalar / UTI"}, {"id": "UFRJ_2021_2022_43", "numero": 43, "enunciado": "Homem, 40 anos, hipertenso, diabético, dislipidêmico e obeso, foi encaminhado à Unidade Pós-\noperatória imediatamente após uma cirurgia de gastroplastia. Afebril, leucócitos: 10.000 mm3, PCR: 3, balanço\nhídrico +150 ml. No momento, encontra-se sob efeito residual de sedação, em RASS – 3, estável\nhemodinamicamente. Bem adaptado a ventilação mecânica invasiva, no modo de ventilação controlada a volume\n(VCV), com os seguintes parâmetros ventilatórios: VC: = 550 ml, PEEP = 8 cmH O, FR = 16 irpm,\n2\nrelação inspiração:expiração = 1:2, pressão de pico = 28 cmH O, pressão de platô = 25 cmH O e FiO : 0,4. Pode-\n2 2 2\nse afirmar que os valores de complacência dinâmica e estática do sistema respiratório, respectivamente, e a\ndevida justificatica são:", "alternativas": {"A": "27,5 ml/cmH O; 32,4 ml/cmH O; ambos os valores estão reduzidos pois o paciente apresenta aumento da 2 2 elastância da parede torácica provocada pela obesidade", "B": "0,056 cmH O/ml; 0,034 cmH O/ml; ambos os valores estão reduzidos pois o paciente apresenta aumento da 2 2 elastância da parede torácica provocada pela obesidade", "C": "17,9 ml/cmH O; 20 ml/cmH O; ambos os valores estão reduzidos pois o paciente apresenta redução da 2 2 complacência da parede torácica provocada pela obesidade", "D": "27,5 ml/cmH O; 32,4 ml/cmH O; ambos os valores estão reduzidos pois o paciente apresenta aumento da 2 2 complacência da parede torácica provocada pela obesidade"}, "gabarito": "A", "fonte": "UFRJ 2021-2022", "area": "Hospitalar / UTI"}, {"id": "UFRJ_2021_2022_44", "numero": 44, "enunciado": "O reconhecimento e o tratamento fisioterapêutico da exacerbação aguda da Doença Pulmonar Obstrutiva\nCrônica (DPOC) devem ser realizados o mais breve possível. Nesse sentido, considere o seguinte caso clínico:\nLFM, 70 anos de idade, com DPOC de longa duração, é internado no hospital, e o exame físico revela diminuição\nbilateral dos sons respiratórios, sem a presença de sibilos. A gasometria arterial realizada em ar ambiente\napresenta: PaO = 48 mmHg / PCO = 67 mmHg / pH = 7,30 / HCO = 30 mEq/L. O distúrbio gasométrico\n2 2 3\napresentado pelo paciente e o tratamento fisioterapêutico mais adequado são:", "alternativas": {"A": "atelectasia total do pulmão esquerdo – realizar técnicas expansivas", "B": "pneumotórax - realizar técnicas expansivas", "C": "pneumotórax – oxigenoterapia", "D": "hidropneumotórax– não deve ser realizado tratamento fisioterapêutico neste momento"}, "gabarito": "D", "fonte": "UFRJ 2021-2022", "area": "Hospitalar / UTI"}, {"id": "UFRJ_2021_2022_46", "numero": 46, "enunciado": "Sobre a fase I da reabilitação cardíaca pode-se afirmar que:", "alternativas": {"A": "as atividades nessa fase devem ter intensidades equivalentes a consumo de oxigênio (VO2) de aproximadamente 7 a 14 mLO2/kg/min", "B": "deve ser iniciada tão logo o paciente entre em ventilação mecânica e objetiva a extubação do paciente", "C": "não deve ser iniciada enquanto o paciente estiver na unidade coronariana", "D": "deve ser supervisionada pela equipe multidisciplinar e não se deve sentar com o paciente nesta fase"}, "gabarito": "A", "fonte": "UFRJ 2021-2022", "area": "Hospitalar / UTI"}, {"id": "UFRJ_2021_2022_47", "numero": 47, "enunciado": "O exercício físico crônico é capaz de induzir as seguintes adaptações em pacientes com doenças\ncardiovasculares:", "alternativas": {"A": "dentre os efeitos agudos temos o aumento do diâmetro lateral da caixa torácica e abdômen e pressão venosa central", "B": "como efeitos crônicos destacam-se o aumento da vascularidade do miocárdio e redução das enzimas oxidativa no músculo", "C": "dentre os efeitos agudos são considerados o aumento da complacência pulmonar, redução do volume de ejeção e frequência cardíaca", "D": "como efeitos crônicos observam-se bradicardia induzida pelo exercício, redução da ventilação minuto submáxima e hipertrofia cardíaca"}, "gabarito": "D", "fonte": "UFRJ 2021-2022", "area": "Hospitalar / UTI"}, {"id": "UFRJ_2021_2022_48", "numero": 48, "enunciado": "A pressão positiva não-invasiva contínua nas vias aéreas para o tratamento do edema agudo de pulmão\ncardiogênico é eficaz por:", "alternativas": {"A": "aumentar a pós-carga do ventrículo esquerdo", "B": "aumentar a pré-carga do ventrículo esquerdo", "C": "reduzir a pós-carga do ventrículo direito", "D": "reduzir a pós-carga do ventrículo esquerdo"}, "gabarito": "D", "fonte": "UFRJ 2021-2022", "area": "Hospitalar / UTI"}, {"id": "UFRJ_2021_2022_49", "numero": 49, "enunciado": "A fase II do programa de Reabilitação Cardíaca consiste na fase ambulatorial. Essa fase inicia-se no\nmomento da alta hospitalar e, geralmente, perdura por 6 a 8 semanas. A abordagem fisioterapêutica na fase II\nbaseia-se em um programa de condicionamento físico onde a intensidade, frequência e duração do treinamento\ndeveriam ser prescritos de acordo com testes para avaliação da capacidade funcional do indivíduo. Pode-se\nafirmar que o método é mais confiável e reprodutível para avaliar a capacidade de reserva funcional e prescrição\ndo exercício físico na reabilitação destes pacientes é:", "alternativas": {"A": "teste de esforço máximo", "B": "teste de caminhada de seis minutos", "C": "teste cardiopulmonar de exercício", "D": "shuttle walking test"}, "gabarito": "C", "fonte": "UFRJ 2021-2022", "area": "Cardiorrespiratória"}, {"id": "UFRJ_2021_2022_50", "numero": 50, "enunciado": "Pode-se afirmar que as fases do Programa de Reabilitação Cardíaca são:", "alternativas": {"A": "fase I – hospitalar; fase II – ambulatorial supervisionada; fase III – ambulatorial não supervisionada", "B": "fase I – hospitalar e ambulatorial, ambas supervisionadas; fase II – ambulatorial supervisionada; fase III – ambulatorial pós fase II supervisionada", "C": "fase I – pacientes ainda em ventilação mecânica; fase II – hospitalar supervisionada; fase III – ambulatorial não supervisionada", "D": "fase I – hospitalar; fase II – ambulatorial supervisionada; fase III – ambulatorial pós fase II e supervisionada; fase IV – supervisionada ou não supervisionada com objetivo de manutenção da aptidão física"}, "gabarito": "D", "fonte": "UFRJ 2021-2022", "area": "Hospitalar / UTI"}, {"id": "UFRJ_2023_2024_2", "numero": 2, "enunciado": "Um hospital público de média complexidade está organizando a sua estrutura para melhor atender aos\nprincípios do Sistema Único de Saúde (SUS), conforme definidos na Lei nº 8.080/1990. Para tal, o diretor do hospital\nestá revisando as áreas de atuação e Diagnóstico e Terapêutico. O diretor deseja garantir que esse serviço esteja de acordo com as disposições da\nreferida lei. No último trimestre, o Apoio Diagnóstico e Terapêutico do hospital realizou um grande número de\nexames laboratoriais, de imagem e procedimentos terapêuticos. Isso contribuiu para a identificação precoce de\ndiversas doenças e para a escolha de tratamentos adequados. O serviço também tem se destacado pela agilidade\nna entrega de resultados, contribuindo para a rápida tomada de decisões médicas. Neste contexto, com base no\nexposto e na Lei nº 8.080/1990. Pode-se afirmar que o serviço de Apoio Diagnóstico e Terapêutico:", "alternativas": {"A": "é uma prerrogativa exclusiva dos hospitais de alta complexidade, não sendo pertinente a hospitais de média complexidade", "B": "não é uma responsabilidade dos hospitais públicos e deve ser privatizado para melhorar sua eficiência", "C": "deve ser restrito aos casos de urgência e emergência, não sendo aplicável a situações de rotina", "D": "deve ser integrado às redes de atenção à saúde e à Atenção Primária, conforme as necessidades regionais"}, "gabarito": "D", "fonte": "UFRJ 2023-2024", "area": "Neurofuncional"}, {"id": "UFRJ_2023_2024_3", "numero": 3, "enunciado": "Um profissional de saúde recém-formado foi designado para atuar em um Centro de Atenção Psicossocial\n(CAPS) na rede de atenção psicossocial do Sistema Único de Saúde (SUS). Ele se deparou com um paciente com\ntranstorno mental grave que apresenta episódios frequentes de agressividade e comportamento autodestrutivo. O\nprofissional identificou a necessidade de intervenções específicas para o manejo desse paciente e buscou\norientação nos princípios e diretrizes estabelecidos na Lei nº 8.080/1990. Sendo assim, pode-se afirmar que com\nbase na referida Lei, o princípio que orienta a organização dos serviços de saúde, incluindo o atendimento ao\npaciente descrito no caso, é a:", "alternativas": {"A": "integralidade", "B": "descentralização", "C": "universalidade", "D": "equidade"}, "gabarito": "A", "fonte": "UFRJ 2023-2024", "area": "Geral"}, {"id": "UFRJ_2023_2024_4", "numero": 4, "enunciado": "João, com histórico de diabetes mellitus tipo 2 frequenta regularmente uma Unidade Básica de Saúde (UBS)\npara o acompanhamento de sua condição de saúde. Durante uma reunião do Conselho Municipal de Saúde, ele\nexpressou preocupação com a falta de medicamentos essenciais para o controle de sua doença na UBS, o que\nestá comprometendo seu tratamento e bem-estar. João questionou a participação da comunidade na gestão do\nSistema Único de Saúde (SUS) e sua influência na alocação de recursos financeiros. Pode-se afirmar que:", "alternativas": {"A": "João está correto em sua preocupação, uma vez que a Lei nº 8.142/1990 assegura a participação da comunidade na gestão do SUS", "B": "a participação da comunidade na gestão do SUS é restrita a profissionais de saúde e gestores públicos", "C": "João não possui direito a participar da gestão do SUS, uma vez que é um paciente comum em tratamento", "D": "a participação da comunidade na gestão do SUS é opcional e não tem impacto direto na alocação de recursos financeiros"}, "gabarito": "A", "fonte": "UFRJ 2023-2024", "area": "Saúde Coletiva / SUS"}, {"id": "UFRJ_2023_2024_5", "numero": 5, "enunciado": "Em uma reunião da comissão gestora de uma Unidade Básica de Saúde (UBS), um grupo de moradores da 5\ncomunidade apresenta uma proposta de ampliação dos serviços de atenção à saúde mental na UBS, devido ao\ncrescente número de casos de transtornos mentais na região. Eles alegam que a ausência de serviços\nespecializados tem impactado negativamente a qualidade de vida dos moradores. A equipe de saúde da UBS\nconsidera a proposta válida, porém, surgem dúvidas sobre a viabilidade financeira e as etapas necessárias para a\nimplementação. Com base no exposto, pode-se afirmar que a:", "alternativas": {"A": "UBS deve realizar reuniões com a comunidade para debater a proposta, levando em conta a participação popular e a gestão democrática", "B": "implementação da proposta de ampliação dos serviços de saúde mental na UBS deve ser realizada sem considerar a opinião dos moradores", "C": "comissão gestora da UBS deve rejeitar a proposta dos moradores, uma vez que a lei não prevê participação da comunidade na gestão da saúde", "D": "proposta dos moradores deve ser encaminhada diretamente ao Ministério da Saúde, sem a necessidade de análise ou discussão local"}, "gabarito": "A", "fonte": "UFRJ 2023-2024", "area": "Saúde Coletiva / SUS"}, {"id": "UFRJ_2023_2024_6", "numero": 6, "enunciado": "Com relação às responsabilidades e atribuições relacionadas à Política Nacional De Saúde Integral de Lésbicas,\nGays, Bissexuais, Travestis e Transexuais (LGBT), compete ao Ministério da Saúde:", "alternativas": {"A": "conduzir os processos de pactuação sobre a temática LGBT no âmbito da Comissão Intergestores Tripartite (CIT)", "B": "conduzir os processos de pactuação sobre a temática LGBT na Comissão Intergestores Bipartite (CIB)", "C": "coordenar, monitorar e avaliar a implementação desta Política Nacional de Saúde Integral LGBT, na esfera estadual, garantindo apoio técnico aos Municípios", "D": "estimular a representação da população LGBT nos Conselhos Estadual e Municipal de Saúde e nas Conferências de Saúde"}, "gabarito": "A", "fonte": "UFRJ 2023-2024", "area": "Saúde Coletiva / SUS"}, {"id": "UFRJ_2023_2024_7", "numero": 7, "enunciado": "Lucas, 35 anos, identifica-se como homem trans e procura atendimento em uma clínica de saúde da família\npara discutir a possibilidade de iniciar a terapia hormonal para a transição de gênero. Durante a consulta, expressa\npreocupações sobre os possíveis efeitos colaterais da terapia hormonal e como isso pode afetar sua saúde geral.\nEle também está interessado em receber informações sobre os cuidados de saúde específicos para pessoas trans.\nCom base no exposto, pode-se afirmar que o profissional de saúde deve:", "alternativas": {"A": "orientar Lucas a não realizar a terapia hormonal, uma vez que os possíveis efeitos colaterais são graves, uma vez que ele expressou preocupações na transição de gênero", "B": "prescrever a terapia hormonal para Lucas sem maiores questionamentos, uma vez que ele expressou interesse na transição de gênero, independentemente de suas preocupações", "C": "indicar a Lucas a realização de cirurgia de redesignação sexual como alternativa à terapia hormonal, encaminhá-lo a um psicólogo e a um psiquiatra independente de suas preocupações", "D": "oferecer informações completas e precisas sobre os riscos e benefícios da terapia hormonal, respeitando a autonomia de Lucas na tomada de decisões"}, "gabarito": "D", "fonte": "UFRJ 2023-2024", "area": "Geral"}, {"id": "UFRJ_2023_2024_8", "numero": 8, "enunciado": "Mulher, 30 anos, negra, procura atendimento em uma Unidade Básica de Saúde (UBS) com sintomas de\ncansaço constante, palidez, tontura e falta de ar. Durante a consulta, menciona que teve um sangramento menstrual\nintenso no último ciclo. Ela relata que seu pai tem histórico de anemia falciforme. O profissional de saúde da UBS\ninicia a avaliação e decide observar nos manuais e protocolos, as particularidades deste tipo de anemia. Pode-se\nafirmar que o profissional de saúde deve:", "alternativas": {"A": "considerar a etnia da paciente como um fator relevante para a avaliação da sua saúde, levando em conta as particularidades de saúde da população negra, incluindo a predisposição para a anemia falciforme", "B": "considerar a etnia da paciente apenas como um dado histórico, sem influência no possível diagnóstico, na propedêutica e nas possibilidades de tratamento", "C": "descartar o histórico de anemia falciforme da família de paciente, uma vez que a condição já foi comum em pessoas negras, devido a adaptação para sobrevivência a malária, hoje não mais", "D": "considerar a etnia da paciente como fator não relevante para a avaliação da sua saúde, uma vez que a anemia falciforme é uma condição hereditária que não está relacionada à sua origem étnica"}, "gabarito": "A", "fonte": "UFRJ 2023-2024", "area": "Neurofuncional"}, {"id": "UFRJ_2023_2024_9", "numero": 9, "enunciado": "\"A Política Nacional de Saúde Integral da População Negra tem como objetivo a redução das desigualdades\nétnico-raciais no acesso, atendimento e qualidade da assistência à saúde, por meio da promoção da equidade, da\nhumanização e da valorização da diversidade cultural. A população negra apresenta maior vulnerabilidade a\ndeterminadas doenças e agravos, sendo necessário o reconhecimento das suas especificidades e a adoção de\nações afirmativas para garantir o seu pleno acesso aos serviços de saúde.\" Com base no texto acima, pode-se\nafirmar que a:", "alternativas": {"A": "população negra é alvo de ações afirmativas visando ao pleno acesso aos serviços de saúde, considerando suas especificidades e a redução das desigualdades étnico-raciais", "B": "população negra não apresenta nenhuma vulnerabilidade a determinadas doenças e agravos, sendo a sua saúde equivalente à população branca", "C": "identificação das especificidades da população negra não é relevante para a promoção da equidade na assistência à saúde", "D": "Política Nacional de Saúde Integral da População Negra tem como objetivo excluir a população branca dos serviços de saúde, a fim de promover a equidade"}, "gabarito": "A", "fonte": "UFRJ 2023-2024", "area": "Saúde Coletiva / SUS"}, {"id": "UFRJ_2023_2024_10", "numero": 10, "enunciado": "Paulo, 26 anos, procura atendimento em uma Unidade Básica de Saúde (UBS) com queixas de dor no abdômen\ne dificuldade em urinar. Durante a consulta, menciona que é homem trans e faz uso de hormônios para a adequação\nde gênero há três anos. O profissional de saúde da UBS inicia a avaliação e decide pelo melhor protocolo para\navaliar a saúde do paciente. Com base no caso clínico acima, pode-se afirmar que o profissional de saúde deve:", "alternativas": {"A": "aconselhar Paulo a interromper o uso de hormônios para evitar possíveis complicações de saúde", "B": "analisar a identidade de gênero de Paulo como um fator relevante para o caso em questão, considerando as distinções conexas à sua transição", "C": "interromper a avaliação de saúde de Paulo, uma vez que a sua identidade de gênero não é relevante para o diagnóstico e tratamento", "D": "encaminhar Paulo para um profissional especializado em saúde mental, uma vez que a identidade de gênero pode estar relacionada às suas queixas"}, "gabarito": "B", "fonte": "UFRJ 2023-2024", "area": "Saúde Coletiva / SUS"}, {"id": "UFRJ_2023_2024_11", "numero": 11, "enunciado": "Pode-se afirmar que a paresia ou paralisia do diafragma pode ser identificada na respiração:", "alternativas": {"A": "alternada", "B": "Cheyne-Stokes", "C": "paradoxal", "D": "assincrônica"}, "gabarito": "C", "fonte": "UFRJ 2023-2024", "area": "Geral"}, {"id": "UFRJ_2023_2024_12", "numero": 12, "enunciado": "Na Doença Pulmonar Obstrutiva Crônica, após o treinamento específico da musculatura inspiratória verifica-se\nmelhora funcional dos músculos treinados. Em relação as fibras musculares, pode-se afirmar que o tamanho das\nfibras tipo:", "alternativas": {"A": "I diminui", "B": "I aumenta", "C": "II aumenta", "D": "II diminui"}, "gabarito": "C", "fonte": "UFRJ 2023-2024", "area": "Geral"}, {"id": "UFRJ_2023_2024_13", "numero": 13, "enunciado": "O teste de endurance com carga linear pressórica para os músculos expiratórios se inicia com carga de:", "alternativas": {"A": "10cm H O", "B": "20cm H O", "C": "5cm H O", "D": "14cm H O"}, "gabarito": "A", "fonte": "UFRJ 2023-2024", "area": "Geral"}, {"id": "UFRJ_2023_2024_14", "numero": 14, "enunciado": "A pressão arterial de uma pessoa saudável aumenta consideravelmente durante o exercício, indicando que a\npós carga aumentou. Pode-se afirmar, portanto, que:", "alternativas": {"A": "o volume sistólico diminui", "B": "o débito cardíaco não diminui", "C": "a contratilidade diminui", "D": "o volume sistólico não se modifica"}, "gabarito": "B", "fonte": "UFRJ 2023-2024", "area": "Geral"}, {"id": "UFRJ_2023_2024_15", "numero": 15, "enunciado": "Pode-se afirmar que os pacientes apresentam crepitações finas, no final da fase inspiratória, quando ocorre:", "alternativas": {"A": "asma", "B": "fibrose pulmonar", "C": "enfisema pulmonar", "D": "pneumotórax"}, "gabarito": "B", "fonte": "UFRJ 2023-2024", "area": "Geral"}, {"id": "UFRJ_2023_2024_16", "numero": 16, "enunciado": "Dentre seus principais benefícios, no tratamento de pacientes com doença arterial coronariana, pode-se afirmar\nque:", "alternativas": {"A": "aumenta o consumo de oxigênio miocárdico (MVO ) associado ao aumento do duplo produto;", "B": "reduz a fração de ejeção ventricular esquerda quando o programa de treinamento tem duração maior que 6 meses", "C": "aumenta a elevação da frequência cardíaca e da pressão arterial em esforços submáximos", "D": "aumenta o consumo de oxigênio corpóreo máximo (VO max) ou de pico (VO pico) 2"}, "gabarito": "D", "fonte": "UFRJ 2023-2024", "area": "Cardiorrespiratória"}, {"id": "UFRJ_2023_2024_17", "numero": 17, "enunciado": "Os testes de caminhada de 6 minutos e o teste shuttle podem ser utilizados para avaliação em cardiopatas e\npneumopatas. Analise as sentenças a seguir, em relação as principais finalidades dos testes.\nI – Avaliação da capacidade funcional\nII – Estratificação do risco morbimortalidade\nIII – Avaliação do risco de quedas\nIV – Avaliação da força muscular de membros inferiores\nPode-se afirmar que é(são) afirmativa(s) correta(s):", "alternativas": {"B": "I e III", "C": "II e IV", "D": "I e II"}, "gabarito": "D", "fonte": "UFRJ 2023-2024", "area": "Cardiorrespiratória"}, {"id": "UFRJ_2023_2024_18", "numero": 18, "enunciado": "O exercício físico regular realizado com intensidade, frequência e duração otimizadas vem sendo recomendado\npara pacientes com disfunções cardiovasculares. Pode-se afirmar que é uma contraindicação absoluta para o\ntreinamento físico aeróbio:", "alternativas": {"A": "angina estável", "B": "transplante cardíaco", "C": "troca valvar cardíaca", "D": "miocardite ativa"}, "gabarito": "D", "fonte": "UFRJ 2023-2024", "area": "Geral"}, {"id": "UFRJ_2023_2024_19", "numero": 19, "enunciado": "O teste de caminhada de 6 minutos (TC6M) tem sido muito utilizado pelos fisioterapeutas na avaliação de\npacientes hospitalizados. Analise as afirmativas a seguir:\nI) Avalia o nível submáximo de capacidade funcional, e o prognóstico de pacientes com insuficiência cardíaca;\nII) O teste é realizado em um corredor demarcado de 60 metros e avalia a distância percorrida pelo paciente em 6\nminutos;\nIII) Avalia as respostas globais e integradas de todos os sistemas envolvidos durante o exercício;\nIV) Os pacientes são orientados a caminhar o mais rapidamente possível e a não parar para descansar durante o\nteste.\nEm relação ao TC6M pode-se afirmar que é(são) afirmativa(s) correta(s):", "alternativas": {"A": "II e III", "B": "I, II e III", "C": "I, III e IV", "D": "I e III"}, "gabarito": "D", "fonte": "UFRJ 2023-2024", "area": "Cardiorrespiratória"}, {"id": "UFRJ_2023_2024_20", "numero": 20, "enunciado": "Sobre a estratificação de risco (baixo, intermediário e alto) para eventos cardiovasculares durante a realização\nde atividades de reabilitação cardíaca em pacientes hospitalizados, pode-se afirmar que é considerado RISCO\nBAIXO o paciente que apresenta:", "alternativas": {"A": "presença de arritmias ventriculares durante atividade física ou recuperação", "B": "história de sincope e presença de angina ou outros sinais e sintomas de isquemia", "C": "pós infarto agudo do miocárdio ou angioplastia transcoronariana de evolução não complicada", "D": "presença de quadro de insuficiência cardíaca"}, "gabarito": "C", "fonte": "UFRJ 2023-2024", "area": "Cardiorrespiratória"}, {"id": "UFRJ_2023_2024_21", "numero": 21, "enunciado": "Um programa precoce de reabilitação cardíaca (Fase I) baseada em exercícios, durante o pós-operatório de\npacientes submetidos à cirurgia de revascularização do miocárdio, é fundamental para reduzir os efeitos do\nimobilismo e minimizar/evitar complicações pulmonares. Pode-se afirmar que:", "alternativas": {"A": "deve-se buscar níveis de esforço entre 3 e 4 utilizando a Escala de esforço de Borg modificada para monitorar a intensidade de exercício em pacientes em uso de drogas vasoativas e betabloqueadores", "B": "o programa de reabilitação cardiovascular baseado em exercícios deve ter uma duração de no mínimo dez dias, com deambulação de 70 m (3 a 5 METs) a partir do 6º dia", "C": "o programa de reabilitação cardiovascular deve ser individualizado, e tem impacto clínico se iniciado a partir do terceiro dia de pós-operatório em pacientes estáveis", "D": "o cicloergômetro estacionário possui custo elevado e não é uma ferramenta segura para utilização nessa população na Fase I da reabilitação, devendo ser utilizado outros ergômetros ou a caminhada"}, "gabarito": "A", "fonte": "UFRJ 2023-2024", "area": "Cardiorrespiratória"}, {"id": "UFRJ_2023_2024_22", "numero": 22, "enunciado": "Exercícios de membros superiores (MMSS) são componentes importantes na recuperação do paciente pós\ncirurgia cardíaca e infarto agudo do miocárdio. Analise as afirmativas a seguir:\nI. Os exercícios respiratórios associados aos exercícios de MMSS auxiliam na prevenção de complicações\npulmonares;\nII. Os exercícios de MMSS e exercícios isométricos envolvem uma demanda maior de oxigênio pelo miocárdio, e\ndevem ser prescritos com cuidado;\nIII. Os alongamentos devem ser bem orientados a fim de não desencadearem queda da pressão arterial devido à\nmanobra de Valsalva;\nIV. Aderências podem ocorrer devido ao trauma cirúrgico; os exercícios de MMSS podem aumentar o fluxo\nsanguíneo na região e acelerar o reparo dos tecidos.\nPode-se afirmar que é(são) afirmativa(s) correta(s):", "alternativas": {"A": "I, II e IV", "B": "I, II e III", "C": "I, III e IV", "D": "II, III e IV"}, "gabarito": "A", "fonte": "UFRJ 2023-2024", "area": "Cardiorrespiratória"}, {"id": "UFRJ_2023_2024_23", "numero": 23, "enunciado": "A ventilação mecânica invasiva é um recurso fundamental para o tratamento da insuficiência respiratória aguda.\nEm pacientes com Síndrome do Desconforto Respiratório Agudo, pode-se afirmar que a lesão pulmonar induzida\npelo ventilador mecânico pode ser minimizada por meio da:", "alternativas": {"A": "limitação da pressão de pico a 40cmH O", "B": "hipocapnia permissiva", "C": "hiperoxigenação do paciente", "D": "utilização de volume corrente reduzido"}, "gabarito": "D", "fonte": "UFRJ 2023-2024", "area": "Hospitalar / UTI"}, {"id": "UFRJ_2023_2024_24", "numero": 24, "enunciado": "A extubação é um procedimento essencial para que pacientes ventilados mecanicamente retomem a ventilação\nespontânea. Pode-se afirmar que são considerados como pré-requisitos para a extubação adequada:", "alternativas": {"A": "balanço hídrico zerado ou negativo, instabilidade hemodinâmica", "B": "PaO ≥ 60 mmHg com FiO ≤ 0,4 e PEEP ≤ 5 a 8cmH O 2 2", "C": "frequência respiratória > 25ipm, pressão arterial média > 8mmHg", "D": "capacidade de proteger as vias aéreas, ausência de drive respiratório"}, "gabarito": "B", "fonte": "UFRJ 2023-2024", "area": "Hospitalar / UTI"}, {"id": "UFRJ_2023_2024_25", "numero": 25, "enunciado": "Analise as afirmativas a seguir:\nI - Nos sistemas de oferta de oxigênio suplementar não há necessidade de umidificação se o fluxo for inferior a 12\nL/min\nII - Valores de PaO acima do normal podem promover o aumento das espécies reativas de oxigênio resultando\n2\nem fibrose intersticial e remodelamento vascular pulmonar\nIII – As máscaras com reservatório permitem oferta de maiores concentrações de oxigênio em comparação com o\ncateter nasal\nIV - Uma PaO dentro dos valores de normalidade exclui o risco de hipóxia tecidual\n2\nPode-se afirmar que é(são) afirmativa(s) correta(s):", "alternativas": {"A": "I, II e III", "B": "II e III", "C": "II, III e IV", "D": "I, III e IV"}, "gabarito": "B", "fonte": "UFRJ 2023-2024", "area": "Cardiorrespiratória"}, {"id": "UFRJ_2023_2024_26", "numero": 26, "enunciado": "Um paciente adulto jovem respirando em ar ambiente apresenta a seguinte gasometria arterial: PaO : 55 mmHg,\n2\npH: 7,52, PaCO : 42 mmHg, HCO : 34 mEq/L. Pode-se afirmar que o estado de oxigenação e do equilíbrio ácido-\n2 3\nbase deste paciente, respectivamente, são:", "alternativas": {"A": "hipoxemia arterial e alcalose metabólica", "B": "oxigenação arterial normal e acidose metabólica", "C": "hipoxemia arterial e acidose metabólica", "D": "hiperóxia e alcalose respiratória compensada"}, "gabarito": "A", "fonte": "UFRJ 2023-2024", "area": "Cardiorrespiratória"}, {"id": "UFRJ_2023_2024_27", "numero": 27, "enunciado": "A pressão positiva expiratória final intrínseca (PEEP intrínseca ou PEEPi) é uma condição que deve ser\nidentificada em pacientes ventilados mecanicamente. Pode-se afirmar em relação a PEEPi que:", "alternativas": {"A": "se o paciente apresenta PEEPi não é necessário aplicar PEEP externa durante a ventilação mecânica", "B": "o aumento do tempo inspiratório e/ou da frequência respiratória podem ser utilizados para reduzir a PEEPi", "C": "pode ser avaliada em condições estáticas (oclusão ao final da expiração) ou dinâmicas (com a utilização de cateter esofágico)", "D": "por alterar a relação tensão-comprimento do diafragma a PEEPi reduz o esforço inspiratório"}, "gabarito": "C", "fonte": "UFRJ 2023-2024", "area": "Hospitalar / UTI"}, {"id": "UFRJ_2023_2024_28", "numero": 28, "enunciado": "Os mecanismos de ciclagem, disparo e limite caracterizam os diferentes modos ventilatórios. Analise as\nafirmativas a seguir:\nI – Na ventilação controlada por pressão a ciclagem é a fluxo\nII – Na ventilação mecânica controlada, quando o paciente não apresenta drive ventilatório, o disparo é sempre a\ntempo\nIII – Quando o paciente dispara o ventilador mecânico e tem controle sobre a ciclagem diz-se que é um modo de\nventilação espontânea\nPode-se afirmar que é(são) afirmativa(s) correta(s)", "alternativas": {"A": "I e II", "B": "I e III", "C": "I, II e III", "D": "II e III"}, "gabarito": "D", "fonte": "UFRJ 2023-2024", "area": "Hospitalar / UTI"}, {"id": "UFRJ_2023_2024_29", "numero": 29, "enunciado": "A ventilação não-invasiva (VNI) é um recurso utilizado para tratar processos agudos e crônicos. Pode-se\nafirmar, em relação à VNI, que:", "alternativas": {"A": "a acidose respiratória grave (pH < 7,22) é um preditor de sucesso", "B": "em modalidade com dois níveis de pressão, o ajuste de IPAP = 15 cmH O e EPAP = 10 cmH O fornece um 2 2 nível de suporte inspiratório maior do que IPAP = 10 cmH O e EPAP = 5cmH O 2", "C": "pode beneficiar pacientes com doença pulmonar obstrutiva crônica e hipoventilação noturna", "D": "em comparação às máscaras faciais, as máscaras nasais possuem maior espaço morto"}, "gabarito": "C", "fonte": "UFRJ 2023-2024", "area": "Geral"}, {"id": "UFRJ_2023_2024_30", "numero": 30, "enunciado": "Com relação aos cuidados com o paciente em uso de vias aéreas artificiais pode-se afirmar que:", "alternativas": {"A": "o ajuste do enchimento do cuff pode ser realizado com a utilização de um cufômetro ou pelo método da pressão mínima de oclusão", "B": "a extremidade do tubo endotraqueal deve ficar posicionada entre 7 e 10 centímetros acima da carina", "C": "o cuff de baixa complacência é menos lesivo para as paredes das vias aéreas", "D": "para a fixação, o tubo endotraqueal deve ser posicionado lateralmente, próximo a comissura labial"}, "gabarito": "A", "fonte": "UFRJ 2023-2024", "area": "Geral"}, {"id": "UFRJ_2023_2024_31", "numero": 31, "enunciado": "Pode-se afirmar que é uma vantagem da contração muscular em cadeia cinética aberta:", "alternativas": {"A": "compressão articular mínima", "B": "padrões de movimento funcionais", "C": "propriocepção e estabilidade articular aumentadas", "D": "sempre trabalha grupos musculares múltiplos"}, "gabarito": "A", "fonte": "UFRJ 2023-2024", "area": "Geral"}, {"id": "UFRJ_2023_2024_32", "numero": 32, "enunciado": "A terapia manual ortopédica possui uma série de indicações no tratamento das lesões musculoesqueléticas.\nNo entanto, há algumas situações que limitam seu uso. Pode-se afirmar que é uma contraindicação para sua\nrealização:", "alternativas": {"A": "dor musculoesquelética intermitente", "B": "dor aliviada pelo repouso", "C": "celulite", "D": "osteoartrose"}, "gabarito": "C", "fonte": "UFRJ 2023-2024", "area": "Musculoesquelética"}, {"id": "UFRJ_2023_2024_33", "numero": 33, "enunciado": "O nervo axilar pode ser acometido em pacientes que sofreram luxação anterior do ombro. Pode-se afirmar que\né esperado encontrar neste tipo de lesão nervosa:", "alternativas": {"A": "atrofia do músculo bíceps braquial", "B": "hipoestesia na face medial do antebraço", "C": "atrofia do músculo deltoide", "D": "redução do reflexo triciptal"}, "gabarito": "C", "fonte": "UFRJ 2023-2024", "area": "Musculoesquelética"}, {"id": "UFRJ_2023_2024_34", "numero": 34, "enunciado": "O teste voltado para a avaliação da articulação sacroilíaca e coxofemoral que consiste em posicionar o paciente\nem decúbito dorsal, com o pé́ do membro inferior acometido sobre o joelho oposto, posicionando a articulação\ncoxofemoral em flexão, abdução e rotação externa, chama-se:", "alternativas": {"A": "Encondroma", "B": "sarcoma de Ewing", "C": "osteoma osteóide", "D": "cisto ósseo aneurismático"}, "gabarito": "B", "fonte": "UFRJ 2023-2024", "area": "Musculoesquelética"}, {"id": "UFRJ_2023_2024_36", "numero": 36, "enunciado": "Pode-se afirmar que o principal determinante da penetração tecidual do LASER terapêutico é:", "alternativas": {"A": "densidade de energia", "B": "tempo de aplicação", "C": "comprimento de onda", "D": "lei do quadrado inverso"}, "gabarito": "C", "fonte": "UFRJ 2023-2024", "area": "Geral"}, {"id": "UFRJ_2023_2024_37", "numero": 37, "enunciado": "A escala ASIA deve ser utilizada para avaliação de que tipo de lesão neurológica?", "alternativas": {"A": "Traumatismo craniano", "B": "Acidente vascular cerebral", "C": "Traumatismo raquimedular", "D": "Paralisia facial periférica"}, "gabarito": "C", "fonte": "UFRJ 2023-2024", "area": "Neurofuncional"}, {"id": "UFRJ_2023_2024_38", "numero": 38, "enunciado": "Em pacientes com lesões cerebelares, pode-se afirmar que é comum a observação de:", "alternativas": {"A": "tremor de repouso", "B": "nistagmo", "C": "arreflexia", "D": "hipertonia"}, "gabarito": "B", "fonte": "UFRJ 2023-2024", "area": "Geral"}, {"id": "UFRJ_2023_2024_39", "numero": 39, "enunciado": "Em relação às lesões nervosas periféricas, pode-se afirmar que:", "alternativas": {"A": "as neurotmeses geralmente têm o pior prognóstico", "B": "as axoniotmeses geralmente são lesões completas (perda de continuidade) do nervo", "C": "as neuropraxias geralmente necessitam de abordagem cirúrgica", "D": "a miastenia grave é um exemplo de lesão nervosa periférica"}, "gabarito": "A", "fonte": "UFRJ 2023-2024", "area": "Neurofuncional"}, {"id": "UFRJ_2023_2024_40", "numero": 40, "enunciado": "Após um acidente vascular cerebral, a estimulação elétrica neuromuscular pode ser utilizada para tratamento\nda sequela:", "alternativas": {"A": "hiperreflexia", "B": "hipotonia muscular", "C": "alterações vasculares, como tromboses", "D": "subluxação do ombro"}, "gabarito": "D", "fonte": "UFRJ 2023-2024", "area": "Neurofuncional"}, {"id": "UFRJ_2023_2024_42", "numero": 42, "enunciado": "A etiologia da paralisia cerebral (PC) é multifatorial, existindo fatores causais mais prevalentes para os\ndiferentes tipos de PC. Cada tipo se refere a uma área encefálica específica que sofreu lesão e apresenta sinais e\nsintomas característicos. Desta forma, a PC atáxica resulta de lesão em:", "alternativas": {"A": "área cortical ou subcortical", "B": "núcleos da base", "C": "cerebelo", "D": "tálamo"}, "gabarito": "C", "fonte": "UFRJ 2023-2024", "area": "Neurofuncional"}, {"id": "UFRJ_2023_2024_43", "numero": 43, "enunciado": "O pé torto congênito é definido como um conjunto de alterações do pé que compreende:", "alternativas": {"A": "partes moles e ósseas com deformidade em equino da articulação tibiotársica, varo de retropé, cavo de mediopé e adução do antepé, resultando na formação de um pé em equinovaro com arco longitudinal medial ausente", "B": "flexão plantar do pé, que ocorre principalmente no nível da articulação tibiotársica, mas também envolve a articulação subtalar com equinismo do tálus em relação ao calcâneo", "C": "partes moles sem alterações, estruturas ósseas com deformidade em equino da articulação tibiotársica, varo de retropé, supinação do antepé e um arco longitudinal medial elevado", "D": "encurtamento dos músculos tibial anterior, flexor longo do hálux, flexor longo dos dedos e comprometimento dos ligamentos calcâneo-fibular e talofibular posterior, deltóide e calcâneo-navicular"}, "gabarito": "B", "fonte": "UFRJ 2023-2024", "area": "Geral"}, {"id": "UFRJ_2023_2024_44", "numero": 44, "enunciado": "O estabelecimento de objetivos representa parte fundamental do planejamento fisioterapêutico. Desta forma,\num objetivo estabelecido a partir da avaliação do componente “atividade” da Classificação de Funcionalidade,\nIncapacidade e Saúde (CIF) para crianças com paralisia cerebral é:", "alternativas": {"A": "ir ao shopping com amigos utilizando muletas", "B": "aumentar a mobilidade articular do tornozelo", "C": "trabalhar a força do músculo tibial anterior", "D": "passar da posição sentada para a de pé sem apoio"}, "gabarito": "D", "fonte": "UFRJ 2023-2024", "area": "Neurofuncional"}, {"id": "UFRJ_2023_2024_45", "numero": 45, "enunciado": "Os recém-nascidos de alto risco podem permanecer por longos períodos internados nas UTIs neonatais e, por\nisso, diversas medidas devem ser instituídas para o favorecimento do desenvolvimento motor e da postura\norganizada, tais como:", "alternativas": {"A": "reflexo de sucção, reflexo de busca, reflexo de preensão palmar, RTCA", "B": "reflexo de sucção, reflexo de busca, sinal de Babinski e sinal de Galeazzi", "C": "sinal de Ortolani, sinal de Barlow, reflexo da flexão fisiológica, RTCA", "D": "reflexo de sucção, reflexo da extensão fisiológica, RTCA, sinal de Barlow"}, "gabarito": "B", "fonte": "UFRJ 2023-2024", "area": "Geral"}, {"id": "UFRJ_2023_2024_5", "numero": 5, "enunciado": "Ages and Stages Questionaire (ASQ-3 BR).\nPode-se afirmar que é uma afirmativa correta, de acordo com as características de cada teste:", "alternativas": {"A": "1: teste de triagem; 2: teste de triagem; 3: teste diagnóstico; 4: teste diagnóstico; 5: teste diagnóstico", "B": "1: teste diagnóstico; 2: teste de triagem; 3: teste de triagem; 4: teste diagnóstico; 5: teste de triagem", "C": "1: teste diagnóstico e de triagem; 2: teste diagnóstico; 3: teste de triagem; 4: teste diagnóstico; 5: teste diagnóstico", "D": "1: teste diagnóstico e triagem; 2: teste de triagem; 3: teste de triagem e diagnóstico; 4: teste diagnóstico; 5: teste de triagem"}, "gabarito": "A", "fonte": "UFRJ 2023-2024", "area": "Geral"}, {"id": "UFRJ_2023_2024_49", "numero": 49, "enunciado": "BGP nascido prematuro de 28 semanas de idade gestacional, com 11 meses de idade cronológica, chega para\navaliação fisioterapêutica, com queixa de atraso no desenvolvimento. O exame físico apresentou redução\nimportante do tônus muscular global. Em supino, acompanhou os objetos na linha horizontal e levou as mãos na\nlinha média e ao brinquedo, não segura nem brinca com os pés. Não demonstrou iniciativa para rolar em nenhuma\nposição, chegando apenas ao decúbito lateral direito quando facilitado pelo examinador. Colocado em decúbito\nventral (DV) apresentou controle insuficiente de cabeça, elevando-a abaixo de 90º por períodos breves (10\nsegundos). Colocado na posição sentada demonstra dificuldade para permanecer sem auxilio. Observa-se\nprontidão para a postura de pé, evidenciando extensão de membros inferiores com tomada de peso sobre os pés.\nMãe relata que o bebê não gosta de ficar no chão, chora com frequência passando maior parte do tempo no colo\nou carrinho vendo televisão. Informou também, que evita a colocação em prono em virtude de a criança apresentar\nrefluxo e irritar-se com facilidade. Foram indicados os seguintes exercícios para a família: estimular o alcance dos\npés em DD e rolar para os dois lados; colocar a criança em DV com rolo abaixo da axila para estimular e facilitar a\npermanência e o controle de cabeça na posição; colocar na postura sentada ao colo da mãe/pai somente apoiando 15\no tronco lateralmente, posicionar a criança de pé entre as pernas dos pais, com os pés bem apoiados. Pode-se\nafirmar que:", "alternativas": {"A": "para uma criança com 6 meses de idade corrigida, as dificuldades foram causadas por fatores pessoais que estão restringindo a participação e mobilidade", "B": "os comportamentos da mãe para estimular a criança são fatores que estão favorecendo a participação nas atividades adequadas a uma criança com 9 meses de idade corrigida", "C": "para uma criança com 11 meses de idade corrigida, estimular a utilização de dispositivos e telas quando ele está na cadeirinha facilitará o desenvolvimento e a participação", "D": "para uma criança com 8 meses de idade corrigida as atividades são indicadas para estimular o desenvolvimento motor, reduzir o atraso e melhorar atividade e participação"}, "gabarito": "D // ── estado ────────────────────────────────────────────────────────────────
let todas = [...QUESTOES_RAW];
let filtradas = [...todas];
let idx = 0;
let respostas = {};     // id -> { escolha, acertou }
let filtroArea = null;
let filtroFonte = null;
let modoErros = false;

// ── boot ──────────────────────────────────────────────────────────────────
function boot() {
  buildFilters();
  aplicarFiltros();
}

// ── filtros ───────────────────────────────────────────────────────────────
function buildFilters() {
  const areas = {};
  const fontes = {};
  todas.forEach(q => {
    areas[q.area] = (areas[q.area] || 0) + 1;
    fontes[q.fonte] = (fontes[q.fonte] || 0) + 1;
  });

  renderFilterGroup('areaFilters', areas, 'area');
  renderFilterGroup('fonteFilters', fontes, 'fonte');
}

function renderFilterGroup(containerId, counts, tipo) {
  const div = document.getElementById(containerId);
  div.innerHTML = '';

  const allBtn = document.createElement('button');
  allBtn.className = 'filter-btn' + (tipo === 'area' ? (filtroArea === null ? ' active' : '') : (filtroFonte === null ? ' active' : ''));
  allBtn.innerHTML = `Todas <span class="count-badge">${todas.length}</span>`;
  allBtn.onclick = () => { if (tipo === 'area') filtroArea = null; else filtroFonte = null; modoErros = false; aplicarFiltros(); };
  div.appendChild(allBtn);

  Object.entries(counts).sort((a,b) => b[1]-a[1]).forEach(([name, count]) => {
    const btn = document.createElement('button');
    const isActive = tipo === 'area' ? filtroArea === name : filtroFonte === name;
    btn.className = 'filter-btn' + (isActive ? ' active' : '');
    btn.innerHTML = `${name} <span class="count-badge">${count}</span>`;
    btn.onclick = () => {
      if (tipo === 'area') filtroArea = name; else filtroFonte = name;
      modoErros = false;
      aplicarFiltros();
    };
    div.appendChild(btn);
  });
}

function aplicarFiltros() {
  filtradas = todas.filter(q => {
    if (filtroArea && q.area !== filtroArea) return false;
    if (filtroFonte && q.fonte !== filtroFonte) return false;
    if (modoErros && !(respostas[q.id] && !respostas[q.id].acertou)) return false;
    return true;
  });
  idx = 0;
  buildFilters();
  renderQuestion();
  updateStats();
}

// ── render ────────────────────────────────────────────────────────────────
function renderQuestion() {
  const area = document.getElementById('questionArea');
  updateProgress();

  if (filtradas.length === 0) {
    area.innerHTML = `<div class="empty"><h2>Nenhuma questão encontrada</h2><p>Ajuste os filtros.</p></div>`;
    return;
  }

  const q = filtradas[idx];
  const resp = respostas[q.id];
  const respondida = !!resp;

  const letras = Object.keys(q.alternativas).sort();

  const opcoesHTML = letras.map(letra => {
    let cls = 'option';
    if (respondida) {
      cls += ' ' + (!!(q.gabarito) ?
        (letra === q.gabarito ? ' correct' : (resp.escolha === letra ? ' wrong' : '')) :
        (resp.escolha === letra ? ' selected' : ''));
    }
    return `
      <button class="${cls}" onclick="escolher('${q.id}', '${letra}')" ${respondida ? 'disabled' : ''}>
        <span class="letter">${letra}</span>
        <span>${norm(q.alternativas[letra])}</span>
      </button>`;
  }).join('');

  const assessVisible = respondida && !q.gabarito ? 'visible' : '';
  const gabVisible = (respondida && q.gabarito) ? 'visible' : '';

  area.innerHTML = `
    <div class="q-card">
      <div class="q-meta">
        <span class="tag area">${q.area}</span>
        <span class="tag fonte">${q.fonte}</span>
      </div>
      <div class="q-num">Questão ${idx + 1} de ${filtradas.length} &nbsp;|&nbsp; Nº ${q.numero}</div>
      <div class="q-text">${norm(q.enunciado)}</div>
      <div class="options">${opcoesHTML}</div>

      <div class="gabarito-info ${gabVisible}" id="gabInfo">
        ✅ Gabarito: alternativa <strong>${q.gabarito || ''}</strong>
      </div>

      <div class="assess-row ${assessVisible}" id="assessRow">
        <button class="btn btn-correct" onclick="avaliar('${q.id}', true)">✓ Acertei</button>
        <button class="btn btn-wrong"   onclick="avaliar('${q.id}', false)">✗ Errei</button>
      </div>
    </div>

    <div class="nav-row">
      <button class="btn btn-outline nav-btn" onclick="navegar(-1)" ${idx === 0 ? 'disabled' : ''}>← Anterior</button>
      <span class="nav-info">${resp ? (resp.acertou ? '✅ Correta' : '❌ Errada') : 'Selecione uma alternativa'}</span>
      <button class="btn btn-primary nav-btn" onclick="navegar(1)" ${idx === filtradas.length - 1 ? 'disabled' : ''}>Próxima →</button>
    </div>
  `;
}

// ── interações ────────────────────────────────────────────────────────────
function escolher(qid, letra) {
  const q = filtradas.find(x => x.id === qid);
  if (!q || respostas[qid]) return;

  if (q.gabarito) {
    const acertou = letra === q.gabarito;
    respostas[qid] = { escolha: letra, acertou };
    renderQuestion();
    updateStats();
  } else {
    // sem gabarito: mostra botões de autoavaliação
    respostas[qid] = { escolha: letra, acertou: null };
    renderQuestion();
  }
}

function avaliar(qid, acertou) {
  if (respostas[qid]) {
    respostas[qid].acertou = acertou;
    updateStats();
    renderQuestion();
    if (idx < filtradas.length - 1) setTimeout(() => navegar(1), 600);
  }
}

function navegar(dir) {
  idx = Math.max(0, Math.min(filtradas.length - 1, idx + dir));
  renderQuestion();
}

function embaralhar() {
  filtradas = [...filtradas].sort(() => Math.random() - .5);
  idx = 0;
  renderQuestion();
}

function resetar() {
  respostas = {};
  idx = 0;
  filtroArea = null;
  filtroFonte = null;
  modoErros = false;
  aplicarFiltros();
}

function filtrarErros() {
  modoErros = true;
  aplicarFiltros();
}

// ── stats ─────────────────────────────────────────────────────────────────
function updateStats() {
  const answered = Object.values(respostas).filter(r => r.acertou !== null);
  const correct = answered.filter(r => r.acertou).length;
  const pct = answered.length ? Math.round(correct / answered.length * 100) : null;

  document.getElementById('hTotal').textContent = filtradas.length;
  document.getElementById('hAnswered').textContent = answered.length;
  document.getElementById('hScore').textContent = pct !== null ? `${correct}/${answered.length}` : '—';
  document.getElementById('ringPct').textContent = pct !== null ? `${pct}%` : '—';

  const circ = Math.PI * 2 * 26;
  const offset = pct !== null ? circ * (1 - pct / 100) : circ;
  document.getElementById('ringCircle').setAttribute('stroke-dashoffset', offset.toFixed(1));
}

function updateProgress() {
  const pct = filtradas.length ? ((idx + 1) / filtradas.length * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
}

function escHtml(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function norm(t) {
  // Colapsa quebras de linha do PDF (artefatos de coluna) em espaços
  return escHtml(t.replace(/\n+/g,' ').replace(/ {2,}/g,' ').trim());
}

boot();
</script>

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('sw.js'));
}
