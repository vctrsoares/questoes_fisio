 abrir para agarrar no início do alcance. A distância entre o polegar e o dedo indicador aumenta ao longo da fase de transporte. O tamanho da abertura aumenta à medida que a mão se afasta do objeto.", "B": "A mão se fecha para agarrar no início do alcance. A distância entre o polegar e o dedo indicador diminui ao longo da fase de transporte, atingindo um mínimo antes do contato. O tamanho da abertura aumenta à medida que a mão se aproxima do objeto.", "C": "A mão começa a se abrir para agarrar no início do alcance. A distância entre o polegar e o dedo indicador aumenta ao longo da fase de transporte, atingindo um máximo antes do contato. O tamanho da abertura diminui à medida que a mão se aproxima do objeto.", "D": "A mão começa a se abrir para agarrar no início do alcance. A distância entre o polegar e o dedo indicador diminui ao longo da fase de transporte, mantendo-se inalterada até o contato. O tamanho da abertura permanece estável à medida que a mão se aproxima do objeto.", "E": "A mão começa a se fechar para agarrar no início do alcance. A distância entre o polegar e o dedo indicador permanece constante ao longo da fase de transporte, mantendo-se inalterada até o contato. O tamanho da abertura diminui à medida que a mão se afasta do objeto."}, "gabarito": "C", "fonte": "ENR FGV 2024/2025 Tipo 1", "area": "Neurofuncional"}, {"id": "ENR_FGV_2024_2025_Tipo_1_74", "numero": 74, "enunciado": "A incapacidade na Doença de Parkinson é principalmente devida\nà tétrade de sinais motores cardinais (tremor, rigidez, acinesia e\ninstabilidade postural) o que é atribuído à distúrbios na via\ncortico-estriatal-tálamo-cortical, mas a sintomatologia não é\nrestrita a problemas nessa via, levando a ocorrência de sinais e\nsintomas não motores, como os distúrbios sensitivos. Entre estes,\nincluem-se a diminuição da sensibilidade tátil, a diminuição da\npropriocepção e a diminuição da sensibilidade térmica (aumento\ndo limiar para perceber calor e frio) e o aumento da sensibilidade\nnociceptiva (presença de dor). Alterações tanto centrais quanto\nperiféricas podem estar envolvidas nessas alterações.\nAssim sendo, assinale a opção que apresenta os métodos de\navaliação que podem detectar e quantificar as alterações\nsensitivas em pacientes com Doença de Parkinson.", "alternativas": {"A": "O mini exame do estado mental, o teste de fluência verbal e o teste de memória visual.", "B": "A grafestesia, a localização de estímulos táteis, a cinestesia e os questionários de dor em Parkinson, como a KPPS.", "C": "A escala de equilíbrio de Berg, o teste de caminhada de 6 minutos, a escala de postura e mobilidade (POMA) e a avaliação da função vestibular.", "D": "A escala de qualidade de vida relacionada à saúde SF-36, a escala de qualidade de vida PDQ-39 e o questionário de dor em Parkinson, como o WOMAC.", "E": "O índice de atividades de vida diária de Parkinson, a escala de atividades instrumentais de vida diária, o UPDRS e as escalas visual analógica ou numérica de dor."}, "gabarito": "B", "fonte": "ENR FGV 2024/2025 Tipo 1", "area": "Neurofuncional"}, {"id": "ENR_FGV_2024_2025_Tipo_1_75", "numero": 75, "enunciado": "A dor, experiência pessoal, possui componentes sensoriais\n(qualidade, intensidade, localização), emocionais e\ncomportamentais, (reações de enfrentamento, medo, evitação,\nauto-proteção e catastrofização). É associada a um dano tecidual\nreal ou potencial.\nUma paciente de 68 anos, com hanseníase, queixa-se de dor em\nqueimação na região do antebraço e mão, à direita.\nPara uma avaliação eficaz da dor nesse caso, assinale a opção que\nindica os aspectos que devem ser investigados para que o\nfisioterapeuta possa estabelecer uma conduta adequada.", "alternativas": {"A": "Presença de dor noturna, se há dor persistente ou recorrente e entender se há dor espontânea ou induzida pelo movimento estresse.", "B": "Componentes do movimento, medo do movimento, autoeficácia, evitação, expectativas de melhora/piora e uso de exercícios para core.", "C": "Dor em fases iniciais/moderadas, frequência dos sintomas e fatores associados à dor, entender se há dor espontânea ou induzida pelo movimento e frequência da prática de meditação.", "D": "Se há dor persistente ou recorrente, componentes do movimento, mecanismos pró e anti-nociceptivos, medo do movimento e expectativas de melhora/piora e regularidade do ciclo menstrual.", "E": "Quando começou a dor, mecanismo de início (traumático ou não traumático), duração da queixa, frequência dos sintomas, fatores comportamentais associados à dor, qualidade do sono e mecanismo predominante de dor."}, "gabarito": "E", "fonte": "ENR FGV 2024/2025 Tipo 1", "area": "Geral"}, {"id": "ENR_FGV_2024_2025_Tipo_1_76", "numero": 76, "enunciado": "Um paciente do sexo masculino, de 32 anos, sofreu um\ntraumatismo cranioencefálico há 6 meses, ao se envolver em um\nacidente pilotando sua moto.\nNo setor de Fisioterapia Neurofuncional, ao ser avaliado,\napresentava hemiparesia e espasticidade à esquerda, com\npredomínio braquial. Queixava-se de dificuldades de se vestir de\nmaneira independente e de realizar as atividades de\nautocuidado.\nAssinale a opção que indica os testes adequados para avaliar a\nfunção motora e a atividade do membro superior,\nrespectivamente.", "alternativas": {"A": "A escala de equilíbrio de Berg e a escala de impacto da fadiga; O teste de Romberg e o box and block test.", "B": "O teste de força muscular manual e o timed up and go; a escala de Wolf motor function test e o índice de Barthel.", "C": "A escala de Fugl-Meyer para membros superiores e a escala de Ashworth modificada; a escala Wolf Motor Function (WMFT) e o AMAT (Arm Motor Ability Test).", "D": "O teste de coordenação motora e o teste de caminhada de 10m; o teste de avaliação funcional e a escala de Fugl-Meyer para membros superiores.", "E": "A escala de Fugl-Meyer para membros superiores e a Escala Visual Analógica (EVA) de dor; o miniexame do estado mental e a escala de impacto da fadiga."}, "gabarito": "C", "fonte": "ENR FGV 2024/2025 Tipo 1", "area": "Neurofuncional"}, {"id": "ENR_FGV_2024_2025_Tipo_1_77", "numero": 77, "enunciado": "O fisioterapeuta respiratório está realizando uma avaliação\nfuncional de um paciente com DPOC. Esse fisioterapeuta decidiu\nrealizar o teste de caminhada de 6 minutos.\nAssinale a opção que indica o objetivo principal a ser avaliado\nnesse teste.", "alternativas": {"A": "A força e a resistência muscular dos membros inferiores.", "B": "A distância percorrida é um indicador prognóstico de doença respiratória.", "C": "A velocidade da marcha do paciente.", "D": "A frequência cardíaca durante e após o teste.", "E": "O Vef1."}, "gabarito": "B", "fonte": "ENR FGV 2024/2025 Tipo 1", "area": "Cardiorrespiratória"}, {"id": "ENR_FGV_2024_2025_Tipo_1_78", "numero": 78, "enunciado": "O teste de marcha estacionário é usado na avaliação\ncardiorrespiratória no contexto clínico ambulatorial. Ele possui\nalgumas vantagens, como praticidade, baixo custo, necessidade\nde pequeno espaço físico e rapidez na aplicação.\nPara que o teste seja bem-sucedido e o resultado confiável, o\nfisioterapeuta deve seguir o procedimento de aplicação\ncorretamente.\nA respeito da aplicação do teste, assinale a afirmativa correta.", "alternativas": {"A": "Contar o número de vezes que os dois joelhos atingem o nível da fita que é usada como marca.", "B": "Orientar o paciente que cruze os braços sobre os ombros durante o teste para não atrapalhar a visualização dos membros inferiores.", "C": "Não monitorar a frequência cardíaca e a percepção de esforço durante o teste, para evitar interferências nos resultados.", "D": "Orientar o paciente que não apoie os membros superiores em nenhum local para manter o equilíbrio durante o teste.", "E": "Orientar o paciente que é possível descansar durante o teste, estimulando-o a retomar as passadas assim que possível, finalizando o teste após dois minutos."}, "gabarito": "E", "fonte": "ENR FGV 2024/2025 Tipo 1", "area": "Musculoesquelética"}, {"id": "ENR_FGV_2024_2025_Tipo_1_79", "numero": 79, "enunciado": "Paciente com 55 anos, fumante, relata dificuldade para realizar\ngrandes esforços. Recebeu o diagnóstico clínico de bronquite\ncrônica.\nAo exame físico fisioterapêutico, apresenta tórax em tonel,\nausculta pulmonar com murmúrio vesicular audível sem\nanormalidades. SpO 97%, FC 89 bpm e FR 18 ipm. Relata fazer\n2\nuso de corticoide inalatório contínuo e broncodilatador nas crises\nde broncoespasmo.\nDurante determinado momento da avaliação, o fisioterapeuta\ndecidiu usar o peak flow portátil com o objetivo de medir", "alternativas": {"A": "a capacidade vital pulmonar.", "B": "o pico de fluxo expiratório.", "C": "o volume expiratório.", "D": "a capacidade pulmonar total.", "E": "o volume expiratório e o nível de broncoespasmo."}, "gabarito": "B", "fonte": "ENR FGV 2024/2025 Tipo 1", "area": "Neurofuncional"}, {"id": "ENR_FGV_2024_2025_Tipo_1_80", "numero": 80, "enunciado": "O teste de caminhada de seis minutos (TC6) é uma avaliação\nsimples e de baixo custo que pode ser utilizada em pacientes com\nDPOC.\nO fisioterapeuta está realizando o TC6 em um paciente que\npossui o diagnóstico de doença pulmonar obstrutiva crônica.\nO paciente iniciou o teste de maneira estável, entretanto o\nfisioterapeuta, no minuto 5, decidiu encerrar o teste\nimediatamente, porque o paciente apresentou", "alternativas": {"A": "SpO 80%, escala de Borg 12, FR 28 ipm e palidez.", "B": "SpO 81%, escala de Borg 17, FR 28 ipm e dor inguinal.", "C": "SpO 81%, escala de Borg 20, FR 32 ipm.", "D": "SpO 84%, escala de Borg 9, palidez e dor abdominal.", "E": "SpO 85%, escala de Borg 14, FR 28 ipm e cansaço intenso"}, "gabarito": "A", "fonte": "ENR FGV 2024/2025 Tipo 1", "area": "Cardiorrespiratória"}, {"id": "ENR_FGV_2024_2025_Tipo_1_81", "numero": 81, "enunciado": "A Ventilação Não Invasiva (VNI) é a aplicação de um suporte\nventilatório sem utilização de métodos invasivos da via aérea\n(entubação orotraqueal e traqueostomia). Em crescente uso, a\nVNI tem papel fundamental em patologias pulmonares agudas.\nUm fisioterapeuta foi solicitado na emergência para avaliar a\npossibilidade do uso da VNI em uma paciente com diagnóstico de\npneumonia. Ao avaliar a paciente, o fisioterapeuta contraindicou\na VNI e indicou a entubação traqueal seguida de ventilação\nmecânica invasiva.\nAssinale a opção que justifica o procedimento do fisioterapeuta.", "alternativas": {"A": "A paciente apresentava hipersecretividade pulmonar.", "B": "A paciente apresentava PH 7,25, FR 35 ipm e PaCO 50 mmhg.", "C": "A paciente apresentava idade maior que 65 anos.", "D": "A paciente apresentava deformidade facial.", "E": "A paciente apresentava falência muscular respiratória."}, "gabarito": "E", "fonte": "ENR FGV 2024/2025 Tipo 1", "area": "Hospitalar / UTI"}, {"id": "ENR_FGV_2024_2025_Tipo_1_82", "numero": 82, "enunciado": "A ventilação mecânica, que pode substituir total ou parcialmente\na respiração espontânea, é indicada para casos de insuficiência\nrespiratória aguda ou crônica agudizada. Esse método melhora as\ntrocas gasosas e reduz o esforço respiratório, podendo ser\naplicado de maneira não invasiva por meio de uma interface\nexterna.\nAssinale a opção que indica o caso em que o modo ventilatório\nde suporte não invasivo, que mantém a pressão constante nas\nvias aéreas, deve ser usado.", "alternativas": {"A": "Tromboembolismo pulmonar.", "B": "Pós-operatório de cirurgia abdominal.", "C": "Choque hipovolêmico.", "D": "Pneumotórax não drenado.", "E": "Traumatismo cranioencefálico."}, "gabarito": "B", "fonte": "ENR FGV 2024/2025 Tipo 1", "area": "Hospitalar / UTI"}, {"id": "ENR_FGV_2024_2025_Tipo_1_83", "numero": 83, "enunciado": "A utilização de ventilação mecânica não invasiva (VNI) após\nextubação é uma prática que pode beneficiar pacientes em\ndeterminadas condições.\nUma das principais preocupações no ambiente de Terapia\nIntensiva é a falha na extubação. A VNI pode ser utilizada\nimediatamente após a extubação de forma profilática para\nreduzir o risco de falha de extubação.\nAssinale a opção que indica a condição patológica que tem\nindicação para o uso imediato da VNI pós extubação.", "alternativas": {"A": "Hipoxemia leve.", "B": "Presença de estridor na ausculta pulmonar.", "C": "Pressão arterial diastólica acima de 90 mmhg.", "D": "Duas ou mais comorbidades.", "E": "Idade acima de 60 anos."}, "gabarito": "D", "fonte": "ENR FGV 2024/2025 Tipo 1", "area": "Hospitalar / UTI"}, {"id": "ENR_FGV_2024_2025_Tipo_1_84", "numero": 84, "enunciado": "A regulagem inicial do ventilador mecânico é crucial para garantir\na adequada ventilação e o oxigenação do paciente em Terapia\nIntensiva. O fisioterapeuta é o profissional que realiza os ajustes\niniciais do ventilador mecânico garantindo um bom suporte\nventilatório ao paciente.\nVocê, como fisioterapeuta, acabou de receber um paciente com\ninsuficiência respiratória aguda na UTI. Baseado nessa\ninformação, assinale a opção que apresenta os parâmetros\niniciais que melhor se adequam ao quadro clínico desse paciente.", "alternativas": {"A": "VC 6 ml/Kg e FiO necessária para uma SpO entre 93 e 97%. 2", "B": "VC 6 ml/Kg e FiO necessária para uma SpO entre 97 e 100%. 2", "C": "VC 7 ml/Kg e FiO necessária para uma SpO entre 93 e 98%. 2", "D": "VC 7 ml/Kg e FiO necessária para uma SpO entre 97 e 100%. 2", "E": "VC 8 ml/Kg e FiO necessária para uma SpO entre 93 e 97%. 2"}, "gabarito": "A", "fonte": "ENR FGV 2024/2025 Tipo 1", "area": "Hospitalar / UTI"}, {"id": "ENR_FGV_2024_2025_Tipo_1_85", "numero": 85, "enunciado": "O conhecimento sobre a ventilação mecânica e os modos\nventilatórios é essencial para o fisioterapeuta que atua com\npacientes críticos. Há diversos modos disponíveis atualmente.\nSobre os modos ventilatórios tradicionais, assinale a afirmativa\ncorreta.", "alternativas": {"A": "O modo ventilatório PSV (Pressão De Suporte Ventilatório) é considerado o modo preferencial durante a ventilação controlada, devendo ser utilizado logo após a intubação traqueal.", "B": "O modo ventilatório VCV (Ventilação Controlada por Volume) é um modo ventilatório em que o ventilador é disparado a tempo, pressão e volume.", "C": "O modo SIMV (Ventilação Mandatória Intermitente Sincronizada) está associado ao aumento do tempo de retirada da ventilação mecânica.", "D": "O modo CPAP (Pressão Positiva Contínua nas Vias Aéreas) é constituído por dois níveis de pressão, denominado PEEP e IPAP.", "E": "O modo PCV (Ventilação Controlada por Pressão) é uma modalidade de ventilação mecânica onde a pressão inspiratória é pré-definida. Sendo possível ajustar a frequência respiratória, o tempo inspiratório, o volume corrente e a relação inspiratória e expiratória."}, "gabarito": "C", "fonte": "ENR FGV 2024/2025 Tipo 1", "area": "Hospitalar / UTI"}, {"id": "ENR_FGV_2024_2025_Tipo_1_86", "numero": 86, "enunciado": "Você é fisioterapeuta em uma UTI que acabou de internar um\npaciente em estado crítico com diagnóstico de DPOC.\nAssinale a opção que indica os parâmetros essenciais a serem\navaliados na primeira avaliação, à beira do leito, no exame\nfisioterapêutico desse paciente.", "alternativas": {"A": "Frequência respiratória e o uso de músculo acessório.", "B": "Oximetria, frequência cardíaca, trofismo muscular e pressão arterial.", "C": "Frequência respiratória, uso de músculos acessórios, oximetria, frequência cardíaca, ausculta abdominal e pressão arterial.", "D": "Frequência respiratória, ausculta pulmonar, ausculta abdominal, inspeção de tórax, uso de músculos acessórios, oximetria, frequência cardíaca e pressão arterial.", "E": "Frequência respiratória, ausculta pulmonar, oximetria, frequência cardíaca, inspeção de tórax, uso de músculos acessórios e pressão arterial."}, "gabarito": "E", "fonte": "ENR FGV 2024/2025 Tipo 1", "area": "Hospitalar / UTI"}, {"id": "ENR_FGV_2024_2025_Tipo_1_87", "numero": 87, "enunciado": "A Covid-19 apresenta manifestações distintas. A maioria dos\npacientes irão evoluir sem gravidade. Parte da população\ninfectada irá precisar de suporte médico, necessitando de\nencaminhamento para unidade hospitalar.\nSegundo o National Institutes of Health, assinale a opção que\napresenta os sintomas que o paciente com Covid-19 deve\napresentar para ser encaminhado a uma unidade hospitalar.", "alternativas": {"A": "Confusão mental, FR 22 ipm e SpO ≤ 95%.", "B": "Confusão mental, dispneia à moderados esforços e SpO ≤ 95%.", "C": "Confusão mental, dispneia progressiva e SpO ≤ 94%.", "D": "Confusão mental, dor no peito e SpO ≤ 94%.", "E": "Dispneia progressiva, dor no peito e SpO ≤ 93%."}, "gabarito": "C", "fonte": "ENR FGV 2024/2025 Tipo 1", "area": "Geral"}, {"id": "ENR_FGV_2024_2025_Tipo_1_88", "numero": 88, "enunciado": "Um fisioterapeuta foi chamado para avaliação domiciliar de um\npaciente com DPOC de 48 anos, sexo masculino. O paciente\napresenta tosse produtiva, temperatura de 37,9C, dispneia,\ntaquicardia, dor torácica pleurítica e ausculta pulmonar com\ncrepitação. Pressão arterial 135 x 88mmhg e SpO 92%.\n2\nO fisioterapeuta identificou que a melhor conduta seria\nencaminhar o paciente para uma unidade hospitalar, porque o\npaciente apresenta um quadro de", "alternativas": {"A": "edema agudo de pulmão.", "B": "hipercapnia.", "C": "infarto agudo do miocárdio.", "D": "pneumonia.", "E": "derrame pleural."}, "gabarito": "D", "fonte": "ENR FGV 2024/2025 Tipo 1", "area": "Neurofuncional"}, {"id": "ENR_FGV_2024_2025_Tipo_1_89", "numero": 89, "enunciado": "Na DPOC, a dispneia piora durante exercícios intensos porque os\nmúsculos respiratórios consomem até 16% do oxigênio, gerando\numa oferta menor de oxigênio para os músculos esqueléticos.\nCom o tempo, isso faz o indivíduo com DPOC aumentar a\nfrequência respiratória e reduzir o tempo expiratório,\naprisionando ar nos pulmões. Esse aprisionamento de ar reduz a\ncapacidade inspiratória, aumentando a sensação de falta de ar.\nAlém disso, a contínua sobrecarga dos músculos respiratórios\npode causar fadiga, comprometendo a ventilação adequada e\nlimitando o desempenho físico.\nUma das possibilidades de intervenção do fisioterapeuta é o\ntreinamento muscular inspiratório, que pode ser feito", "alternativas": {"A": "com shaker e flutter.", "B": "com power breathe.", "C": "a capella.", "D": "por meio de incentivo inspiratório a fluxo.", "E": "por meio de incentivo inspiratório a volume."}, "gabarito": "B", "fonte": "ENR FGV 2024/2025 Tipo 1", "area": "Cardiorrespiratória"}, {"id": "ENR_FGV_2024_2025_Tipo_1_90", "numero": 90, "enunciado": "A insuficiência respiratória hiper cápnica aguda é caracterizada\npor uma diminuição dos níveis de pressão parcial arterial de\noxigênio e pode ser causada por diversas condições,\nespecialmente doenças respiratórias crônicas.\nPara esses pacientes, o suporte respiratório é essencial, visando\nfacilitar a ventilação alveolar, manter uma oxigenação adequada,\nmelhorando a sobrevivência. A cânula nasal de alto fluxo é uma\nintervenção que pode ser utilizada em pacientes com doença\nrespiratória crônica. Essa intervenção possui algumas vantagens\nem relação a outras intervenções de suporte ventilatório.\nSobre a cânula nasal de alto fluxo, assinale a afirmativa correta.", "alternativas": {"A": "O fluxo de ar é aquecido e umidificado.", "B": "Oferece taxas de ar de até 50 L/min em adultos.", "C": "Tem, como desvantagem, a impossibilidade do controle da FIO .", "D": "Não é capaz de ofertar uma pressão expiratória final positiva.", "E": "Fornece eliminação de espaço morto nas vias aéreas inferiores, o que pode melhorar a ventilação."}, "gabarito": "A", "fonte": "ENR FGV 2024/2025 Tipo 1", "area": "Hospitalar / UTI"}, {"id": "ENR_FGV_2024_2025_Tipo_1_91", "numero": 91, "enunciado": "Existem diversas técnicas que podem ser usadas pelo\nfisioterapeuta respiratório. No geral, as técnicas são divididas\nentre técnicas de desobstrução e de expansão pulmonar.\nA técnica de hiperinsuflação manual, também conhecida como\nbag squeezing é capaz de gerar benefícios como melhora da\noxigenação, remoção de secreção e reversão de alvéolos\ncolapsados. Mas essa técnica possui também efeitos adversos.\nSobre o bag squeezing, assinale a opção que apresenta seu\nprincipal efeito adverso.", "alternativas": {"A": "Broncoaspiração.", "B": "Flatulência por excesso de pressão.", "C": "Barotrauma por excesso de pressão.", "D": "Distensão gástrica por excesso de pressão.", "E": "Aumento da capacidade residual devido à insuflação pulmonar."}, "gabarito": "C", "fonte": "ENR FGV 2024/2025 Tipo 1", "area": "Hospitalar / UTI"}, {"id": "ENR_FGV_2024_2025_Tipo_1_92", "numero": 92, "enunciado": "Paciente do sexo masculino, 18 anos, com diagnóstico de\nbronquiectasia.\nAo exame físico: SpO : 93%; FR: 16ipm; FC: 87bpm; e\n2\nPA: 120x70mmhg. Ausculta pulmonar audível com roncos no\nterço inferior anterior e lateral esquerdo.\nO fisioterapeuta decide aplicar uma técnica desobstrutiva. Ele\nsolicita que o paciente se deite em decúbito lateral direito, com\numa elevação do quadril e membros inferiores em relação à\nparte superior do restante do corpo.\nO fisioterapeuta solicita que o paciente realize respirações\ndiafragmáticas tranquilas, após isso o fisioterapeuta instrui o\npaciente a inspirar profundamente e, ao final da inspiração,\nrealiza uma apneia de três segundos. Após isso, o fisioterapeuta\nsolicita uma expiração forçada.\nDiante do caso clínico descrito, assinale a opção que indica as\ntécnicas realizadas pelo fisioterapeuta.", "alternativas": {"A": "Drenagem autógena e ciclo ativo da respiração.", "B": "Drenagem postural e Expiração Lenta Total com a Glote Aberta.", "C": "Ciclo ativo da respiração e drenagem autógena.", "D": "Drenagem autógena e drenagem postural.", "E": "Drenagem postural e ciclo ativo da respiração."}, "gabarito": "E", "fonte": "ENR FGV 2024/2025 Tipo 1", "area": "Neurofuncional"}, {"id": "ENR_FGV_2024_2025_Tipo_1_93", "numero": 93, "enunciado": "A Técnica de Expiração Forçada (TEF), foi criada por Pryor e\nWebber, e consiste em uma modificação da tosse normal. O\nobjetivo dessa técnica é separar o muco da parede brônquica e\nmovê-lo para as vias aéreas superiores por meio da liberação do\nar, conseguida pela contração dos músculos expiratórios. Ela é\ncaracterizada por ser uma técnica de remoção de secreções que\ncausa menor alteração na pressão pleural, além de uma menor\nprobabilidade de causar colapso dos bronquíolos.\nSobre as características da TEF, assinale a afirmativa correta.", "alternativas": {"A": "É a técnica mais eficaz para remoção de secreções.", "B": "É uma técnica simples que pode ser utilizada sem a presença do fisioterapeuta.", "C": "É uma técnica simples que pode ser ensinada a qualquer paciente, incluindo pacientes com alterações cognitivas.", "D": "É uma técnica contraindicada para pacientes com fibrose cística, pois pode gerar obstrução das vias aéreas.", "E": "É uma técnica que não pode ser associada a outras técnicas desobstrutivas, pois perde sua eficácia terapêutica."}, "gabarito": "B", "fonte": "ENR FGV 2024/2025 Tipo 1", "area": "Neurofuncional"}, {"id": "ENR_FGV_2024_2025_Tipo_1_94", "numero": 94, "enunciado": "A hipertensão arterial é uma condição crônica caracterizada pela\nelevação persistente da pressão sanguínea nas artérias. Esse\naumento da pressão pode sobrecarregar o coração e danificar os\nvasos sanguíneos, contribuindo para o desenvolvimento de\ndoenças cardiovasculares, acidentes vasculares cerebrais e outras\ncomplicações. O controle rigoroso da pressão arterial por meio\nde medidas como dieta adequada, prática de exercícios físicos e,\nquando necessário, medicação. O fisioterapeuta pode ajudar\npacientes com hipertensão arterial mediante intervenções\nseguras, como o exercício resistido.\nSobre essa modalidade de exercício, assinale a afirmativa correta.", "alternativas": {"A": "É capaz de reduzir a pressão sistólica, mas não possui efeitos significativos na pressão diastólica.", "B": "É capaz de reduzir a pressão diastólica, mas não possui efeitos significativos na pressão sistólica.", "C": "Produz reduções maiores na pressão arterial em indivíduos normotensos, comparado a hipertensos.", "D": "Tem a mesma eficácia que medicamentos anti-hipertensivos na redução da pressão arterial sistólica em repouso.", "E": "Produz reduções maiores na pressão arterial em indivíduos normotensos, comparado a pré-hipertensos."}, "gabarito": "D", "fonte": "ENR FGV 2024/2025 Tipo 1", "area": "Geral"}, {"id": "ENR_FGV_2024_2025_Tipo_1_95", "numero": 95, "enunciado": "Paciente com 65 anos de idade, sexo feminino e com diagnóstico\nde insuficiência cardíaca congestiva devido à disfunção do\nventrículo esquerdo. Chegou à unidade de terapia intensiva\nnecessitando do uso de ventilação mecânica não invasiva. Após\n12 horas a paciente evoluiu com instabilidade do quadro clínico\ndevido à agudização do quadro de insuficiência cardíaca. Ela\napresentou hipoxemia na gasometria e aumento do trabalho\nmuscular respiratório, necessitando ser intubada e ventilada\nmecanicamente.\nComo o fisioterapeuta deve estar atento aos ajustes dos\nparâmetros do ventilador mecânico, assinale a opção que indica\nseu objetivo inicial.", "alternativas": {"A": "Aplicar manobras de recrutamento alveolar para evitar o colapso alveolar.", "B": "Alcançar SpO igual ou maior que 94%, por meio da menor 2 fração inspirada de oxigênio.", "C": "Iniciar com o modo ventilatório PSV para prevenir fraqueza da musculatura respiratória.", "D": "Alcançar SpO igual ou maior que 92%, por meio da menor 2 fração inspirada de oxigênio.", "E": "Evitar o uso de PEEP acima de 8cm H O para evitar aumento 2 do débito cardíaco."}, "gabarito": "B", "fonte": "ENR FGV 2024/2025 Tipo 1", "area": "Hospitalar / UTI"}, {"id": "ENR_FGV_2024_2025_Tipo_1_96", "numero": 96, "enunciado": "As doenças cardiovasculares afetam o coração e os vasos\nsanguíneos, podendo incluir problemas como doença\ncoronariana, insuficiência cardíaca e hipertensão arterial\nsistêmica. Essas doenças causam complicações graves, impactam\nsignificativamente a qualidade de vida e podem exigir cuidados\nmédicos específicos.\nUm fisioterapeuta está trabalhando com um grupo de pacientes\ncom doenças cardiovasculares em um ambulatório de um serviço\nde saúde privada. O objetivo principal solicitado ao profissional é\na redução do risco de mortalidade.\nDe acordo com as evidências disponíveis, assinale a opção que\nindica a melhor intervenção para alcançar esse desfecho.", "alternativas": {"A": "Exercício aeróbico.", "B": "Exercício aeróbico com oclusão vascular parcial.", "C": "Exercício aeróbico e resistido com oclusão vascular parcial.", "D": "Exercício resistido e aeróbico.", "E": "Exercício resistido com oclusão vascular parcial"}, "gabarito": "D", "fonte": "ENR FGV 2024/2025 Tipo 1", "area": "Cardiorrespiratória"}, {"id": "ENR_FGV_2024_2025_Tipo_1_97", "numero": 97, "enunciado": "Maria, 49 anos, tem diagnóstico de doença coronariana. A\npaciente encontra-se estável hemodinamicamente, sem\nutilização de medicação betabloqueadora. Encontra-se em\natendimento domiciliar com supervisão do fisioterapeuta.\nAo prescrever os exercícios do dia, o fisioterapeuta decidiu\nrealizar uma sessão de exercício aeróbico utilizando a escala de\npercepção de esforço para controlar a intensidade do exercício\naeróbico e adequar a dose de exercício às características da\npaciente.\nSobre a conduta de utilizar a escala de percepção de esforço\ncomo uma variável de controle da intensidade do exercício\nassinale a afirmativa correta.", "alternativas": {"A": "O fisioterapeuta está errado, porque a escala de percepção de esforço é subjetiva e isso gera insegurança na prescrição de exercício aeróbico para pacientes com doença cardiovascular.", "B": "O fisioterapeuta está errado, porque apenas a frequência cardíaca deve ser usada para prescrever exercício aeróbico para pacientes com doença cardiovascular.", "C": "O fisioterapeuta está errado, porque os pacientes com doença cardiovascular não devem iniciar a realização de exercício aeróbico sem antes realizar um teste ergométrico.", "D": "O fisioterapeuta está correto, porque a escala de percepção de esforço é um dos métodos que pode ser usado como orientação para prescrição de exercício aeróbico para pacientes com doença cardiovascular.", "E": "O fisioterapeuta está correto, porque a escala de percepção de esforço é a melhor forma de monitorar a intensidade do exercício aeróbico para pacientes com doença cardiovascular."}, "gabarito": "D", "fonte": "ENR FGV 2024/2025 Tipo 1", "area": "Cardiorrespiratória"}, {"id": "ENR_FGV_2024_2025_Tipo_1_98", "numero": 98, "enunciado": "Você trabalha como fisioterapeuta em uma clínica que atende\npacientes com diversas patologias e disfunções de órgãos e\nsistemas.\nUm dos fisioterapeutas atendeu a um paciente com tuberculose\ne utilizou um EPAP com máscara. Esse aparelho deve ser\ndesinfetado após o uso. Por falta de atenção, o fisioterapeuta\natendeu outro paciente, com diagnóstico de fratura de costela e\nsem nenhuma infecção pulmonar diagnosticada, utilizando o\naparelho “sujo”. Após 5 dias, o paciente com o diagnóstico de\nfratura de costela foi internado no hospital com diagnóstico de\ntuberculose. Reconhecendo o erro, seu amigo pede que você\nmantenha o fato sobre sigilo.\nBaseado no Código de Ética, assinale a afirmativa que apresenta a\ndecisão correta a ser tomada.", "alternativas": {"A": "Denunciar diretamente ao Conselho Regional de Fisioterapia o acontecido sem antes se reportar ao chefe do serviço e reportar a informação ao paciente lesado.", "B": "Não reportar ao chefe do serviço da clínica, deixando o fisioterapeuta infrator não assumir a atitude imprudente.", "C": "Reportar ao paciente lesado o acontecido e não falar com a equipe profissional e responsável legal da clínica.", "D": "Reportar ao paciente lesado o acontecido e denunciar diretamente ao Conselho Regional de Fisioterapia o acontecido sem antes se reportar ao chefe do serviço.", "E": "Pedir ao fisioterapeuta infrator para que ele informe a sua atitude imprudente ao chefe do serviço para que as atitudes legais sejam tomadas, e caso ele insista em não reportar, comunicar o acontecido ao chefe do serviço."}, "gabarito": "E", "fonte": "ENR FGV 2024/2025 Tipo 1", "area": "Neurofuncional"}, {"id": "ENR_FGV_2024_2025_Tipo_1_99", "numero": 99, "enunciado": "O Código de Ética do fisioterapeuta é um manual de como o\nprofissional deve se comportar perante a sociedade.\nLevando em consideração o Art. 10 do Código de Ética, assinale a\nopção que indica o procedimento vedado para o fisioterapeuta.", "alternativas": {"A": "Quando julgar necessário, encaminhar o paciente a outro profissional que não seja fisioterapeuta.", "B": "Em caso de urgência, prescrever tratamento fisioterapêutico sem realização de consulta.", "C": "Negar assistência fisioterapêutica, no caso de o paciente não conseguir arcar com os custos do serviço.", "D": "Negar assistência ao ser humano ou à coletividade, em casos de indubitável urgência.", "E": "Incentivar a busca de qualificação continuada, em benefício do paciente, respeitando sua autonomia."}, "gabarito": "D", "fonte": "ENR FGV 2024/2025 Tipo 1", "area": "Saúde Coletiva / SUS"}, {"id": "ENR_FGV_2024_2025_Tipo_1_100", "numero": 100, "enunciado": "Um Fisioterapeuta Esportivo está tratando um atleta de futebol\nprofissional que sofreu uma lesão de ligamento cruzado anterior.\nO departamento técnico e médico do time exige que ele esteja\napto para jogar dentro de seis meses. Ao completar os seis meses\nde tratamento, o Fisioterapeuta realizou a avaliação final e\ndetectou que o atleta não está 100% recuperado pois apresenta\ndiscretas alterações na sua capacidade física. O Fisioterapeuta,\nainda assim, opta por dar alta ao atleta e o libera para retornar\naos treinos e jogos.\nBaseado nos princípios da Bioética, sobre o procedimento do\nfisioterapeuta assinale a afirmativa correta.", "alternativas": {"A": "Ele praticou uma conduta c  Hospitalar", "area": "Hospitalar / UTI"}, {"id": "UEPA_2023_1", "numero": 1, "enunciado": "Segundo a Lei Nº 8.080, de 19 de Setembro\nde 1990, um dos objetivos do Sistema Único\nde Saúde é:", "alternativas": {"A": "fixar diretrizes sobre as regiões de saúde distrito sanitário, integração de territórios referência e contrarreferência e demais aspectos vinculados à integração das ações e serviços de saúde entre os entes federados.", "B": "preservar a autonomia das pessoas na defesa de sua integridade física e moral.", "C": "a assistência às pessoas por intermédio de ações de promoção, proteção e recuperação da saúde, com a realização integrada das ações assistenciais e das atividades preventivas.", "D": "articular políticas e programas de interesse para a saúde, cuja execução envolva áreas não compreendidas no âmbito do Sistema Único de Saúde (SUS).", "E": "a universalidade, a integralidade e a equidade da atenção em saúde, bem como o entendimento da saúde em seu conceito mais ampliado."}, "gabarito": "C", "fonte": "UEPA 2023", "area": "Geral"}, {"id": "UEPA_2023_2", "numero": 2, "enunciado": "A lei Nº 8.080 de 19 de Setembro de 1990\ndispõe sobre as condições para a promoção\nproteção e recuperação da saúde, a\norganização e o funcionamento dos serviços\nno Sistema Único de Saúde. Com relação aos\nprincípios do SUS, é correto afirmar que:", "alternativas": {"A": "a universalidade estabelece que a saúde é direito de todos e dever do Estado, no entanto, fatores como gênero, cor, raça local de moradia, situação de emprego ou renda, podem influenciar na priorização do acesso de indivíduos e comunidades.", "B": "a integralidade está relacionada ao atendimento pautado na visão holística do indivíduo e da coletividade, com oferta de serviços articulados e contínuos em todos os níveis de complexidade de acordo com as necessidades de promoção, prevenção e recuperação da saúde de cada caso.", "C": "a equidade no SUS está pautada no mesmo conceito de igualdade, onde deve- se ofertar o mesmo atendimento à todas as pessoas e comunidade independente das vulnerabilidades, riscos ou necessidades peculiares.", "D": "a participação social no SUS é conceituada como a participação dos seguimentos da sociedade na definição e execução da política de saúde nos níveis Estadual e Municipal, sendo materializada centralmente nas Conferências de Saúde.", "E": "a hierarquização está relacionada ao estabelecimento dos níveis de atenção onde a atenção primária corresponde aos atendimentos mais simples e a atenção terciária aos atendimentos mais complexos, portanto mais importantes."}, "gabarito": "B", "fonte": "UEPA 2023", "area": "Saúde Coletiva / SUS"}, {"id": "UEPA_2023_6", "numero": 6, "enunciado": "A Política Nacional de Humanização (PNH)\nbusca pôr em prática os princípios do SUS no\ncotidiano dos serviços de saúde, produzindo\nmudanças nos processos de gestão e de\ncuidado. Sobre os princípios da PNH é correto\nafirmar que:", "alternativas": {"A": "um dos principais princípios da Política Nacional de Humanização é a transversalidade, que estabelece a inserção da PNH em todas as políticas e programas do SUS.", "B": "indissociabilidade entre atenção e gestão que estabelece que toda decisão de gestão interfere indiretamente na assistência à saúde, portanto quando possível deve-se levar em consideração as necessidades dos serviços e da rede de saúde.", "C": "o princípio do protagonismo corresponsabilidade e autonomia dos sujeitos e coletivos prevê a participação ativa dos representantes da gestão e da assistência, considerando que estes são os atores principais na condução e efetivação dos processos voltados a promoção prevenção e recuperação da saúde.", "D": "a Política Nacional de Humanização possu dois princípios estruturantes: a indissociabilidade entre atenção e gestão e; o protagonismo, corresponsabilidade e autonomia dos sujeitos e coletivos. Ambos estão pautados na necessidade de uma atenção à saúde que valorize todos os atores envolvidos.", "E": "a Política Nacional de Humanização fo criada em 2013 e está alicerçada na busca de construir trocas solidárias e comprometidas com a dupla tarefa de produção de saúde e produção de sujeitos."}, "gabarito": "A", "fonte": "UEPA 2023", "area": "Saúde Coletiva / SUS"}, {"id": "UEPA_2023_7", "numero": 7, "enunciado": "A equipe de apoio matricial se relaciona com\nas equipes de referência e objetiva:", "alternativas": {"A": "identificar os problemas de saúde do território.", "B": "estabelecer a metodologia de trabalho para as demais equipes.", "C": "oferecer suporte técnico pedagógico especializado a todas as equipes e profissionais.", "D": "assegurar retaguarda especializada a equipes e profissionais.", "E": "criar protocolos e centros de regulação."}, "gabarito": "D", "fonte": "UEPA 2023", "area": "Geral"}, {"id": "UEPA_2023_9", "numero": 9, "enunciado": "Considerando a organização do Sistema\nÚnico de Saúde, a Lei Nº 8.080/90 estabelece\no, as atribuições comuns e s específicas da União, dos Estados, do Distrito\no Federal e dos Municípios. Sobre as", "alternativas": {"A": "s correto afirmar que: a definir e coordenar os sistemas de redes o, integradas de assistência de alta complexidade; de rede de laboratórios de ui saúde pública; de vigilância a epidemiológica; e vigilância sanitária.", "B": "promover a descentralização para os Municípios dos serviços e das ações de saúde; acompanhar, controlar e avaliar as redes hierarquizadas do Sistema Único de Saúde (SUS); prestar apoio técnico e financeiro aos Municípios e executar oi supletivamente ações e serviços de saúde.", "C": "planejar, organizar, controlar e avaliar as ações e os serviços de saúde de baixa complexidade, além de gerir e executar os serviços públicos de saúde.", "D": "formar consórcios administrativos intermunicipais; controlar e fiscalizar os procedimentos dos serviços privados de o saúde.", "E": "estabelecer critérios, parâmetros e o métodos para o controle da qualidade sanitária de produtos, substâncias e o serviços de consumo e uso humano; e promover articulação com os órgãos educacionais e de fiscalização do exercício profissional, bem como com entidades representativas de formação de recursos humanos na área de saúde. onal em Saúde 2023 – Fisioterapia Pág."}, "gabarito": "B", "fonte": "UEPA 2023", "area": "Geral"}, {"id": "UEPA_2023_10", "numero": 10, "enunciado": "A Política Nacional de Educação Permanente\nem Saúde (PNEPS) é fruto da luta e esforço\ndos defensores da educação como ferramenta\npara promover a transformação das práticas\ndo trabalho em saúde. Sobre a PNEPS é\ncorreto afirmar que:", "alternativas": {"A": "para a Política Nacional de Educação Permanente em Saúde os conceitos de Educação em Saúde e Educação na Saúde são similares, ambos tratam dos processos de ensino e aprendizagem que ocorrem dentro dos serviços de saúde tendo como público-alvo formativo os usuários do SUS.", "B": "a Política Nacional de Educação Permanente em Saúde foi criada em 2007 e estabelece iniciativas relacionadas à reorientação da formação profissional com ênfase na abordagem integral do processo saúde-doença e na integração entre as Instituições de Ensino Superior (IES) e serviços de saúde.", "C": "a Política Nacional de Educação Permanente em Saúde é pautada na estruturação descendente das Políticas Públicas, cabendo os Estados e Municípios aplicarem as atividades formativas de acordo com os aspectos estabelecidos em nível nacional.", "D": "a Política Nacional de Educação Permanente em Saúde aponta a importância da integração dos representantes dos seguimentos de ensino, serviço, gestão e controle social também chamado de quadrilátero da formação, para o efetivo fortalecimento da formação para o SUS.", "E": "a Política Nacional de Educação Permanente em Saúde está centrada apenas nas práticas formativas de profissionais já inseridos nos serviços do SUS, visando o aprimoramento do processo de trabalho concreto. Desta forma, as práticas formativas no âmbito das Instituições de Ensino Superior não são objetos desta política, cabendo este enfoque à Política Nacional de Educação Continuada em Saúde."}, "gabarito": "D", "fonte": "UEPA 2023", "area": "Saúde Coletiva / SUS"}, {"id": "UEPA_2023_11", "numero": 11, "enunciado": "A diretriz organizativa estabelecida pela\nConstituição Federal de 1988 está associada\na:", "alternativas": {"A": "regulação do Sistema Único de Saúde no âmbito dos Municípios.", "B": "organização da linha de cuidado no âmbito dos Municípios.", "C": "participação da comunidade nas diversas instâncias do Sistema Único de Saúde.", "D": "priorização do atendimento à população dentro da rede de atenção à saúde.", "E": "forma de organização da comunidade no território subordinado as unidades de atendimento."}, "gabarito": "C", "fonte": "UEPA 2023", "area": "Geral"}, {"id": "UEPA_2023_13", "numero": 13, "enunciado": "A Política Nacional de Promoção a Saúde\n(PNPS) foi instituída pela Portaria MS/GM nº\n687, de 30 de março de 2006, estando\npautada no conceito ampliado de saúde\nSobre os objetivos da PNPS, é correto afirmar\nque:", "alternativas": {"A": "a Política Nacional de Promoção a Saúde visa incorporar e implementar ações de promoção da saúde, com ênfase nos três níveis de atenção a saúde: primária secundária e terciária.", "B": "a Política Nacional de Promoção a Saúde objetiva ampliar a autonomia e a co- responsabilidade de sujeitos e coletividades, diminuindo a responsabilidade do poder público na sobrecarga do cuidado integral à saúde.", "C": "a Política Nacional de Promoção a Saúde objetiva valorizar e ampliar a cooperação entre os setores da saúde para a gestão de políticas públicas e a criação e/ou o fortalecimento de iniciativas que signifiquem redução das desigualdades sociais.", "D": "a Política Nacional de Promoção a Saúde visa contribuir para o aumento do encaminhamento e acesso aos serviços especializados (atenção secundária) garantindo qualidade, eficácia, eficiência e segurança das ações de promoção da saúde.", "E": "a Política Nacional de Promoção a Saúde tem como objetivo promover a qualidade de vida, reduzir vulnerabilidade e riscos à saúde relacionados aos seus determinantes e condicionantes."}, "gabarito": "E", "fonte": "UEPA 2023", "area": "Neurofuncional"}, {"id": "UEPA_2023_15", "numero": 15, "enunciado": "O programa Previne Brasil foi instituído pela\nestabelece o novo modelo de financiamento e\npara os municípios. Sobre o Previne Brasil, é", "alternativas": {"A": "no previne Brasil o financiamento da Aten 2 componentes: a capitação ponderada e o", "B": "dentre os sete indicadores de Pagamento ano de 2022, estão: Proporção de gest realizadas, sendo a 1ª (primeira) até a 12 de gestantes com realização de exame hipertensão, com consulta e pressão arteri", "C": "para o ano de 2022, estão previstos o Programa Previne Brasil, dentre eles está: e pressão arterial aferida no ano; Pro hemoglobina glicada solicitada no ano.", "D": "os incentivos para ações estratégicas aba de Especialidades Odontológicas (CEO); Básica - NASF-AB; Programa Saúde na Esc", "E": "a capitação ponderada é uma forma de re Distrito Federal, cujo modelo de remunera território."}, "gabarito": "B", "fonte": "UEPA 2023", "area": "Neurofuncional"}, {"id": "UEPA_2023_20", "numero": 20, "enunciado": "O fisioterapeuta obstétrico se utiliza de\nconceitos de biomecânica e fisiologia para\natuar, de forma individualizada, no\nintraparto. Sua intervenção visa acelerar o\nmomento da dilatação, promovendo um parto\nmais tranquilo, assim como prepara o períneo\npara o momento expulsivo, estimulando um\nmaior relaxamento da musculatura do\nassoalho pélvico. De acordo com a atuação\ndo fisioterapeuta hospitalar no trabalho de\nparto humanizado é correto afirmar que:", "alternativas": {"A": "na fase inicial do trabalho de parto, é necessário o emprego de posturas que ajudam a promover a dilatação e orientações sobre as maneiras de minimizar as tensões musculares e na segunda fase, é de total importância o apoio e o incentivo a participação ativa da mulher, pois esta ajuda na expulsão do feto, com o auxílio de uma postura e respiração adequadas para o nascimento.", "B": "as técnicas mais empregadas no trabalho da fisioterapia obstétrica têm como principais objetivos proporcionar a percepção respiratória, o relaxamento, a massagem e o posicionamento. É de extrema a importância sua presença tornando o parto mais simples, menos doloroso e traumático, não apresentando nenhum dano à parturiente e seu bebê causando uma máxima analgesia por meio do uso de recursos farmacológicos diminuindo a tensão, o medo e tornando o momento menos doloroso.", "C": "estudos evidenciam que a posição horizontal adquirida pela parturiente se destaca na assistência ao parto humanizado, pois esta posição melhora o progresso do trabalho de parto melhorando gradativamente a circulação uterina e a expansão pulmonar. No mecanismo do parto ativo estão envolvidos aspectos osteomusculares e as múltiplas manobras fisioterapêuticas.", "D": "na deambulação acontece a contração mais forte, onde se necessita suspender a marcha e adquirir posições que beneficiem a descida fetal, não esquecendo o padrão respiratório tranquilo e o mais fisiológico possível. O fisioterapeuta integra-se a gestante novamente com o papel de orientação quanto às posturas movimentos extensos, mobilidade pélvica tentando mantê-la em repouso, posturas horizontais, relaxamento das musculaturas corporal e principalmente do períneo."}, "gabarito": "A", "fonte": "UEPA 2023", "area": "Neurofuncional"}, {"id": "UEPA_2023_22", "numero": 22, "enunciado": "Resoluções do Conselho Federal de\nFisioterapia e Terapia Ocupaciona\nreconhecem o exercício da Fisioterapia nas\ndiversas áreas de atuação, assim como\nregulamenta a divulgação de seu trabalho por\nmeio de publicações de imagens, textos e\náudios. Considerando a Ética Profissional do\nfisioterapeuta, que é disciplinada por meio do\nseu Código Deontológico Profissional, assinale", "alternativas": {"A": "alternativa correta. a Reconhecido o exercício da Fisioterapia nos Distúrbios do Sono como área de atuação própria do fisioterapeuta, este tem a prerrogativa de aplicar o uso da Pressão Positiva nas Vias Aéreas (PAP), do inglês Positive Airway Pressure, nas suas diversas modalidades invasivas.", "B": "A Fisioterapia em Cuidados Paliativos é um componente do tratamento integrado que deve ser executado no ambiente hospitalar, no qual o fisioterapeuta se capacita para atuar de forma autônoma e independente.", "C": "Para o exercício da especialidade profissional de Fisioterapia em Reumatologia é necessário o domínio da competência de determinar o diagnóstico clínico e o prognóstico fisioterapêutico em pacientes com doenças reumatológicas.", "D": "Em todas as publicações de imagens textos e áudios deverão constar o nome do profissional e o seu número de inscrição, além da data das imagens textos e áudios, sendo vedada a divulgação de casos clínicos de autoria de terceiros.", "E": "Fica autorizada a divulgação de imagens textos e áudios autênticos de pacientes/clientes/usuários acompanhados ou não do fisioterapeuta responsável que realizou o procedimento, desde que com autorização prévia deste ou de seu representante legal, através de Termo de cessão de imagem."}, "gabarito": "D", "fonte": "UEPA 2023", "area": "Hospitalar / UTI"}, {"id": "UEPA_2023_24", "numero": 24, "enunciado": "A terminologia Displasia do Desenvolvimento\n\ndo Quadril (DDQ) descreve o amplo espectro\n\nde alterações que atingem o quadril em\n\ncrescimento, desde a displasia até à luxação\nda articulação, passando pelos diferentes\ns, graus de subluxação da coxofemoral", "alternativas": {"A": "femoral, na cavidade acetabular ou em e ambos. Acerca dos fatores envolvidos no diagnóstico e tratamento desta entidade s, nosológica é correto afirmar que: e a no recém-nascido e nos bebês o s diagnóstico da DDQ é eminentemente e clínico e realizado com a manobra de m Tredelenburg.", "B": "o sinal de Barlow é um teste de redução do quadril, ou seja, quando um recém- nascido com a articulação coxofemoral luxada é examinado, a cabeça femoral é reduzida no acetábulo com a manobra, assim sendo demonstrada a luxação.", "C": "o sinal de Ortolani é uma manobra provocativa da luxação de um quadril instável e determinará o potencial para a luxação do quadril examinado.", "D": "o sinal de Galeazzi ou de Allis é realizado com a criança deitada e com os joelhos fletidos,em casos de DDQ os joelhos não estarão na mesma altura, denotando já a diferença de comprimento entre os membros inferiores.", "E": "o tratamento é baseado no conceito de que, mantendo-se o posicionamento do quadril reduzido em extensão e em leve adução, ocorrerá o estímulo necessário para o desenvolvimento normal da articulação. onal em Saúde 2023 – Fisioterapia Pág."}, "gabarito": "D", "fonte": "UEPA 2023", "area": "Musculoesquelética"}, {"id": "UEPA_2023_26", "numero": 26, "enunciado": "Saber identificar o que um indivíduo\nconsegue ou não consegue realizar é\nimportante para o processo de reabilitação. A\nCIF (Classificação Internacional de\nFuncionalidade, Incapacidade e Saúde)\npossui um componente chamado atividade e\nparticipação, que é medido por meio do\ndesempenho e capacidade. O que um\nindivíduo é capaz de fazer em seu ambiente\nhabitual, medido com o uso de facilitadores é\nchamado de:", "alternativas": {"A": "Capacidade", "B": "Funções do corpo", "C": "Desempenho", "D": "Fatores ambientais", "E": "Estrutura do corpo"}, "gabarito": "C", "fonte": "UEPA 2023", "area": "Geral"}, {"id": "UEPA_2023_28", "numero": 28, "enunciado": "As órteses de membros inferiores são\nbastante utilizadas na prática clínica do\nfisioterapeuta e sua descrição está baseada\nnos segmentos corpóreos que estas órteses\nestão dispostas. A órtese que envolve as\nregiões do joelho, tornozelo e pé, é:", "alternativas": {"A": "HKAFO", "B": "KAFO", "D": "AFO"}, "gabarito": "B", "fonte": "UEPA 2023", "area": "Musculoesquelética"}, {"id": "UEPA_2023_29", "numero": 29, "enunciado": "A eletroterapia faz parte dos recursos\nutilizados pelo fisioterapeuta a fim de\nalcançar diversos objetivos, como por\nexemplo promover analgesia. Dentre os tipos\nde eletroestimulação, um dos mais usados na\nprática clínica é a Estimulação Elétrica\nNervosa Transcutânea (TENS). A classificação\nda TENS é:", "alternativas": {"A": "corrente de média frequência.", "B": "corrente de alta frequência.", "C": "corrente de baixa frequência.", "D": "corrente polarizada.", "E": "corrente interferencial."}, "gabarito": "C", "fonte": "UEPA 2023", "area": "Geral"}, {"id": "UEPA_2023_31", "numero": 31, "enunciado": "O Pé Torto Congênito é uma condição de\n\nsaúde em que o tratamento conservador\n\napresenta grandes resultados e uma das\n\nformas para se atingir a correção do pé é o\né\nuso de órteses. A órtese indicada neste caso\né:", "alternativas": {"A": "SWASH.", "B": "Atlanta Brace.", "C": "Suspensório de Pavlik.", "D": "Botas semirrígidas.", "E": "Órtese de Dennis-Brown. a 32. Um grupo de atletas estava realizando auto e posturas com a finalidade de alongamento a muscular e consequente melhora do gesto e esportivo. O Fisioterapeuta dava os e comandos verbais e eles realizavam r ativamente os exercícios posturais. A técnica o utilizada pelo fisioterapeuta neste caso é: a RPG (Reeducação Postural Global). b Método Pilates. c SGA (Stretching Global Ativo). d Facilitação Neuromuscular Proprioceptiva (FNP). e Conceito Mulligan. o 33. Paciente chegou ao serviço de Fisioterapia o com queixas de dificuldade de realizar a movimentos de extensão do quadril s esquerdo. O Fisioterapeuta resolveu utilizar s um teste para avaliar a rigidez dos músculos flexores do quadril. O teste aplicado pelo profissional foi: a Teste de Thomas. b Teste de Ober. c Teste de Patric. d Teste de Gaeslen. e Teste de Renne. e 34. Devido a prática esportiva de grande r intensidade os atletas normalmente expõem s o osso a uma sobrecarga constante. Essa a constante tensão sobre essas estruturas do a corpo pode promover o desenvolvimento de o um tipo específico de fratura. O tipo de lesão acometida pelo atleta é: a fratura em galho verde. b fratura por estresse. c fratura oblíqua. d fratura exposta. e fratura cominutiva. onal em Saúde 2023 – Fisioterapia Pág."}, "gabarito": "E", "fonte": "UEPA 2023", "area": "Musculoesquelética"}, {"id": "UEPA_2023_35", "numero": 35, "enunciado": "Uma mulher de 54 anos de idade sofreu um\nacidente resultando em fratura da 5ª\nvértebra da coluna cervical, luxação do\nombro e fratura de cotovelo esquerdo. Ela\napresenta uma parestesia (alteração de\nsensibilidade) na região hipotenar, 5º dedo e\nmetade do 4º dedo, além de fraqueza da\nmusculatura da região hipotenar. O nervo\nacometido por esta lesão é o:", "alternativas": {"A": "nervo mediano.", "B": "nervo ulnar.", "C": "nervo radial.", "D": "nervo supraescapular.", "E": "nervo peitoral."}, "gabarito": "B", "fonte": "UEPA 2023", "area": "Musculoesquelética"}, {"id": "UEPA_2023_36", "numero": 36, "enunciado": "“A Artrologia ou sindesmologia é o ramo da\nanatomia que estuda as articulações do corpo\nhumano e o seu conjunto de movimentos”\nAssim, a articulação é definida como a junção\nentre dois ou mais ossos e contém várias\nfunções e formas. A alternativa que contém\numa articulação do tipo selar é:", "alternativas": {"A": "articulação glenoumeral.", "B": "articulação rádio-ulnar proximal.", "C": "articulação esternoclavicular.", "D": "articulação úmero-ulnar.", "E": "articulação patelo-femoral."}, "gabarito": "C", "fonte": "UEPA 2023", "area": "Geral"}, {"id": "UEPA_2023_37", "numero": 37, "enunciado": "Segundo a Classificação Internacional de\nFuncionalidade, Incapacidade e Saúde (CIF) a\nfuncionalidade é um termo que engloba todas\nas funções do corpo, atividades e\nparticipação. De maneira similar\nincapacidade é um termo que inclu\ndeficiências, limitação de atividades ou\nrestrição na participação. Sobre as funções\ndo corpo é correto afirmar que:", "alternativas": {"A": "são componentes externos às pessoas que transformam o ambiente físico, social e de atitudes no qual elas vivem e conduzem suas vidas.", "B": "é o envolvimento em uma situação da vida.", "C": "é a execução de uma tarefa ou ação por um indivíduo.", "D": "são as partes anatômicas do corpo como órgãos, membros ou seus componentes.", "E": "são as funções fisiológicas dos sistemas orgânicos (incluindo as funções psicológicas)."}, "gabarito": "E", "fonte": "UEPA 2023", "area": "Geral"}, {"id": "UEPA_2023_40", "numero": 40, "enunciado": "Paciente em atendimento em sala de\nurgência, com quadro de insuficiência\nrespiratória aguda, apresenta em ar\nambiente a seguinte gasometria arterial:\npH = 7,2; PaCO = 75mmHg; PaO =\n2 2\n55mmHg e HCO - = 22mEq/L. A hipoxemia\n3\napresentada na gasometria arterial está mais\nrelacionada a:", "alternativas": {"A": "hiperventilação alveolar.", "B": "hipoventilação alveolar.", "C": "alteração débito cardíaco.", "D": "agitação psicomotora.", "E": "hiperventilação e hipoventilação associada."}, "gabarito": "B", "fonte": "UEPA 2023", "area": "Cardiorrespiratória"}, {"id": "UEPA_2023_41", "numero": 41, "enunciado": "pH = 7,49; PaCO = 30mmHg; PaO =\n2 2\n60mmHg; HCO - = 29mEq/L e BE = +4. A\n3\nclassificação da gasometria arterial acima é:", "alternativas": {"A": "hipoxemia arterial.", "B": "alcalose respiratória com hipoxemia.", "C": "alcalose metabólica com hipoxemia.", "D": "alcalose mista com hipoxemia.", "E": "acidose mista com hipoxemia."}, "gabarito": "D", "fonte": "UEPA 2023", "area": "Cardiorrespiratória"}, {"id": "UEPA_2023_42", "numero": 42, "enunciado": "Paciente com 70kg (peso predito)\ndiagnóstico inicial de doença pulmonar\nobstrutiva crônica, em ventilação mecânica\ninvasiva e apresenta a seguinte gasometria\narterial: pH = 7,35; PaO = 130mmHg;\n2\nPaCO = 45mmHg e HCO - = 22mEq/L. A\n2 3\nconduta mais adequada no ventilador\nmecânico é:", "alternativas": {"A": "aumentar a PEEP.", "B": "diminuir a FiO .", "C": "diminuir volume corrente.", "D": "diminuir frequência respiratória.", "E": "aumentar a sensibilidade do ventilador."}, "gabarito": "B", "fonte": "UEPA 2023", "area": "Hospitalar / UTI"}, {"id": "UEPA_2023_43", "numero": 43, "enunciado": "A complacência pulmonar é a compreensão\ndo grau de extensão dos pulmões para cada\nvariação de pressão. A fórmula da\ncomplacência pulmonar estática é:", "alternativas": {"A": "fluxo inspiratório / pressão de pico – PEEP", "B": "fluxo inspiratório / pressão de platô – PEEP.", "C": "volume corrente / pressão de platô – PEEP.", "D": "volume corrente / pressão de pico – PEEP.", "E": "fluxo expiratório / pressão de pico – pressão de platô."}, "gabarito": "C", "fonte": "UEPA 2023", "area": "Hospitalar / UTI"}, {"id": "UEPA_2023_44", "numero": 44, "enunciado": "A utilização do manovacuômetro é\nfundamental no atendimento do paciente\ninternado em Unidade de Terapia Intensiva\ncom alterações respiratórias, porque esse\nequipamento tem a função de:", "alternativas": {"A": "treinamento dos músculos inspiratórios.", "B": "avaliação do volume corrente.", "C": "avaliação da capacidade vital forçada.", "D": "avaliação da força máxima dos músculos ventilatórios.", "E": "treinamento dos músculos expiratórios."}, "gabarito": "D", "fonte": "UEPA 2023", "area": "Hospitalar / UTI"}, {"id": "UEPA_2023_48", "numero": 48, "enunciado": "Paciente com imagem radiológica de tórax\ncom hipotransparência homogênea em\nhemitorax direito, diminuição dos espaços\nintercostais à direita, desvio do mediastino à\ndireita, elevação da hemicúpula diafragmática\ndireita e possibilidade de hiperinsuflação\npulmonar compensatória esquerda. Os\nachados radiológicos no caso acima sugerem:", "alternativas": {"A": "atelectasia à direita.", "B": "atelectasia à esquerda.", "C": "derrame pleural à direita.", "D": "derrame pleural à esquerda.", "E": "Síndrome do Desconforto Respiratório Agudo."}, "gabarito": "A", "fonte": "UEPA 2023", "area": "Hospitalar / UTI"}, {"id": "UEPA_2023_49", "numero": 49, "enunciado": "Em relação a lesão pulmonar induzida pela\nventilação mecânica é correto afirmar que:", "alternativas": {"A": "a estratégia protetora recomenda a utilização de baixos valores de volume corrente, como de 10 a 15mL/kg de peso ideal.", "B": "o volutrauma causa diminuição da permeabilidade da membrana alvéolo- capilar.", "C": "na lesão pulmonar induzida pelo ventilador mecânico ocasiona o desenvolvimento da membrana hialina.", "D": "o barotrauma é a abertura e o fechamento recorrentes de unidades pulmonares dentro do ciclo ventilatório.", "E": "o Atectrauma é conceituado como a ruptura do revestimento alveolar devido ao aumento do estresse ocasionado pela ventilação mecânica."}, "gabarito": "C", "fonte": "UEPA 2023", "area": "Hospitalar / UTI"}, {"id": "UFRJ_2021_2022_1", "numero": 1, "enunciado": "A Atenção Primária à Saúde (APS) no Brasil passou por mudanças importantes com a revisão da Política\nNacional de Atenção Básica, por meio da Portaria nº 2.436, de 21 de setembro de 2017. Considerando as alterações\nrelacionadas à dimensão organizativa e funcional e de gestão, a alternativa que aponta mudanças trazidas pela\npolítica é:", "alternativas": {"A": "são organizados entre os gestores bipartites com coordenação central do MS", "B": "obedecem apenas aos critérios de divisão por áreas programáticas dos Municípios", "C": "poderão ser interestaduais, compostos por Municípios limítrofes, por ato conjunto dos respectivos Estados em articulação com os Municípios", "D": "não estão vinculados ao ordenamento administrativo das áreas programáticas, obedecendo somente aos critérios de proximidade"}, "gabarito": "D", "fonte": "UFRJ 2021-2022", "area": "Saúde Coletiva / SUS"}, {"id": "UFRJ_2021_2022_9", "numero": 9, "enunciado": "Considerada a Constituição Cidadã, a Constituição da República Federativa do Brasil de 1988, é a lei\nfundamental e suprema do país, que recuperou e implementou direitos fundamentais de cidadania. O Sistema\nÚnico de Saúde (SUS) representa um desses direitos humanos fundamentais, sendo um de seus princípios, o\ndireito universal à saúde, o qual deve:", "alternativas": {"A": "priorizar a assistência médica aos trabalhadores rurais", "B": "ampliar a cobertura da população pela rede privada", "C": "ser garantido a todos pelo Estado, mediante políticas sociais e econômicas", "D": "considerar extratos econômicos e sociais para garantir acesso"}, "gabarito": "C", "fonte": "UFRJ 2021-2022", "area": "Neurofuncional"}, {"id": "UFRJ_2021_2022_10", "numero": 10, "enunciado": "Entre os aprendizados da Pandemia pelo Covid-19, podemos afirmar que houve um reconhecimento da atuação\nampliada do SUS para além das fronteiras da assistência à saúde. Esses atributos estão previstos no art. 200 da\nConstituição Federal, como: 3", "alternativas": {"A": "“controlar e fiscalizar procedimentos, produtos e substâncias de interesse para a saúde e participar da produção de medicamentos, equipamentos, imunobiológicos, hemoderivados e outros insumos”", "B": "“participar das ações de controle e avaliação das condições e dos ambientes de trabalho”", "C": "“os servidores que legalmente acumulam dois cargos ou empregos poderão exercer suas atividades em mais de um estabelecimento do Sistema Único de Saúde (SUS)”", "D": "“o dever do Estado não exclui o das pessoas, da família, das empresas e da sociedade”"}, "gabarito": "A", "fonte": "UFRJ 2021-2022", "area": "Saúde Coletiva / SUS"}, {"id": "UFRJ_2021_2022_11", "numero": 11, "enunciado": "A Promoção da Saúde se trata de uma importante estratégia para o enfrentamento de problemas de saúde que\nafetam a população e os seus determinantes. Essa estratégia pressupõe a:", "alternativas": {"A": "introdução de valores como qualidade de vida, solidariedade, equidade, democracia, cidadania, participação", "B": "formação de redes hierarquizada de serviços de saúde", "C": "instalação de consórcios inter federativos de saúde", "D": "organização dos serviços de saúde com ações de promoção, prevenção, assistência e reabilitação"}, "gabarito": "A", "fonte": "UFRJ 2021-2022", "area": "Saúde Coletiva / SUS"}, {"id": "UFRJ_2021_2022_12", "numero": 12, "enunciado": "A gestão do Sistema Único de Saúde é hierarquizada, com direção única em cada esfera de gestão. Os\nconsórcios Inter federativos são arranjos colaborativos entre entes federados dos diferentes níveis, com objetivo\nde:", "alternativas": {"A": "desenvolver as regiões de saúde e ampliar serviços de alta complexidade", "B": "desenvolver, em conjunto, as ações e os serviços de saúde, de caráter solidário", "C": "agregar serviços da rede privada no atendimento à população", "D": "definir as regiões de saúde de forma autônoma"}, "gabarito": "B", "fonte": "UFRJ 2021-2022", "area": "Geral"}, {"id": "UFRJ_2021_2022_13", "numero": 13, "enunciado": "O movimento das cidades saudáveis, surgido no ano de 1986, propõe uma reestruturação do sistema de saúde\ne de sua articulação com os outros sistemas, na conformação de políticas e programas integrados para o\ndesenvolvimento humano e o bem-estar. A construção do programa inclui quatro fases: Início com determinação\nde prioridades; preparação de um plano de ação; unificação dos comitês organizadores e a execução de atividades,\ne ainda:", "alternativas": {"A": "ampliação da capacidade comunitária por meio da troca de experiências interdisciplinares", "B": "elaboração de inovações tecnológicas digitais para o monitoramento das iniciativas", "C": "criação de sistemas de informação para o monitoramento e avaliação das iniciativas", "D": "mediação da população com o poder público para a capacitação em gestão pública"}, "gabarito": "C", "fonte": "UFRJ 2021-2022", "area": "Geral"}, {"id": "UFRJ_2021_2022_14", "numero": 14, "enunciado": "A “Carta de Curitiba” documento resultado da 22ª Conferência Global de Promoção da Saúde da União\nInternacional para a Promoção da Saúde e Educação (UIPES), ocorrida em 2016, reafirmou:", "alternativas": {"A": "a articulação intra e intersetoriais na busca da produção do cuidado e autonomia dos indivíduos e comunidade", "B": "a necessidade de novos paradigmas sobre a compreensão das práticas educativas em saúde", "C": "a articulação de ações de proteção às vítimas entre os setores da saúde e redes de atenção às pessoas em situação de violência", "D": "a necessidade de intervir nos determinantes e condicionantes socioambientais para a Promoção da Saúde, tendo a equidade como um ponto central"}, "gabarito": "D", "fonte": "UFRJ 2021-2022", "area": "Saúde Coletiva / SUS"}, {"id": "UFRJ_2021_2022_15", "numero": 15, "enunciado": "NÃO corresponde ao rol de atribuições competentes ao Sistema Único de Saúde, assegurados no artigo 200\nda Constituição da República Federativa do Brasil (1986):", "alternativas": {"A": "ordenar a formação de recursos humanos na área da saúde", "B": "executar as ações de vigilância sanitária e epidemiológica, com exceção da área de saúde do trabalhador", "C": "incrementar em sua área de atuação o desenvolvimento científico e tecnológico", "D": "controlar e fiscalizar procedimentos, produtos e substâncias de interesse para a saúde e participar da produção de medicamentos, equipamentos, imunobiológicos, hemoderivados e outros insumos"}, "gabarito": "B", "fonte": "UFRJ 2021-2022", "area": "Geral"}, {"id": "UFRJ_2021_2022_16", "numero": 16, "enunciado": "Segundo artigo 198 da Constituição Federal Brasileira de 1986, as ações e serviços públicos de saúde integram\numa rede regionalizada e hierarquizada e constituem um sistema único, organizado seguindo diretrizes. NÃO\ncorresponde às diretrizes citadas:", "alternativas": {"A": "atender à necessidades de recuperação dos problemas de saúde de toda a população, por meio de serviços hierarquizados por nível de complexidade", "B": "estruturar uma rede de atendimento à saúde, integrando os serviços públicos e privados disponíveis para o atendimento da população nos territórios", "C": "responder às demandas de atendimento de questões de saúde da população, com prioridade aos serviços hospitalares, que demandam mais recursos", "D": "responder às necessidades de saúde da população, não apenas por meio de uma rede integrada de serviços, mas também por meio de políticas públicas intersetoriais"}, "gabarito": "B", "fonte": "UFRJ 2021-2022", "area": "Geral"}, {"id": "UFRJ_2021_2022_21", "numero": 21, "enunciado": "Em um indivíduo com Esclerose Lateral Amiotrófica em estágio independente, a conduta mais adequada é:", "alternativas": {"A": "facilitar o treino da marcha e habilidades nas suas atividades de vida diária", "B": "treinar a transferência da cadeira de rodas para o leito", "C": "facilitar a estabilidade de tronco e cabeça", "D": "treinar a função respiratória e mudanças posturais"}, "gabarito": "A", "fonte": "UFRJ 2021-2022", "area": "Neurofuncional"}, {"id": "UFRJ_2021_2022_22", "numero": 22, "enunciado": "Considerando as Teorias do Controle Motor que norteiam a prática do fisioterapeuta, onde se tem a interação\nentre o indivíduo e o ambiente é na Teoria:", "alternativas": {"A": "hierárquica", "B": "dos Sistemas", "C": "reflexa", "D": "ecológica"}, "gabarito": "D", "fonte": "UFRJ 2021-2022", "area": "Geral"}, {"id": "UFRJ_2021_2022_23", "numero": 23, "enunciado": "Para observar a presença do sinal de Bell na Paralisia Facial Periférica a manobra a ser realizada pelo\npaciente e que o fisioterapeuta deverá observar respectivamente é:", "alternativas": {"A": "que feche os olhos, o fisioterapeuta observará o desvio do globo ocular para cima;", "B": "que feche os olhos com força, o fisioterapeuta observará que os cílios serão projetados para fora;", "C": "para olhar para cima, o fisioterapeuta observará uma distância maior da pálpebra inferior para o globo ocular comparado com o sadio;", "D": "para olhar para frente, o fisioterapeuta observará a queda da pálpebra inferior"}, "gabarito": "A", "fonte": "UFRJ 2021-2022", "area": "Geral"}, {"id": "UFRJ_2021_2022_24", "numero": 24, "enunciado": "Corresponde ao sintoma motor na doença de Parkinson:", "alternativas": {"A": "sonolência diurna", "B": "hipotensão ortostática", "C": "rigidez", "D": "disfunção sexual"}, "gabarito": "C", "fonte": "UFRJ 2021-2022", "area": "Neurofuncional"}, {"id": "UFRJ_2021_2022_25", "numero": 25, "enunciado": "Baseado no princípio da sobrecarga, para o caso de um paciente acamado sem contraindicações clínicas\npara execução de exercícios cuja principal disfunção motora é a resistência à fadiga, a ênfase para aplicação do\nexercício ativo resistido deverá ser:", "alternativas": {"A": "na diminuição do tempo da contração muscular ou do número de repetições realizadas", "B": "no aumento progressivo da quantidade de resistência aplicada e do número de repetições", "C": "na execução de movimentos em diferentes velocidades com a máxima carga possível", "D": "no aumento do tempo de manutenção da contração muscular ou do número de repetições realizadas"}, "gabarito": "D", "fonte": "UFRJ 2021-2022", "area": "Geral"}, {"id": "UFRJ_2021_2022_26", "numero": 26, "enunciado": "As diretrizes da reabilitação pós-operatória musculoesquelética podem ser divididas em fases, com metas e\nplanos de assistência de acordo com o grau de proteção das estruturas operadas. A fase em que se objetiva\nalcançar a amplitude de movimento (ADM) ativa completa ou quase completa, indolor, com a cápsula articular\nestável, é a de proteção:", "alternativas": {"A": "moderada/ mobilidade controlada", "B": "mínima / retorno à função", "C": "máxima/ mobilidade controlada", "D": "intermediária / retorno à função"}, "gabarito": "B", "fonte": "UFRJ 2021-2022", "area": "Geral"}, {"id": "UFRJ_2021_2022_27", "numero": 27, "enunciado": "A Síndrome do Túnel do Carpo é caracterizada pela perda sensitiva e fraqueza motora decorrente da\ncompressão neural no túnel do carpo. Entre os comprometimentos funcionais mais comuns estão:", "alternativas": {"A": "retração dos músculos abdutores do polegar e flexores extrínsecos", "B": "fraqueza ou hipotrofia dos músculos tênares e nos primeiros lumbricais", "C": "incapacidade de garra cilíndrica com o 4º e 5º dedo", "D": "dor e parestesia na região ulnar da mão"}, "gabarito": "B", "fonte": "UFRJ 2021-2022", "area": "Neurofuncional"}, {"id": "UFRJ_2021_2022_28", "numero": 28, "enunciado": "É comumente recomendada para reduzir a dispneia de pacientes com doença pulmonar obstrutiva crônica\n(DPOC), os quais cursam com hiperinsuflação dinâmica, resultante da limitação ao fluxo aéreo:", "alternativas": {"A": "respiração frenolabial (ou respiração com lábios semicerrados)", "B": "inspiração fracionada com volumes pulmonares altos", "C": "tapotagem", "D": "expiração lenta total com a glote aberta em decúbito infralateral (ELTGOL)"}, "gabarito": "A", "fonte": "UFRJ 2021-2022", "area": "Hospitalar / UTI"}, {"id": "UFRJ_2021_2022_29", "numero": 29, "enunciado": "O fisioterapeuta vem utilizando a pressão expiratória positiva (PEP) através de resistores lineares pressóricos\ncomo o EPAP (end positive expiratory pressure) que é constituído por máscara ou peça bucal, acoplada a uma\nválvula unidirecional e ao resistor expiratório. Pode-se afirmar que as três principais indicações para a utilização\ndo EPAP são:", "alternativas": {"A": "aumentar a pressão pleural; expandir os alvéolos; e reduzir o diâmetro transverso do tórax", "B": "aumentar o volume pulmonar (capacidade residual funcional e volume corrente), reduzir a hiperinsuflação pulmonar e melhorar a depuração da secreção das vias aéreas", "C": "aumentar o volume de reserva inspiratório; diminuir a pressão pleural e reduzir o tempo expiratório", "D": "auxiliar na remoção da secreção das vias aéreas; aumentar o volume residual e auxiliar na abertura de brônquios de pequeno calibre"}, "gabarito": "B", "fonte": "UFRJ 2021-2022", "area": "Hospitalar / UTI"}, {"id": "UFRJ_2021_2022_30", "numero": 30, "enunciado": "Sobre as recomendações para o uso dos incentivadores inspiratórios pode-se afirmar que:", "alternativas": {"A": "durante sua execução deve-se priorizar a utilização da musculatura acessória da respiração e maior trabalho respiratório", "B": "os incentivadores inspiratórios do tipo volume-dependente com capacidade de até 2500 mL são mais recomendados para uso adulto", "C": "as inspirações devem ser realizadas de maneira lenta (para garantir um fluxo laminar), profunda (para maior expansão pulmonar) e sustentada (para promover a estabilidade alveolar)", "D": "durante a utilização dos incentivadores inspiratórios do tipo fluxo-dependente, é recomendado inclinar o aparelho para diminuir o esforço inspiratório do paciente já que o deslocamento das esferas ocorre na posição vertical, contra a gravidade"}, "gabarito": "C", "fonte": "UFRJ 2021-2022", "area": "Geral"}, {"id": "UFRJ_2021_2022_31", "numero": 31, "enunciado": "A atuação do fisioterapeuta no período pré e pós-operatório de cirurgias abdominais é de grande importância.\nConsidere as seguintes afirmativas e indique a relação CORRETA:\nI - Durante o período pré-operatório o fisioterapeuta deve ensinar os exercícios de reexpansão pulmonar que\nserão realizados pelo paciente após a cirurgia\nII - O treinamento muscular inspiratório no pré-operatório tem como objetivo preservar a função muscular no pós-\noperatório evitando complicações pulmonares\nIII - A mobilização precoce e o treinamento muscular no pós-operatório podem promover melhora funcional,\ncognitiva e respiratória, bem como reduzir os riscos de estase e trombose venosa profunda\nIV - A utilização de dispositivos de PEP oscilante que auxiliam na depuração do muco respiratório somente deve\nser iniciada após o quinto dia de pós-operatório\n8", "alternativas": {"A": "I, II e III;", "B": "I, III e IV;", "C": "II, III e IV;", "D": "III e IV."}, "gabarito": "A", "fonte": "UFRJ 2021-2022", "area": "Geral"}, {"id": "UFRJ_2021_2022_32", "numero": 32, "enunciado": "Atualmente o fisioterapeuta conta com inúmeros instrumentos para a avaliação de pacientes com doenças\nrespiratórias crônicas. Nesse contexto, indique a relação CORRETA:\nA. A escala modificada do Medical Research Council (mMRC), já validada na língua portuguesa, é uma\nferramenta para avaliação subjetiva da sensação de dispneia durante atividades de vida diária\nB. O teste de avaliação da DPOC (COPD Assessment Test – CAT) deve ser preenchido pelo fisioterapeuta e\navalia três itens (tosse, expectoração e dispneia), a pontuação de cada item varia de 0 a 4 pontos sendo a\npontuação máxima de 20 pontos\nC. O teste Timed up and go (TUG) avalia de modo rápido e prático o nível de mobilidade funcional, a capacidade\nde andar, o equilíbrio dinâmico e o risco de quedas\nD.A escala de Borg avalia a percepção do grau de esforço realizado durante o exercício, com pontuação variando\nde 6 a 20 ou na versão modificada com pontuação variando de 0 a 10, sendo 0 ausência de dispneia e 10\ndispneia máxima", "alternativas": {"A": "A, B e C", "B": "A, C e D", "C": "A e C", "D": "C e D"}, "gabarito": "B", "fonte": "UFRJ 2021-2022", "area": "Cardiorrespiratória"}, {"id": "UFRJ_2021_2022_33", "numero": 33, "enunciado": "Quanto as alterações do desenvolvimento encontradas em crianças com Paralisia Cerebral (PC), analise as afirmativas\ne indique a relação CORRETA:\nI - A evidência de tônus muscular anormal, postura corporal atípica, persistência dos reflexos tônicos primitivos\nalém da faixa etária são sintomas precoces que caracterizam o desenvolvimento de uma criança com PC.\nII - A Ressonância Magnética Nuclear é considerada o exame padrão ouro para confirmação do diagnóstico de\nPC, demonstrando a área cerebral afetada em 100% dos lactentes abaixo de seis meses.\nIII - A formação de cistos periventriculares pós hemorragia cerebral é um achado em prematuros e/ou crianças de\nbaixo peso com Leucomalácia Periventricular que se desenvolvem com PC.\nIV - Classificamos a criança como PC como Espástica, hipotônica, discinética ou atáxica de acordo com a\nlocalização anatômica dos segmentos corporais afetados.\nV - A espasticidade é a anormalidade neurológica mais frequente encontrada nas crianças com paralisia cerebral\n9\ndo tipo diplégica, hemiplégica e quadriplégica", "alternativas": {"A": "I, III e V;", "B": "II, III e V;", "C": "I, III e IV;", "D": "II, IV e V."}, "gabarito": "A", "fonte": "UFRJ 2021-2022", "area": "Neurofuncional"}, {"id": "UFRJ_2021_2022_34", "numero": 34, "enunciado": "Correlacione as colunas e indique a sequência CORRETA:\n1 - Teoria dos Sistemas Dinâmicos ( ) A sequência do desenvolvimento se estabelece\nde forma hierárquica a partir da maturação do\nSistema Nervoso Central.\n2 - Teoria Comportamental ( ) O desenvolvimento infantil ocorre em um fluxo\nnão linear de aquisições, resultante da influência\nde fatores intrínsecos e extrínsecos ao indivíduo.\n3 - Teoria Maturacional ( ) Na ausência de estimulação aferente, circuitos\nneurais especializados continuam produzindo\nmovimentos rítmicos como a locomoção.\n4 - Geradores de ( ) A modificação no desenvolvimento ocorre por\nPadrão Central influência de estímulos ambientais que reforçam\nou reduzem um determinado comportamento.", "alternativas": {"A": "1, 2, 4,", "B": "4, 3, 2,", "C": "3, 1, 4,", "D": "3, 2, 1,"}, "gabarito": "C", "fonte": "UFRJ 2021-2022", "area": "Geral"}, {"id": "UFRJ_2021_2022_35", "numero": 35, "enunciado": "Lactente com 11 meses de idade cronológica chega para avaliação fisioterapêutica, com diagnóstico de\nSíndrome de Down e queixa de atraso no desenvolvimento motor global. O exame físico apresentou redução\nimportante do tônus muscular global, com hipermobilidade articular mais acentuada em membros inferiores\n(articulações coxofemorais e tíbio-társica). Demonstrou controle insuficiente de cabeça na posição prona,\nchorando na posição e elevando-a por períodos breves. Em supino, acompanhou os objetos na linha horizontal e\nlevou as mãos na linha média para alcance do brinquedo. Demonstrou iniciativa para rolar de supino para prono,\nchegando apenas ao decúbito lateral direito. Traz a cabeça com atraso na passagem de supino para sentado,\nnão conseguindo permanecer sentado sem auxílio, demonstrando grande instabilidade na posição. Colocado na\nposição de pé não demonstrou prontidão para a postura, abduzindo os membros inferiores, recusando o apoio\npodal com carga. Questionada quanto ao comportamento e interesse do filho pelos brinquedos e pessoas da\ncasa, mãe relatou que tem outros dois filhos pequenos, em idade pré-escolar e que vem encontrando dificuldades\npara estimular a criança, informando que a mesma permanece a maior parte do tempo deitada na cama ou\nposicionada em uma cadeirinha reclinada. Informou também, que evita a colocação em prono em virtude de a 10\ncriança apresentar refluxo. Considerando os critérios da CIF(classificação internacional de funcionalidade), pode-\nse afirmar que:", "alternativas": {"A": "a hipotonia e a hipermobilidade são consideradas fatores pessoais que provocam as limitações nas atividades e restrição a participação", "B": "os comportamentos adotados pela mãe para estimular a criança são fatores contextuais que estão favorecendo a participação nas atividades", "C": "estimular o controle de cabeça em prono, e aquisição da postura sentada e de pé, podem reduzir o atraso e melhorar atividade e participação", "D": "estimular a utilização de dispositivos e telas quando ele está na cadeirinha é uma orientação que facilitará o desenvolvimento e a participação"}, "gabarito": "C", "fonte": "UFRJ 2021-2022", "area": "Neurofuncional"}, {"id": "UFRJ_2021_2022_36", "numero": 36, "enunciado": "As distrofias musculares são desordens clínicas, de caráter hereditário, caracterizadas pela degeneração\nmuscular progressiva associada a um padrão distrófico identificado na biópsia do musculo. A Distrofia muscular\nde Duchenne (DMD) é a mais observada na infância, com caráter degenerativo ascendente, causando\nincapacidade severa ao longo dos anos, pode
