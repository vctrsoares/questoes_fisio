os de Saúde (NR 32), os agentes\nbiológicos são classificados em classes de risco.\nAssinale a opção que apresenta um risco classe 2.", "alternativas": {"A": "Risco individual moderado para o trabalhador, mas com alta probabilidade de disseminação para a coletividade. Pode causar doenças ao ser humano, para as quais existem meios eficazes de profilaxia ou tratamento.", "B": "Baixo risco individual para o trabalhador e para a coletividade, mas com moderada probabilidade de causar doença ao ser humano.", "C": "Risco individual moderado para o trabalhador e com baixa probabilidade de disseminação para a coletividade. Pode causar doenças ao ser humano, para as quais existem meios eficazes de profilaxia ou tratamento.", "D": "Risco individual moderado para o trabalhador e com moderada probabilidade de disseminação para a coletividade. Pode causar doenças ao ser humano, para as quais nem sempre existem meios eficazes de profilaxia ou tratamento.", "E": "Baixo risco individual para o trabalhador e com probabilidade de moderada disseminação para a coletividade. Pode causar doenças ao ser humano, para as quais existem meios eficazes de profilaxia, mas nem sempre de tratamento."}, "gabarito": "C", "fonte": "ENR FGV 2024/2025 Tipo 1", "area": "Geral"}, {"id": "ENR_FGV_2024_2025_Tipo_1_18", "numero": 18, "enunciado": "Segundo a NR 32, assinale a opção que apresenta apenas agentes\nbiológicos.", "alternativas": {"A": "Microrganismos (geneticamente modificados ou não); tecidos orgânicos; culturas de células; vetores e príons.", "B": "Microrganismos (geneticamente modificados ou não); parasitas; culturas de células; toxinas e príons.", "C": "Microrganismos (geneticamente modificados ou não); tecidos orgânicos; parasitas; vetores e toxinas.", "D": "Microrganismos (geneticamente modificados ou não); culturas de células; vetores; tecidos orgânicos e toxinas.", "E": "Microrganismos (geneticamente modificados ou não); tecidos orgânicos; vetores; toxinas e príons."}, "gabarito": "B", "fonte": "ENR FGV 2024/2025 Tipo 1", "area": "Geral"}, {"id": "ENR_FGV_2024_2025_Tipo_1_19", "numero": 19, "enunciado": "Segundo o Programa Nacional de Segurança do Paciente (PNSP),\nassinale a opção que indica a cor obrigatória da pulseira de\nidentificação do paciente.", "alternativas": {"A": "Azul.", "B": "Amarela.", "C": "Vermelha.", "D": "Branca.", "E": "Verde."}, "gabarito": "D", "fonte": "ENR FGV 2024/2025 Tipo 1", "area": "Geral"}, {"id": "ENR_FGV_2024_2025_Tipo_1_20", "numero": 20, "enunciado": "Segundo o Art. 3º, inciso IV, da RDC nº 36/2013, assinale a opção\nque apresenta o conceito de evento adverso.", "alternativas": {"A": "O comprometimento da estrutura ou da função do corpo e/ou qualquer efeito dele oriundo.", "B": "O efeito que surge por meio de alguma reação distinta daquela que produz o efeito terapêutico.", "C": "O efeito causado por fármaco que leva ou pode levar a um desfecho negativo.", "D": "A ocorrência imprevista que acontece durante a assistência à saúde.", "E": "O evento ou circunstância que resulte em dano à saúde."}, "gabarito": "E", "fonte": "ENR FGV 2024/2025 Tipo 1", "area": "Neurofuncional"}, {"id": "ENR_FGV_2024_2025_Tipo_1_21", "numero": 21, "enunciado": "A Biomecânica Clínica apoia-se na observação dos movimentos\nrealizados pelos indivíduos para detecção de possíveis alterações\ndo padrão de movimento e deve ser considerada com uma\nimportante ferramenta durante a avaliação cinético-funcional.\nSobre a biomecânica da coluna vertebral, assinale a afirmativa\ncorreta.", "alternativas": {"A": "Os músculos trapézio e escaleno anterior podem ser considerados como agonistas do movimento de flexão.", "B": "O músculo elevador da escápula é antagonista do movimento extensão da coluna cervical e usualmente apresenta envolvimento nas queixas de dor cervical.", "C": "A coluna cervical apresenta, durante o movimento de flexão, um pequeno deslizamento anterior de uma vértebra sobre a outra.", "D": "O movimento de extensão da coluna cervical deve evidenciar uma amplitude total de, aproximadamente, 90 graus e seu principal músculo estabilizador é o grande dorsal.", "E": "A coluna cervical tem poucos graus de liberdade e, por isso, é uma região estável com baixa prevalência de disfunções, se observamos o percentual de distúrbios musculoesqueléticos da população adulta."}, "gabarito": "C", "fonte": "ENR FGV 2024/2025 Tipo 1", "area": "Musculoesquelética"}, {"id": "ENR_FGV_2024_2025_Tipo_1_22", "numero": 22, "enunciado": "A respeito da abordagem biopsicossocial em pacientes com\nqueixa de dor crônica musculoesquelética, os fisioterapeutas\ndevem avaliar todos os aspectos envolvidos neste perfil de\npaciente.\nNesse sentido, é de extrema importância o conhecimento sobre a\nneurofisiologia e as técnicas de abordagem terapêutica para\npacientes com dor crônica musculoesquelética.\nAssim, os pacientes com dor crônica podem apresentar", "alternativas": {"A": "sensibilização central, que pode ser explicado pela Teoria das Comportas. A abordagem multiprofissional deve ser considerada e as técnicas de cinesioterapia são contraindicadas para esses pacientes.", "B": "sensibilização. Trata-se de uma explicação plausível para os sintomas difusos e a abordagem multiprofissional deve ser considerada e as técnicas de cinesioterapia são recomendadas, mesmo havendo quadro de cinésiofobia.", "C": "hiperalgesia. Devido ao padrão neuropático que as alterações neurofisiológicas causam, as técnicas de cinesioterapia são contraindicadas, enquanto as abordagens com educação em dor não costumam ser efetivas devido ao comportamento depressivo desses pacientes.", "D": "sensibilização central. Este quadro gera dor neuropática, alteração de humor e quadro depressivo. A abordagem multiprofissional não é recomendada especificamente para estes casos, pois a opinião de diferentes profissionais de saúde pode dificultar o diagnóstico e piorar os sintomas.", "E": "sensibilização central e dor nociplástica. Como esse padrão de dor pode gerar alteração proprioceptiva e de controle de movimento, a abordagem multiprofissional deve ser considerada e as técnicas de cinesioterapia são recomendadas, desde que não exacerbem a dor. Abordagens de educação em dor devem também ser inseridas nos programas de reabilitação."}, "gabarito": "E", "fonte": "ENR FGV 2024/2025 Tipo 1", "area": "Neurofuncional"}, {"id": "ENR_FGV_2024_2025_Tipo_1_23", "numero": 23, "enunciado": "R.S.V, 42 anos, sexo masculino, ao perceber que estava com\nsobrepeso, decidiu iniciar prática de atividade física regular com\ntreino de exercícios funcionais, seguindo orientações de um\nprofissional que oferece treinamentos remotos (on-line). O\nprofissional o orientou a fazer treinamentos de intensidade\nmoderada, combinando movimentos para os membros\nsuperiores e para os inferiores, pois haveria uma maior queima\nde gordura.\nNo primeiro dia, após o final do treino, cursou com dor leve em\nregião lombar e dor intensa na região de bíceps braquial, o que\nimpedia que ele realizasse as atividades diárias. No mesmo dia, o\nortopedista que o examinou solicitou uma ultrassonografia (US)\nda região lesionada. A US, realizada no dia seguinte, evidenciou\numa lesão muscular Grau II em bíceps braquial, com presença\nmoderada de hemorragia e processo inflamatório local.\nConsiderando os aspectos apresentados no caso clínico, a\ncrioterapia pode ser indicada para esse paciente, porque ela", "alternativas": {"A": "aumenta o extravasamento de líquido intersticial, melhorando o processo inflamatório e o quadro álgico.", "B": "pode intensificar a inflamação inicialmente, mas, após 48 horas, desencadeia um efeito reverso, com melhora do processo inflamatório.", "C": "pode realizar a drenagem linfática local, já que irá facilitar a condutibilidade neural no sistema nervoso periférico e no sistema nervoso autônomo.", "D": "diminui o metabolismo local e a velocidade de condução dos impulsos nervosos, atenuando a hipóxia tecidual secundária à lesão e melhorando o quadro doloroso.", "E": "reduz o limiar de dor e promove a drenagem linfática, respostas que auxiliarão na melhora da mobilidade articular e no ganho de força muscular."}, "gabarito": "D", "fonte": "ENR FGV 2024/2025 Tipo 1", "area": "Neurofuncional"}, {"id": "ENR_FGV_2024_2025_Tipo_1_24", "numero": 24, "enunciado": "Paciente do sexo masculino, 49 anos, diagnosticado com lesão do\ntendão do calcâneo à direita, realizou intervenção cirúrgica para\ntenorrafia e foi liberado para fisioterapia.\nDez semanas após a cirurgia, o paciente ainda se queixa de dor e\nde dificuldade para deambulação. Ao exame físico apresenta:\ngoniometria passiva para dorsiflexão: 12o; cicatriz sem presença\nde sinais flogísticos, porém com aderência; força muscular para\nplantiflexão: grau III.\nQuanto à abordagem fisioterapêutica para este paciente, assinale\na afirmativa correta.", "alternativas": {"A": "A terapia por infravermelho é adequada, pois promove analgesia, vasoconstricção local e diminuição do edema.", "B": "A melhor conduta é a mobilização articular, devido a seu efeito anti-inflamatório e ao impacto direto no ganho da força muscular.", "C": "Os exercícios resistidos em cadeia cinemática fechada mesmo com dor, devem ser realizados, devido aos seus efeitos diretos na cicatriz e no arco de movimento.", "D": "A mobilização passiva (artrocinemática e osteocinemática) em tornozelo direito é a conduta adequada, devido ao seu efeito no tecido conjuntivo e também na modulação da dor.", "E": "A crioterapia é indicada, já que nessa fase da lesão, a vasoconstricção e a redução da velocidade de condução dos impulsos nervosos causados pela crioterapia melhorarão diretamente a amplitude de movimento."}, "gabarito": "D", "fonte": "ENR FGV 2024/2025 Tipo 1", "area": "Neurofuncional"}, {"id": "ENR_FGV_2024_2025_Tipo_1_25", "numero": 25, "enunciado": "Bruna, 33 anos, vem se queixando-se de desconforto em seu\nombro direito e antebraço direito ao realizar tarefas diárias,\ncomo pentear seu cabelo, vestir roupas íntimas, escrever e\ndigitar. Na anamnese relatou ainda presença de parestesia na\nmão direita, mais intensa nos dois primeiros dedos.\nNo exame físico, os testes de dermátomo e miótomo\napresentaram-se normais. Entretanto, o teste neurodinâmico\npara o nervo mediano foi positivo, evidenciando um diagnóstico\nde tensão neural adversa. Além disso, também foi observado\nhiperatividade muscular em trapézio superior e elevador da\nescápula homolateral à queixa.\nNesse cenário clínico, assinale a opção que apresenta o\nprocedimento da equipe de Fisioterapia.", "alternativas": {"A": "Aplicar técnicas de recrutamento muscular para o músculo peitoral maior, pois assim, haverá uma inibição nos músculos hiperativos e consequentemente menor compressão neural.", "B": "Mobilizar passivamente a articulação gleno-umeral, com fortalecimento muscular e mobilização neural em todos os nervos do membro superior direito, para que o deslizamento do nervo mediano possa ser potencializado.", "C": "Aplicar técnica de mobilização neural do nervo mediano, de inibição neuromuscular nas áreas hiperativas e realizar exercícios ativos livres, considerando que não deve haver dor intensa durante a realização do tratamento.", "D": "Usar o TENS convencional, pois trata-se de uma corrente que pode auxiliar na melhora do processo inflamatório, na cicatrização tecidual e, consequentemente, na melhora da parestesia do paciente.", "E": "Tratar, inicialmente, da tensão neural adversa e, em seguida, utilizar exercícios para fortalecimento muscular, mesmo com leve quadro álgico e parestesia. As técnicas de fortalecimento irão auxiliar na mobilidade neural e no ajuste do tônus muscular de repouso."}, "gabarito": "C", "fonte": "ENR FGV 2024/2025 Tipo 1", "area": "Neurofuncional"}, {"id": "ENR_FGV_2024_2025_Tipo_1_26", "numero": 26, "enunciado": "Paciente de 46 anos, professora, casada, sem filhos, há 2 meses\nvem se queixando de fadiga, poliartralgia simétrica em\narticulações interfalangianas distais e joelhos, que melhoram\nparcialmente com o uso de anti-inflamatórios. Queixa-se ainda de\nrigidez matinal de, aproximadamente, 15 minutos, e dificuldade\npara realizar atividades de vida diária e laborais.\nAo exame físico, apresenta dificuldade para realizar preensão\npalmar e oponência em ambas as mãos.\nConsiderando as informações apresentadas, assinale a opção que\nindica o provável diagnóstico clínico.", "alternativas": {"A": "Esclerodermia.", "B": "Artrite reumatoide.", "C": "Artrose sistêmica.", "D": "Doença de Dupuytren.", "E": "Síndrome do túnel do carpo."}, "gabarito": "B", "fonte": "ENR FGV 2024/2025 Tipo 1", "area": "Neurofuncional"}, {"id": "ENR_FGV_2024_2025_Tipo_1_27", "numero": 27, "enunciado": "Janice, 49 anos, viúva, com sobrepeso, apresenta histórico de dor\ncervical irradiada para membros superior esquerdo e\npoliartralgia.\nApós diversos exames, recebeu diagnóstico de Lúpus Eritematoso\nSistêmico (LES), e, após ter recebido esse diagnóstico, sua\nqualidade de vida vem piorando bastante.\nO LES é uma doença inflamatória crônica que afeta múltiplos\nsistemas do corpo, com etiologia desconhecida e caráter\nautoimune.\nAssinale a opção que indica o adequado gerenciamento clínico\nadotado pelo fisioterapeuta.", "alternativas": {"A": "O diagnóstico da doença pode ser confirmado por meio de ressonância magnética, considerado o padrão ouro para essa doença, mas, também, por sinais clínicos.", "B": "O LES interfere em diversos sistemas do corpo humano, podendo haver manifestações cutâneas, articulares, renais e hematológicas.", "C": "A dor durante a prática regular de atividade física moderada pode servir como uma ferramenta de diagnóstico diferencial, pois é bem característica dessa doença.", "D": "O exame complementar é primordial para o diagnóstico. Os sinais clínicos, como dor localizada, parestesia e depressão sem cauda aparente, podem também ser utilizados.", "E": "O desequilíbrio na produção de anticorpos pode causar inflamação em diversos órgãos. Os recursos mais modernos, como a biofotomodulação, podem servir como ferramentas de avaliação."}, "gabarito": "B", "fonte": "ENR FGV 2024/2025 Tipo 1", "area": "Neurofuncional"}, {"id": "ENR_FGV_2024_2025_Tipo_1_28", "numero": 28, "enunciado": "Os exames complementares são ferramentas importantes para o\ndiagnóstico diferencial do fisioterapeuta. Eles devem ser\nsolicitados principalmente quando há existência de lesões\nestruturais, que comprometam estruturas articulares e de tecidos\nmoles.\nConsiderando as contribuições dos exames de imagem para a\navaliação cinético-funcional, suas indicações e principais\ncaracterísticas, assinale a afirmativa correta.", "alternativas": {"A": "A radiografia pode identificar uma fratura óssea como uma imagem radiopaca sobreposta ao tecido ósseo; os ossos longos, normalmente, mostram-se radiotrasparentes, na radiografia.", "B": "A ultrassonografia pode auxiliar na identificação de lesões ligamentares; as lesões grau II, geralmente apresentam imagens hiperecoicas, que são associadas à coleção de líquido inflamatório.", "C": "A radiografia é adequada para estudar lesões ósseas; ela tem boa acurácia para identificar lesões nos discos intervertebrais e processos inflamatórios nos tendões do manguito rotador.", "D": "A imagem de ressonância magnética apresenta boa acurácia para avaliar tecidos moles; o diagnóstico de uma hérnia de disco pode ser confirmado com identificação de uma imagem hipointensa, que diminui o espaço do canal medular e comprime o saco dural.", "E": "A Tomografia Computadorizada (TC) só consegue fornecer imagens adequadas de músculos, ossos e articulações quando é realizada em conjunto com o meio de contraste; na TC, a representação normal do tecido ósseo é identificada nos laudos como uma estrutura hipodensa."}, "gabarito": "D", "fonte": "ENR FGV 2024/2025 Tipo 1", "area": "Neurofuncional"}, {"id": "ENR_FGV_2024_2025_Tipo_1_29", "numero": 29, "enunciado": "Jorge, 71 anos, ex-atleta de vôlei, possui sinais radiológicos\nindicativos de osteoartrose moderada em ombro esquerdo\n(articulação acrômio-clavicular), acompanhada de sintomatologia\ncaracterizada por hipomobilidade articular e dor localizada, que\npiora ao permanecer no computador por longos períodos e\ntambém à noite ao dormir.\nNa avaliação clínica, verificou-se ainda paresia para realizar o\nmovimento de rotação externa de ombro, além de redução da\namplitude articular para flexão e abdução de ombro esquerdo.\nConsiderando a fisiopatologia da osteoartrose e o quadro clínico\ndesse paciente, assinale a opção que indica, corretamente, as\ncondutas fisioterápicas pertinentes.", "alternativas": {"A": "Fortalecimento da musculatura de manguito rotador, por meio da realização de exercícios funcionais; mobilização da articulação escapulo-torácica; utilização de TENS para alívio do quadro álgico.", "B": "Uso de termoterapia na modalidade de calor profundo no ombro afetado; uso de órteses de imobilização articular; exercícios isométricos para musculatura estabilizadora de escápula.", "C": "Aplicação de técnicas de Tapping e crioterapia na região lateral de ombro esquerdo; orientações para manter-se inativo, com o braço na tipoia quando for se deslocar na rua.", "D": "Orientações para utilização de anti-inflamatório de uso tópico; uso de órteses de imobilização à noite; exercícios terapêuticos em cadeia cinemática fechada.", "E": "Fortalecimento dos músculos do ombro; ultrassom no modo contínuo na região afetada; orientações sobre manter-se em repouso com o uso de tipoia durante suas atividades de vida diária."}, "gabarito": "A", "fonte": "ENR FGV 2024/2025 Tipo 1", "area": "Musculoesquelética"}, {"id": "ENR_FGV_2024_2025_Tipo_1_30", "numero": 30, "enunciado": "A Síndrome da Imobilidade Prolongada é entendida como um\nconjunto de disfunções devido ao tempo prolongado de\ninternação hospitalar e à postura acamada. Essa condição\nproporciona redução na capacidade funcional dos pacientes e\nalterações em diversos sistemas do corpo humano. A atuação\nfisioterapêutica nestes casos é fundamental para evitar ou\nminimizar os efeitos da síndrome do imobilismo.\nSobre a síndrome do imobilismo e a correta abordagem\nfisioterapêutica, assinale a afirmativa correta.", "alternativas": {"A": "Os exercícios aeróbicos são contraindicações absolutas, pois a condição de saúde destes indivíduos não gera gasto enérgico compatível com a necessidade da realização dessas técnicas.", "B": "A sedestação beira leito deve ser estimulada pelo fisioterapeuta nos casos em que não há contraindicação clínica. Essa abordagem potencializa o recrutamento muscular e o controle de tronco.", "C": "Os exercícios de marcha estacionária devem ser realizados com esses pacientes. A falta de controle de tronco e a dor são aspectos que não devem inviabilizar este tipo de treinamento.", "D": "Os exercícios ativos podem acarretar excesso de gasto energético e devem ser evitados, independentemente do estado clínico do paciente.", "E": "O alongamento muscular deve ser realizado com cautela, ainda que estimule o aumento do número de sarcômeros em paralelo, porque pode gerar pequenas lesões no tecido conjuntivo, e, consequentemente, dor."}, "gabarito": "B", "fonte": "ENR FGV 2024/2025 Tipo 1", "area": "Cardiorrespiratória"}, {"id": "ENR_FGV_2024_2025_Tipo_1_31", "numero": 31, "enunciado": "As diretrizes brasileiras de hipertensão arterial recomendam que\no atendimento dos profissionais da saúde à população deve ter\ncomo principais orientações, a manutenção de peso dentro da\nfaixa de normalidade, o aumento do consumo de frutas e\nvegetais e a diminuição do consumo de sódio na dieta. Além\ndisso, estratégias de atuação via equipe multiprofissional\ntambém são estimuladas.\nSobre essas diretrizes, assinale a afirmativa correta.", "alternativas": {"A": "Hipertensão arterial é a condição clínica multifatorial caracterizada por elevação sustentada dos níveis pressóricos ≥ 150 e/ou 90 mmHg. O exercício aeróbico não é indicado para essa população.", "B": "As campanhas de prevenção e de combate à hipertensão são estratégias eficientes para que os pacientes recebam informações de saúde, com importante atuação dos profissionais de Fisioterapia nesse contexto.", "C": "Alguns dos fatores de risco, como idade, etnia, baixa ingestão de sal e sedentarismo, explicam porque as doenças cardiovasculares são a terceira causa de mortalidade no Brasil.", "D": "Os indivíduos devem realizar, pelo menos, 30 minutos por semana de atividade física moderada e reduzir o comportamento sedentário, levantando-se por 3 minutos a cada 60 minutos sentado.", "E": "Mesmo com uma pequena elevação da pressão arterial, até 160/105 mmHg, deve-se realizar o treinamento regulamente, porque os benefícios a longo prazo são maiores do que o risco de um evento adverso."}, "gabarito": "B", "fonte": "ENR FGV 2024/2025 Tipo 1", "area": "Cardiorrespiratória"}, {"id": "ENR_FGV_2024_2025_Tipo_1_32", "numero": 32, "enunciado": "O fisioterapeuta do Núcleo de Apoio à Saúde da Família (NASF) é\nchamado pela equipe da Estratégia da Saúde da Família (ESF)\npara avaliar um jovem de 22 anos de idade que, há seis meses,\nsofreu um traumatismo crânio-encefálico.\nEm visita domiciliar, ao realizar o exame físico, foi constatado que\no paciente se apresentava estável e orientado, sem deformidades\narticulares, com espasticidade de grau 1 pela Escala de Ashworth,\nem músculos flexores de membro superior esquerdo e\nextensores de membro inferior esquerdo, e normotonia em\nhemicorpo direito. Observou-se ainda que ele consegue\npermanecer em pé sem apoio por até 20 segundos, com descarga\nde peso predominantemente em membro inferior direito, e só\nrealiza marcha com apoio de familiares. Como apresenta pé\nequino, recebeu há um mês uma órtese tornozelo-pé (AFO) pelo\nSUS.\nA respeito da competência do fisioterapeuta do NASF no caso, de\nacordo com a legislação, assinale a afirmativa correta.", "alternativas": {"A": "Realizar o atendimento domiciliar continuado do paciente, com o objetivo inicial de adquirir marcha extra-domiciliar independente.", "B": "Orientar a família quanto ao uso da AFO e encaminhar o paciente para avaliação e conduta de Fisioterapia em nível secundário.", "C": "Contactar a unidade de fisioterapia mais próxima e encaminhar o paciente para atendimento ambulatorial com prescrição de exercícios para adquirir marcha domiciliar independente.", "D": "Realizar o atendimento continuado do paciente na Unidade Básica de Saúde mais próxima, com objetivo de diminuir a espasticidade e adquirir a marcha independente.", "E": "Orientar a família quanto ao uso da AFO e em seguida agendar atendimentos domiciliares continuados, com o objetivo de diminuir a espasticidade e adquirir a marcha independente."}, "gabarito": "B", "fonte": "ENR FGV 2024/2025 Tipo 1", "area": "Neurofuncional"}, {"id": "ENR_FGV_2024_2025_Tipo_1_33", "numero": 33, "enunciado": "A Política Nacional de Atenção Integral à Saúde da Mulher (2004)\nprevê a atenção integral à mulher, incluindo o período do\nclimatério.\nAs diretrizes terapêuticas sugerem que a atividade física deve ser\num dos recursos indicados para a promoção da saúde feminina\nno climatério. O fisioterapeuta, ao atuar na atenção primária,\npode contribuir com orientação de exercícios terapêuticos e\neducação em saúde na modalidade coletiva.\nConsiderando os efeitos da baixa de estrogênio na estrutura\nóssea de mulheres climatéricas, assinale a opção que apresenta a\norientação que o fisioterapeuta deve prestar às usuárias em\nacompanhamento pelas clínicas da família.", "alternativas": {"A": "Na osteopenia recomendam-se exercícios ativos assistidos sem sobrecarga, pois os ossos frágeis podem ser facilmente fraturados.", "B": "Na osteopenia são recomendados exercícios físicos, mas em casos da osteoporose recomenda-se o repouso, devido fragilidade óssea.", "C": "Tanto na osteopenia quanto na osteoporose recomenda-se evitar o gasto energético e priorizar exercícios de fortalecimento muscular com pliometria.", "D": "Na osteopenia não são recomendados, inicialmente, exercícios com impacto, como caminhada e musculação. Em seguida, pode-se progredir para aumento da carga com exercícios de impacto e hidroterapia.", "E": "Na osteopenia são recomendados exercícios com carga para melhorar a resistência óssea, já que podem promover mudanças na matriz óssea e podem contribuir para melhora das áreas afetadas."}, "gabarito": "E", "fonte": "ENR FGV 2024/2025 Tipo 1", "area": "Musculoesquelética"}, {"id": "ENR_FGV_2024_2025_Tipo_1_34", "numero": 34, "enunciado": "A marcha humana normal divide-se em fase de apoio e fase de\nbalanço. Em indivíduos com desgaste articular avançado, pode\nhaver alterações na biomecânica inerente a essas fases e também\na algumas sub-fases da marcha.\nEm relação à marcha humana fisiológica e suas possíveis\nalterações, assinale a afirmativa correta.", "alternativas": {"A": "As fases de balanço e apoio representam respectivamente 62% e 38% do ciclo total da marcha.", "B": "Os indivíduos com gonartrose em estágio avançado apresentam uma fase de balanço maior do que a fase de apoio.", "C": "Na gonartrose, a marcha é a única variável da avaliação musculoesquelética que, geralmente, não apresenta nenhuma alteração.", "D": "A marcha com um padrão de duplo apoio aumentado é característica do paciente com gonartrose avançada, assim como dos indivíduos idosos.", "E": "A marcha de indivíduos com gonartrose possui uma fase de balanço aumentada devido ao equilíbrio prejudicado que, usualmente, pode ser observado nesses pacientes."}, "gabarito": "D", "fonte": "ENR FGV 2024/2025 Tipo 1", "area": "Musculoesquelética"}, {"id": "ENR_FGV_2024_2025_Tipo_1_35", "numero": 35, "enunciado": "Vera trabalha como agente comunitária em um posto de saúde e\nao visitar a família do Sr. Jefferson identificou que, após ter\nsofrido um Acidente Isquêmico Transitório há 5 meses, não\nconsegue controlar sua pressão arterial.\nVera, então, encaminhou o paciente para acompanhamento no\ngrupo de Hiperdia. O fisioterapeuta iniciou um trabalho\npreventivo com o Sr. Jefferson.\nCom relação à prevenção primária, assinale a opção que\napresenta a orientação do fisioterapeuta para os pacientes do\nprograma Hiperdia.", "alternativas": {"A": "Indicar técnicas de treinamento muscular e informar que exercícios de equilíbrio são contraindicados para pacientes com hipertensão arterial.", "B": "Avaliar a prática de atividade física, educando sobre como esta diminui a pressão arterial de modo agudo. Assim, a pressão arterial só precisa ser aferida no início do atendimento.", "C": "Apresentar os fatores de risco da hipertensão arterial, tais como, hereditariedade, alimentação contendo sal, hábito de fumar e praticar atividade física em excesso.", "D": "Informar que a hipertensão pode ser tratada por medicamentos específicos, mas que estes podem apresentar efeitos colaterais e até piorar a qualidade de vida, pois geram aumento do débito cardíaco.", "E": "Mostrar a importância das consultas de rotina, de manter-se ativo durante suas atividades de vida diária, do uso correto dos medicamentos e do controle dos fatores de risco para hipertensão arterial."}, "gabarito": "E", "fonte": "ENR FGV 2024/2025 Tipo 1", "area": "Geral"}, {"id": "ENR_FGV_2024_2025_Tipo_1_36", "numero": 36, "enunciado": "Sr. Gilberto, 68 anos, com sobrepeso, possui sinais radiológicos\nde lesões articulares indicativos de osteoartrose moderada no\njoelho esquerdo, acompanhada de sintomatologia caracterizada\npor rigidez articular e dor localizada, que piora ao permanecer\nem uma única posição por longo período.\nNa avaliação clínica, verificou-se, ainda, hipotrofia do quadríceps\nesquerdo, crepitação no joelho, intensidade de dor alta (escala\nnumérica de dor: 7), redução da amplitude articular e da\npercepção cinestésica, fato que está promovendo insegurança\npara realizar atividades da vida diária.\nConsiderando a fisiopatologia da osteoartrose e o quadro clínico\ndesse paciente, assinale a opção que indica as condutas\npertinentes ao tratamento fisioterapêutico.", "alternativas": {"A": "Mobilização artrocinemática nas articulações fêmoro-patelar e fêmoro-tibial; fortalecimento da musculatura proximal de membro inferior esquerdo por meio de exercícios isométricos e isotônicos.", "B": "Termoterapia na modalidade de calor profundo no joelho afetado; uso de órteses de imobilização articular em períodos agudos da doença; exercícios isométricos para o quadríceps.", "C": "Orientações ao paciente e à sua família sobre a evolução da osteoartrose e encaminhamento do paciente a um ortopedista para realizar uma artroplastia de joelho.", "D": "Prescrição de exercícios de alto impacto como a hidroginástica; recomendação de uso de calçados com solado mais rígido para garantir maior firmeza durante a marcha; uso de órteses para imobilização da região afetada.", "E": "Recomendação de uso de dispositivo auxiliar para marcha homolateral à articulação afetada; utilização de técnicas de fortalecimento muscular do quadríceps baseadas em exercícios excêntricos; uso de eletroterapia para alívio da sintomatologia dolorosa."}, "gabarito": "A", "fonte": "ENR FGV 2024/2025 Tipo 1", "area": "Musculoesquelética"}, {"id": "ENR_FGV_2024_2025_Tipo_1_37", "numero": 37, "enunciado": "As alterações biomecânicas da articulação do quadril podem\ngerar diversas queixas nos pacientes nas articulações dos\nmembros inferiores. A musculatura desta região possui ainda\ngrande importância para o controle de tronco dos pacientes com\ndistúrbios musculoesqueléticos.\nAlguns testes funcionais devem ser conhecidos pelos\nfisioterapeutas para avaliar esta articulação tão importante para\na estabilidade dos membros inferiores.\nNesse sentido, sobre o Teste de Trendelenburg, assinale a\nafirmativa correta.", "alternativas": {"A": "É usado para avaliar a força do musculo glúteo máximo. O músculo avaliado é o do membro inferior que está apoiado no chão. Sua deficiência causa báscula para o mesmo lado acometido.", "B": "É usado para avaliar a força do musculo glúteo médio. O musculo avaliado é o do membro inferior que não está apoiado no chão. Sua deficiência causa báscula para o lado acometido.", "C": "É usado para avaliar a força do musculo glúteo médio. O músculo avaliado é o do membro inferior que está apoiado no chão. Sua deficiência causa báscula da pelve para o lado contralateral ao acometido.", "D": "É usado para avaliar a força do músculo glúteo mínimo. O musculo avaliado é o do membro inferior que não está apoiado no chão. Sua deficiência causa báscula para o lado acometido.", "E": "É usado para avaliar a força do musculo glúteo lateral. O musculo avaliado é o do membro inferior que está apoiado no chão. Sua deficiência causa báscula para o lado contralateral ao acometido."}, "gabarito": "C", "fonte": "ENR FGV 2024/2025 Tipo 1", "area": "Musculoesquelética"}, {"id": "ENR_FGV_2024_2025_Tipo_1_38", "numero": 38, "enunciado": "Sr. João, 73 anos, apresenta histórico de dor lombar irradiada\nposteriormente até a região plantar em membro inferior direito.\nAtualmente queixa-se ainda de incontinência urinária, parestesia\ne falseio em membro inferior direito durante a marcha.\nApós exame físico fisioterápico, foi observado parestesia e\nalteração de miótomos em regiões dos membros inferiores\ncorrespondentes às raízes nervosas L5, S1, S2. O médico da\nequipe solicitou uma ressonância magnética para identificação da\nseveridade da lesão em região lombar.\nSobre esse procedimento, assinale a afirmativa correta.", "alternativas": {"A": "O método de ressonância magnética é mais importante do que o exame físico para o correto diagnóstico do caso apresentado.", "B": "O exame complementar é sempre relevante em casos de dor lombar e deve sempre complementar o diagnóstico cinético funcional.", "C": "Na imagem de ressonância magnética, a hérnia apresenta-se com um sinal hiper intenso, isto é, mais claro.", "D": "Devido ao princípio físico que gera as imagens na ressonância magnética (radiação ionizante), esse é o melhor método para identificar lesões em partes moles e também ósseas.", "E": "Os sinais clínicos sugerem importante injúria neural nas raízes inferiores da região lombo-sacra que podem ser identificadas no corte transversal da imagem de ressonância magnética."}, "gabarito": "E", "fonte": "ENR FGV 2024/2025 Tipo 1", "area": "Neurofuncional"}, {"id": "ENR_FGV_2024_2025_Tipo_1_39", "numero": 39, "enunciado": "O câncer de cabeça e pescoço possui alta incidência no Brasil e\ntambém altas taxas de morbidade e de mortalidade. Em geral\nacomete os linfonodos localizados na região cervical, tornando o\nesvaziamento cervical um procedimento cirúrgico comumente\nutilizado.\nEsta abordagem realiza uma ressecção de estruturas importantes\npara a biomecânica do membro superior homolateral à cirurgia,\ncomo o músculo ECOM e a fascia ântero-lateral da região\ncervical. Clinicamente, pode-se observar com certa prevalência a\nsíndrome do ombro doloroso nesses pacientes.\nSobre os recursos fisioterapêuticos que devem ser utilizados na\nsíndrome do ombro doloroso pós esvaziamento cervical, assinale\na afirmativa correta.", "alternativas": {"A": "O calor superficial pode ser usado para reduzir o edema na região cervical e promover a tonificação dos músculos.", "B": "As técnicas de terapia manual podem ser usadas como um recurso para alívio da dor, por meio da estimulação mecânica dos tecidos.", "C": "A estimulação elétrica transcutânea (TENS) pode ser utilizada para diminuição do processo inflamatório pós-cirúrgico, reduzindo assim a necessidade de morfina.", "D": "A cinesioterapia é importante apenas no final do processo de reabilitação, pois visa melhorar a redução da amplitude de movimento articular e a instalação de deformidades.", "E": "O calor profundo é muito utilizado por interferir no ciclo dor- espasmo-dor e induzir o relaxamento muscular, podendo assim ser utilizado sem necessidade de contraindicação e/ou precaução."}, "gabarito": "B", "fonte": "ENR FGV 2024/2025 Tipo 1", "area": "Musculoesquelética"}, {"id": "ENR_FGV_2024_2025_Tipo_1_40", "numero": 40, "enunciado": "A Biomecânica clínica apoia-se na observação dos padrões de\nmovimento realizados pelos indivíduos para detecção de\npossíveis alterações do ato motor e consequente incapacidade\nfuncional.\nCom relação ao complexo articular do ombro, a observação e\navaliação do ritmo escápulo-umeral é importante para o\nfisioterapeuta ter um diagnóstico mais preciso a respeito das\nlesões insidiosas nesta região.\nSobre o ritmo escapulo-umeral, assinale a afirmativa correta.", "alternativas": {"A": "Pode ser definido como a relação entre o úmero e os músculos do manguito rotador.", "B": "É descrito como a relação desarmoniosa entre a movimentação da escápula e do úmero.", "C": "As lesões não traumáticas de manguito rotador geralmente não possuem relação com o ritmo escápulo-umeral.", "D": "Os pacientes com Síndrome do Impacto Subacromial experimentam piora do quadro sintomático quando há correção do ritmo escápulo-umeral.", "E": "É descrito como a sinergia de movimentos do úmero em relação à escápula durante movimentos funcionais."}, "gabarito": "E", "fonte": "ENR FGV 2024/2025 Tipo 1", "area": "Musculoesquelética"}, {"id": "ENR_FGV_2024_2025_Tipo_1_41", "numero": 41, "enunciado": "Paciente R. S. A, 38 anos, sofreu uma entorse de tornozelo direito\nnível I ao descer do ônibus.\nNo momento da avaliação fisioterápica ela queixou-se de edema,\ndor intensa no local do trauma e relatou que o fato havia\nacontecido a, aproximadamente, 48 horas. No dia anterior, o\nprofissional da emergência que a atendeu solicitou que ela\naplicasse gelo e procurasse um fisioterapeuta, já que a\nressonância magnética realizada não tinha mostrado nenhuma\nlesão ligamentar nem óssea. A paciente relata que precisa\nretornar o mais rápido possível às suas atividades e que ainda\nsente dor na região lateral do tornozelo.\nSobre a reabilitação da entorse de tornozelo descrita, assinale a\nafirmativa correta.", "alternativas": {"A": "O uso de ondas curtas é o recurso térmico mais indicado neste caso por se tratar de um processo inflamatório agudo.", "B": "O uso de infravermelho é o recurso térmico mais indicado neste caso pois devemos elevar a temperatura tecidual a fim de drenar o edema.", "C": "O uso da crioterapia não é indicado neste caso, pois sua efetividade é alta apenas nas primeiras 12 horas após lesão, principalmente para drenar o edema.", "D": "A manipulação articular deve ser realizada mesmo com um processo inflamatório ativo na região, pois irá colaborar com a drenagem linfática do local. A TENS pode também ser utilizada.", "E": "O protocolo de crioterapia, elevação, compressão local e repouso é a conduta adequada. A biofotomodulação pode também colaborar com o reparo tecidual nessa fase."}, "gabarito": "E", "fonte": "ENR FGV 2024/2025 Tipo 1", "area": "Neurofuncional"}, {"id": "ENR_FGV_2024_2025_Tipo_1_42", "numero": 42, "enunciado": "Alice, de 29 anos, vem se queixando de desconforto em membro\nsuperior direito ao realizar tarefas diárias, tais como, pentear\ncabelos, colocar brincos, escrever e digitar.\nDurante a anamnese foi verificada a presença de parestesia na\nmão direita, sendo mais intensa no 4º e 5º dedos. Na avaliação\nfisioterapêutica, o teste de miótomo apresentou-se normal, mas\no teste neurodinâmico apresentou-se positivo para o nervo ulnar.\nFoi observado ainda hipomobilidade articular entre C6 e C7 e\nhiperatividade muscular em trapézio superior e elevador da\nescápula.\nConsiderando este caso clínico, assinale a afirmativa correta.", "alternativas": {"A": "A mobilização articular da coluna cervical deve ser evitada, já que a queixa de dor é no membro superior.", "B": "A mobilização neural é uma contraindicação absoluta devido à presença da dor neuropática.", "C": "A mobilização articular e neural não podem ser realizadas nestes pacientes, pois irão piorar o quadro clínico.", "D": "O tratamento da hiperatividade muscular deve ser realizado primeiro, pois, automaticamente, haverá melhora da mobilidade articular e do deslizamento neural.", "E": "Os tratamentos da mobilidade articular e da hiperatividade muscular facilitarão o resgate da mobilidade do tecido neural. O deslizamento neural pode ser incrementado por meio da técnica de mobilização neural."}, "gabarito": "E", "fonte": "ENR FGV 2024/2025 Tipo 1", "area": "Geral"}, {"id": "ENR_FGV_2024_2025_Tipo_1_43", "numero": 43, "enunciado": "Os exames complementares são ferramentas importante para o\ndiagnóstico diferencial do fisioterapeuta, principalmente quando\nexistem lesões estruturais que comprometam estruturas\narticulares e tecidos moles.\nConsiderando as indicações, principais características e\nrespectivas representações teciduais nos métodos de exames\ncomplementares voltados para identificação de lesões\nmusculoesqueléticas, assinale a afirmativa correta.", "alternativas": {"A": "A imagem de Ressonância Magnética apresenta boa acurácia para avaliar tecidos moles e o diagnóstico de uma hérnia de disco pode ser confirmado com identificação de uma imagem hipointensa que diminui o espaço do canal medular e comprime o saco dural.", "B": "Uma fratura óssea pode ser identificada na radiografia como uma imagem radiopaca em meio à representação do tecido ósseo, já que este, normalmente, é radiotrasparente.", "C": "A ultrassonografia pode auxiliar na identificação de lesões musculares. As lesões grau II, geralmente apresentam imagens hiperecoicas, que são associadas à coleção de líquido inflamatório.", "D": "A radiografia é adequada para estudar lesões ósseas e possui também boa acurácia para identificar lesões nos discos intervertebrais e processos inflamatórios nos tendões do manguito rotador.", "E": "A Tomografia Computadorizada (TC) só consegue fornecer imagens adequadas de músculos, ossos e articulações quando é realizada com o meio de contraste. Na TC, a representação normal do tecido ósseo é identificada nos laudos como uma estrutura hipodensa."}, "gabarito": "A", "fonte": "ENR FGV 2024/2025 Tipo 1", "area": "Musculoesquelética"}, {"id": "ENR_FGV_2024_2025_Tipo_1_44", "numero": 44, "enunciado": "Na consulta inicial com o fisioterapeuta, a paciente recentemente\noperada de câncer de mama apresentou sinais de linfedema no\nbraço do lado em que foi realizada a cirurgia. Após\nconscientização da paciente quanto ao seu quadro clínico, foi\niniciado tratamento fisioterapêutico.\nSobre o tratamento adequado, para maior efetividade clínica,\nassinale a afirmativa correta.", "alternativas": {"A": "Realizar massagem profunda no braço afetado para estimular o fluxo linfático e fortalecimento muscular com sobrecarga leve.", "B": "Realizar exercícios de propriocepção de membros superiores e estimular o auto enfaixamento do membro afetado.", "C": "Realizar drenagem linfática e recomendar ao paciente que evite o uso de compressão elástica no braço afetado para evitar possíveis infecções de pele.", "D": "Realizar exercícios de fortalecimento muscular com sobrecarga leve para o membro superior afetado e estimular o auto enfaixamento do membro.", "E": "Realizar técnicas de drenagem linfática manual, mobilização passiva no ombro do lado do membro acometido e enfeixamento elástico no membro afetado."}, "gabarito": "E", "fonte": "ENR FGV 2024/2025 Tipo 1", "area": "Musculoesquelética"}, {"id": "ENR_FGV_2024_2025_Tipo_1_45", "numero": 45, "enunciado": "A marcha humana é o conjunto de padrões de movimentos que\nnecessitam de diferentes sinergismos musculares em fases\nespecíficas. O conhecimento destas fases e sub-fases é\nfundamental para a avaliação clínica do fisioterapeuta.\nNeste sentido, assinale a afirmativa correta.", "alternativas": {"A": "A fase de apoio representa, aproximadamente, 70% do ciclo da marcha humana e a fase de balanço 30%; os principais músculos atuantes na subfase denominada balanço inicial, são gastrocnêmios, isquiostibiais e iliopsoas.", "B": "A fase de apoio representa aproximadamente 62% do ciclo da marcha humana e a fase de balanço 38%; o principal músculo estabilizador da articulação coxo-femoral, na sub-fase denominada apoio simples, é o glúteo médio.", "C": "A fase de apoio representa aproximadamente 40% do ciclo da marcha humana e a fase de balanço, 60%; os principais músculos atuantes na subfase denominada balanço médio, são o tibial anterior, o quadríceps e o bíceps da coxa.", "D": "O tronco e a cintura escapular devem participar passivamente da marcha, contribuindo, especificamente, para a fase de apoio, que representa aproximadamente 38% do ciclo da marcha humana; os principais músculos atuantes nessa fase são o tibial anterior, o quadríceps e o iliopsoas.", "E": "A marcha claudicante pode ser usualmente desenvolvida por pacientes que apresentam comprometimento do músculo quadrado lombar e glúteo médio; nesses casos, os pacientes apresentam ampliação da fase de balanço e diminuição da fase de apoio no membro contralateral ao lesionado."}, "gabarito": "B", "fonte": "ENR FGV 2024/2025 Tipo 1", "area": "Geral"}, {"id": "ENR_FGV_2024_2025_Tipo_1_46", "numero": 46, "enunciado": "Durante a avaliação de um paciente internado em uma unidade\nhospitalar, o fisioterapeuta identificou a seguinte queixa de um\npaciente: “Quando me viro na maca e respiro fundo, sinto dores\nno meio das costas. A dor é bem localizada e em pontada. Essa\nqueixa começou três dias depois da minha internação e já estou\naqui há 5 dias, aguardando minha cirurgia para retirada de um\nnódulo benigno na vesícula.”\nO exame físico e o laboratorial de rotina não revelaram nenhum\nprocesso inflamatório nem quadro infeccioso. A radiografia de\ntórax não evidenciou nenhuma alteração pulmonar. Todos os\nsinais vitais estavam dentro dos parâmetros de normalidade.\nConsiderando o caso clínico, assinale a opção que indica os\nprocedimentos adequados e as orientações fisioterapêuticas\ncorretas para esse paciente.", "alternativas": {"A": "Melhorar a dor e evitar movimentação no leito. Avaliar ainda se existe alguma restrição em diafragma e infecção oculta. O fisioterapeuta deve orientar o paciente a permanecer em repouso no leito e evitar posição ortostática.", "B": "Realizar exercícios de inspiração forçada e avaliar se existe alguma infecção pulmonar oculta. Deve, ainda, orientar o paciente a realizar exercícios de deambulação no corredor do hospital e permanecer em decúbito ventral a maior parte do dia.", "C": "O fisioterapeuta deve solicitar nova radiografia de tórax antes mesmo de avaliar o paciente, para excluir possíveis lesões articulares ou até mesmo pulmonares. Deve informar ao paciente que qualquer conduta só pode ser realizada após o resultado da radiografia.", "D": "Realizar técnicas com ciclo-ergômetro, objetivando ganhar condicionamento e mobilidade da cintura escapular. A dor aguda pode ser controlada com a utilização de calor superficial e exercícios para fortalecimento de abdômen. Orientar o paciente a permanecer em repouso, quando não estiver com a equipe de fisioterapia.", "E": "Avaliar se existe alguma restrição de mobilidade nas costelas e na coluna torácica. Deve ser avaliada a intensidade do quadro doloroso, possível diminuição da expansibilidade torácica e da força do diafragma, a fim de evitar complicações pulmonares. Deve orientar o paciente a se movimentar moderadamente, evitando apenas os movimentos que causam dor."}, "gabarito": "E", "fonte": "ENR FGV 2024/2025 Tipo 1", "area": "Neurofuncional"}, {"id": "ENR_FGV_2024_2025_Tipo_1_47", "numero": 47, "enunciado": "As artroplastias totais de joelho necessitam de cuidados\nespecíficos de acordo com cada fase do processo de reabilitação.\nTanto na fase de proteção máxima, quanto na proteção\nmoderada e retorno à função, a fisioterapia deve atuar por meio\nde técnicas específicas e de orientações ao paciente.\nSobre a fase de proteção máxima, assinale a opção que\napresenta, corretamente, as abordagens fisioterapêuticas.", "alternativas": {"A": "Mobilização patelar, fortalecimento em cadeia fechada e treino de marcha.", "B": "Fortalecimento de músculos proximais, mobilização patelar e treinamento proprioceptivo.", "C": "Enfaixamento compressivo para controlar a dor e manipulação patelar.", "D": "Enfaixamento compressivo para controlar o edema e fortalecimento com isometria em cadeia aberta.", "E": "Fortalecimento em cadeia fechada e treinamento de marcha sem dispositivo auxiliar."}, "gabarito": "D", "fonte": "ENR FGV 2024/2025 Tipo 1", "area": "Musculoesquelética"}, {"id": "ENR_FGV_2024_2025_Tipo_1_48", "numero": 48, "enunciado": "A amputação de um membro é um procedimento cirúrgico que\nembora possa salvar a vida do paciente, é sempre extremamente\ntraumática. O fisioterapeuta deve atuar ao longo de todas as\netapas do processo de reabilitação e oferecer um cuidado\ncentrado no paciente, para que os objetivos possam ser traçados\nem conjunto.\nQuanto à amputação, assinale a afirmativa correta.", "alternativas": {"A": "A principal meta do período pós-cirúrgico é determinar a adequação do paciente para a protetização.", "B": "As contraturas leves, moderadas ou graves em flexão de quadril ou joelho respondem bem à mobilização passiva e aos exercícios resistidos.", "C": "O coto do membro amputado, mesmo apresentando grande sensibilidade e hipotônia, não deve ser um elemento impeditivo para a protetização.", "D": "O indivíduo com amputação transtibial possui maior prevalência de dor fantasma, mas esse fenômeno usualmente desaparece logo nas primeiras semanas após a amputação.", "E": "A dor no membro fantasma pode surgir após a amputação e ocorre em, aproximadamente, 90% dos casos, mas apenas nas amputações traumáticas."}, "gabarito": "A", "fonte": "ENR FGV 2024/2025 Tipo 1", "area": "Musculoesquelética"}, {"id": "ENR_FGV_2024_2025_Tipo_1_49", "numero": 49, "enunciado": "Para uma avaliação cinético-funcional das diferentes condições\nmusculoesqueléticas, é necessário que o fisioterapeuta conheça\nos músculos do corpo humano e suas funções.\nQuanto aos músculos do tronco e membros inferiores,\nconsiderando suas respectivas ações, assinale a afirmativa\ncorreta.", "alternativas": {"A": "Os músculos flexores primários do quadril são iliopsoas, tensor da fáscia lata, quadríceps e grácil.", "B": "Os músculos ísquisos tibiais e tibial anterior são flexores primários do joelho.", "C": "Os músculos adutores primários do quadril são adutor longo, adutor curto, pectíneo, grácil, adutor magno e glúteo máximo.", "D": "O músculo reto do abdômen e o transverso do abdômen realizam flexão do tronco e também colaboram com a estabilização da coluna lombar.", "E": "Os músculos rotadores mediais primários do quadril são glúteo máximo, piriforme, obturador interno, gêmeo superior, gêmeo inferior, quadrado femoral e sartório."}, "gabarito": "D", "fonte": "ENR FGV 2024/2025 Tipo 1", "area": "Musculoesquelética"}, {"id": "ENR_FGV_2024_2025_Tipo_1_50", "numero": 50, "enunciado": "Durante a realização de uma avaliação fisioterapêutica o\nexaminador deve ficar atento a qualquer indício de sinais e\nsintomas denominados bandeira vermelha. Estes sinais podem\nindicar que a disfunção não é musculoesquelética ou que se trata\nde uma condição de saúde mais grave. Nesses casos, recomenda-\nse o encaminhamento para um profissional especializado da área.\nAssinale a opção que indica sintomas que podem ser\nidentificados como bandeiras vermelhas.", "alternativas": {"A": "Cefaleia e parestesia em membro superior.", "B": "Dor noturna persistente e perda de peso inexplicável.", "C": "Dor e parestesia em região posterior de membro inferior.", "D": "Expressão facial de sofrimento durante movimentos diários e déficit de equilíbrio.", "E": "Dor de intensidade 7 (na escala numérica de dor) e restrição de movimento para realizar flexão cervical."}, "gabarito": "B", "fonte": "ENR FGV 2024/2025 Tipo 1", "area": "Geral"}, {"id": "ENR_FGV_2024_2025_Tipo_1_51", "numero": 51, "enunciado": "Paciente do sexo masculino, 41 anos, sofreu fratura de Colles e\nrealizou intervenção cirúrgica para correção dos danos\nestruturais. Seis semanas após a cirurgia o paciente ainda se\nqueixa de dor e de grande dificuldade para realizar movimentos\nfuncionais.\nAo exame físico foi observado: arco de movimento passivo para\nextensão de punho de 10o; cicatriz sem sinais flogísticos, mas já\naderente; dor moderada (Escala Numérica de Dor = 5 pontos);\nforça muscular para preensão palmar grau III.\nConsiderando as possibilidades terapêuticas para esse caso,\nassinale a opção que apresenta a conduta mais adequada.", "alternativas": {"A": "Calor profundo, pois sua utilização irá produzir vasoconstrição, melhora do edema e da dor.", "B": "Eletroterapia, pois as técnicas de mobilização passiva são contraindicadas nessa fase do tratamento.", "C": "Calor superficial, pois atua no mecanismo de hipóxia secundária, diminuindo o metabolismo basal nas áreas circunscritas à lesão.", "D": "Crioterapia, pois nessa fase da lesão, a vasoconstricção e a redução da velocidade de condução dos impulsos nervosos melhorarão a amplitude de movimento.", "E": "Cinesioterapia com utilização de técnicas de mobilização passiva e recrutamento muscular. Tais abordagens possuem efeito analgésico, promovem o aumento da extensibilidade tecidual e o controle de movimento."}, "gabarito": "E", "fonte": "ENR FGV 2024/2025 Tipo 1", "area": "Neurofuncional"}, {"id": "ENR_FGV_2024_2025_Tipo_1_52", "numero": 52, "enunciado": "O conhecimento neuroanatômico é imprescindível para que o\nfisioterapeuta realize corretamente o exame e o diagnóstico\ncinético funcional.\nNos membros inferiores, o nervo tibial, um ramo do nervo\nisquiádico, tem um papel importante já que ele inerva músculos\nresponsáveis pela mobilidade do tornozelo e do pé.\nAssinale a opção que apresenta as alterações que a lesão do\nnervo tibial pode provocar.", "alternativas": {"A": "Fraqueza do músculo tibial anterior e alteração sensitiva na face medial da perna.", "B": "Fraqueza do músculo tibial posterior e alteração sensitiva na região plantar do pé.", "C": "Fraqueza do músculo fibular longo e alteração sensitiva na região dorsal do pé.", "D": "Fraqueza dos músculos interósseos e alteração sensitiva no dorso e lateral do pé.", "E": "Fraqueza do músculo sóleo e alteração sensitiva na face lateral da perna."}, "gabarito": "B", "fonte": "ENR FGV 2024/2025 Tipo 1", "area": "Neurofuncional"}, {"id": "ENR_FGV_2024_2025_Tipo_1_53", "numero": 53, "enunciado": "Em uma unidade básica de saúde do Sistema Único de Saúde\n(SUS), uma equipe multiprofissional está discutindo estratégias\npara melhorar o atendimento aos pacientes. Entre os\nprofissionais presentes, está o fisioterapeuta, que busca ampliar\nsua atuação na atenção básica.\nA respeito das atribuições do fisioterapeuta nesse contexto\nespecífico da atenção básica, assinale a afirmativa correta.", "alternativas": {"A": "Oferecer orientações e o tratamento para doenças agudas e graves.", "B": "Realizar intervenções pontuais em pacientes com lesões musculoesqueléticas.", "C": "Garantir atendimento especializado voltado para o tratamento de agravos agudos e crônicos.", "D": "Realizar ações de promoção à saúde e prevenção de incapacidades, visando à integralidade do cuidado e melhoria da qualidade de vida dos usuários.", "E": "Colaborar para a maior resolutividade do sistema, oferecendo atendimento de reabilitação pós-operatória."}, "gabarito": "D", "fonte": "ENR FGV 2024/2025 Tipo 1", "area": "Saúde Coletiva / SUS"}, {"id": "ENR_FGV_2024_2025_Tipo_1_54", "numero": 54, "enunciado": "Maria, uma paciente de 45 anos, procura atendimento\nfisioterapêutico em uma clínica particular, devido a dores\nlombares persistentes. Ela relata que as dores começaram há\ncerca de seis meses, após uma queda no trabalho. Além das\ndores físicas, Maria está emocionalmente abalada devido à perda\nde mobilidade e às dificuldades para realizar suas atividades\ndiárias.\nNessa situação, seria indicado o modelo biopsicossocial de\natenção à saúde. Quanto à abordagem do fisioterapeuta com a\nutilização desse modelo, assinale a afirmativa correta.", "alternativas": {"A": "Considerar não apenas os aspectos físicos da dor, mas também as variáveis psicológicas e sociais que podem influenciar na experiência de dor do paciente.", "B": "Realizar técnicas de terapia manual, treinamento físico com sobrecarga, estratégias de relaxamento e intervenções psicológicas, como terapia cognitivo-comportamental.", "C": "Na avaliação inicial, investigar os sintomas físicos associados à dor lombar e iniciar o tratamento. Caso o paciente não melhore nos primeiros atendimentos, deverá também realizar estudo dos fatores psicológicos da dor.", "D": "Avaliar os fatores de estresse no ambiente de trabalho e o suporte social disponível para o paciente, pois as técnicas de terapia manual são contra-indicadas para este perfil de paciente.", "E": "Oferecer atendimento baseado em eletroterapia e escuta qualificada do paciente. Caso haja cinesiofobia, as técnicas de terapia manual e cinesioterapia deverão ser utilizadas para que o paciente possa experimentar maior relaxamento."}, "gabarito": "A", "fonte": "ENR FGV 2024/2025 Tipo 1", "area": "Neurofuncional"}, {"id": "ENR_FGV_2024_2025_Tipo_1_55", "numero": 55, "enunciado": "Paulo, paciente de 50 anos, procura um fisioterapeuta com\nqueixa de dor no ombro direito que piora ao levantar o braço. Ele\nrelata que a dor começou após algumas semanas de trabalho\npesado no jardim.\nApós a avaliação clínica e o exame físico, o fisioterapeuta suspeita\nde discinesia escapular associada à síndrome do impacto\nsubacromial.\nPara maior efetividade, o tratamento fisioterapêutico deve estar\nvoltado para as seguintes estruturas anatômicas e variáveis\nbiomecânicas.", "alternativas": {"A": "Músculo redondo maior, articulação acômio-clavicular e ritmo cinético funcional.", "B": "Manguito rotador, cápsula articular gleno-umeral e ritmo escápulo-umeral.", "C": "Músculos do manguito rotador, músculo braquial e ritmo esterno-clavicular", "D": "Músculo romboide menor, cápsula articular escápulo-umeral e ritmo acrômio-clavicular.", "E": "Músculo romboide anterior, cápsula articular acrômio- clavicular e ritmo gleno-umeral."}, "gabarito": "B", "fonte": "ENR FGV 2024/2025 Tipo 1", "area": "Neurofuncional"}, {"id": "ENR_FGV_2024_2025_Tipo_1_56", "numero": 56, "enunciado": "Os cuidados paliativos fazem parte de uma abordagem\nterapêutica que segue os preceitos de humanização do SUS.\nRecentemente, o Ministério da Saúde lançou a política nacional\nde cuidados paliativos que propõe ações pautadas em três\neixos: a criação de equipes multiprofissionais para disseminar\npráticas para as demais equipes da rede; a promoção de\ninformação qualificada e a educação em cuidados paliativos; e a\ngarantia do acesso a medicamentos e insumos necessários a\nquem está em cuidados paliativos.\nConsiderando a política nacional de cuidados paliativos e os\nconhecimentos que o fisioterapeuta deve ter sobre o tema,\nassinale a afirmativa correta.", "alternativas": {"A": "São cuidados prestados a pacientes com diagnóstico de câncer que não querem mais continuar com o tratamento específico indicado para sua condição de saúde.", "B": "São cuidados que devem ser oferecidos apenas em unidades hospitalares, já que depende de uma equipe multiprofissional bem treinada.", "C": "São cuidados que objetivam a melhoria da qualidade de vida do paciente e seus familiares, diante de uma doença que ameace a vida, por meio da prevenção e alívio do sofrimento.", "D": "São cuidados que devem ser realizados precocemente para alívio da dor em pacientes terminais e que só podem ser iniciados após autorização dos familiares dos pacientes.", "E": "São cuidados que objetivam a melhoria da qualidade de vida do paciente já sem possibilidade terapêutica. Devem terminar imediatamente após o óbito do paciente, devido aos seus custos elevados."}, "gabarito": "C", "fonte": "ENR FGV 2024/2025 Tipo 1", "area": "Oncologia"}, {"id": "ENR_FGV_2024_2025_Tipo_1_57", "numero": 57, "enunciado": "Os trabalhadores de uma comunidade rural do interior do Estado\ndo Rio de Janeiro vêm apresentando alta incidência de lesões\nmusculoesqueléticas, devido às atividades físicas extenuantes\nrealizadas no campo.\nA equipe de saúde local, que inclui fisioterapeutas, está\ndesenvolvendo um programa de prevenção de lesões e\npromoção da saúde para essa população.\nConsiderando a abordagem da fisioterapia na atenção básica e\nsaúde coletiva, assinale a opção que apresenta a estratégia mais\napropriada para a situação apresentada.", "alternativas": {"A": "Oferta de sessões individuais de fisioterapia para os trabalhadores lesionados, focadas no alívio imediato da dor.", "B": "Distribuição de equipamentos de proteção individual, como cintos de apoio lombar para os trabalhadores agrícolas.", "C": "Avaliação ergonômica individualizada dos trabalhadores e encaminhamento para consulta especializada com médico ortopedista.", "D": "Realização de palestras educativas sobre ergonomia e técnicas de levantamento de peso para cada trabalhador agrícola.", "E": "Organização de grupos de exercícios comunitários para fortalecimento muscular, de alongamento e de ajustes de padrão de movimento."}, "gabarito": "E", "fonte": "ENR FGV 2024/2025 Tipo 1", "area": "Saúde Coletiva / SUS"}, {"id": "ENR_FGV_2024_2025_Tipo_1_58", "numero": 58, "enunciado": "Um paciente chega à clínica de fisioterapia com queixa de dor no\njoelho direito, especialmente ao subir escadas, e crepitação em\nquadril homolateral à queixa da dor.\nDurante a avaliação, o fisioterapeuta observou que o paciente\ntem um padrão de marcha com valgo excessivo do membro\ninferior durante a fase de apoio. Neste caso, o fisioterapeuta\ndeve saber que a estabilidade do quadril possivelmente está\ninfluenciando na queixa.\nAssinale a opção que indica as estruturas contráteis e não\ncontráteis, respectivamente, responsáveis pela estabilidade do\nquadril.", "alternativas": {"A": "O músculo transverso do abdômen e o ligamento acetabular.", "B": "O ligamento redondo e o músculo glúteo máximo.", "C": "O músculo glúteo médio e o lábio acetabular.", "D": "O músculo reto-femoral e o ligamento femoral.", "E": "O músculo transverso do abdômen e o tendão do glúteo médio."}, "gabarito": "C", "fonte": "ENR FGV 2024/2025 Tipo 1", "area": "Neurofuncional"}, {"id": "ENR_FGV_2024_2025_Tipo_1_59", "numero": 59, "enunciado": "Um atleta apresenta dor e instabilidade no tornozelo direito em\nconsequência de uma entorse durante uma partida de futebol.\nDurante a avaliação funcional, o fisioterapeuta observou uma\nfalha na habilidade do paciente de manter o equilíbrio em apoio\nunipodal com o tornozelo afetado.\nPara avaliar e quantificar a estabilidade dinâmica do tornozelo,\no fisioterapeuta escolheu o teste validado para avaliações\ncinético-funcionais dos membros inferiores. Assinale-o.", "alternativas": {"A": "Teste de Thompson.", "B": "Teste de McMurray.", "C": "Teste de Bump.", "D": "Teste Star Excursion Balance.", "E": "Teste de Lachman."}, "gabarito": "D", "fonte": "ENR FGV 2024/2025 Tipo 1", "area": "Musculoesquelética"}, {"id": "ENR_FGV_2024_2025_Tipo_1_60", "numero": 60, "enunciado": "Ao fazer um diagnóstico, o fisioterapeuta deve avaliar as variáveis\nintrínsecas do corpo humano e compreender que os sistemas são\nintegrados e interdependentes. Assim, na avaliação das queixas\nde dores na região torácica, ele deve considerar a biomecânica e\na interdependência das estruturas dessa região.\nNeste sentido, considerando as características anatômicas e\nbiomecânicas da região torácica, assinale a afirmativa correta.", "alternativas": {"A": "O movimento realizado pelas costelas inferiores do gradil costal na fase da inspiração não forçada é denominado alça de balde. Ele acontece devido ao músculo diafragma e à entrada de ar na caixa torácica.", "B": "O movimento realizado pelas costelas superiores do gradil costal na fase da inspiração não forçada é denominado braço de bomba. Ele acontece devido aos músculos intercostais e à entrada de ar na caixa torácica.", "C": "O movimento realizado pelas costelas inferiores do gradil costal na fase da inspiração forçada é denominado braço de bomba. Ele acontece devido ao músculo intercostal e ao esternocleidomastoideo.", "D": "O movimento realizado pelas costelas superiores do gradil costal na fase da expiração não forçada é denominado braço de bomba. Ele acontece devido ao músculo diafragma, ao oblíquo externo e ao oblíquo interno.", "E": "O movimento realizado pelas costelas superiores do gradil costal na fase da expiração forçada é denominado alça de balde. Ele acontece devido aos músculos diafragma, ao reto do abdômen, ao oblíquo externo e aos intercostais superiores."}, "gabarito": "A", "fonte": "ENR FGV 2024/2025 Tipo 1", "area": "Musculoesquelética"}, {"id": "ENR_FGV_2024_2025_Tipo_1_61", "numero": 61, "enunciado": "A Política Nacional de Saúde da Pessoa Idosa estabelece diretrizes\npara garantir atenção integral à saúde dos idosos. A fisioterapia é\num componente essencial nessa política.\nCom base nas diretrizes dessa política, assinale a opção que\napresenta uma atividade típica da fisioterapia na atenção à saúde\ndo idoso.", "alternativas": {"A": "Realização de atividades físicas em grupo, voltadas para melhora de performance de atletas idosos sem queixas de dor e incapacidade.", "B": "Realização de avaliações funcionais para identificar riscos de quedas e desenvolver estratégias preventivas personalizadas.", "C": "Prescrição de medicamentos para controle da dor e inflamação em idosos com condições crônicas, como artrite e osteoartrite.", "D": "Implementação de programas de reabilitação domiciliar para idosos com mobilidade reduzida, facilitando a recuperação da visão, da audição e do equilíbrio.", "E": "Desenvolvimento de orientações para cuidadores e familiares sobre a movimentação adequada dos idosos, além de oferecer tratamento para crises de ansiedade e depressão desses cuidadores."}, "gabarito": "B", "fonte": "ENR FGV 2024/2025 Tipo 1", "area": "Saúde Coletiva / SUS"}, {"id": "ENR_FGV_2024_2025_Tipo_1_62", "numero": 62, "enunciado": "A vigilância em saúde é um campo estratégico que abrange a\nprevenção, o controle e o monitoramento de doenças e agravos à\nsaúde, além da promoção de ambientes saudáveis. A fisioterapia,\nintegrada à vigilância em saúde, desempenha um papel\nimportante nesse contexto.\nCom base nas atividades típicas da vigilância em saúde, assinale a\nopção que apresenta uma conduta apropriada do fisioterapeuta.", "alternativas": {"A": "Prescrição de fitoterápicos e exercícios diafragmáticos para tratar infecções respiratórias em pacientes com condições crônicas.", "B": "Desenvolvimento de indicadores de saúde relacionados à sociedade moderna, contribuindo para a elaboração de políticas públicas.", "C": "Intervenção em ambientes nosocomiais para melhorar a qualidade do cuidado relacionado aos serviços de cirurgia que utilizam abordagem robótica.", "D": "Desenvolvimento de ações de promoção da saúde e prevenção de agravos para grupos vulneráveis, como idosos e pessoas com deficiência.", "E": "Realização de campanhas de conscientização sobre a prevenção de doenças mentais relacionadas ao trabalho e discussão de técnicas de tratamento."}, "gabarito": "D", "fonte": "ENR FGV 2024/2025 Tipo 1", "area": "Saúde Coletiva / SUS"}, {"id": "ENR_FGV_2024_2025_Tipo_1_63", "numero": 63, "enunciado": "Mulher, 35 anos, compareceu ao serviço de saúde com queixas\nde dor genital durante relações sexuais. Relatou que a dor já\npersiste de longa data, apresentando períodos de intensificação e\noutros de melhora do quadro. A dor acontece durante o ato\nsexual ou logo após o intercurso da relação sexual. O quadro\ndescrito tem grande prevalência e a fisioterapia vem tendo bons\nresultados no tratamento dessa condição de saúde.\nAssinale a opção que apresenta o nome clínico da queixa\napresentada pela paciente.", "alternativas": {"A": "Vaginismo.", "B": "Vulvodínia.", "C": "Anorgasmia.", "D": "Dispareunia.", "E": "Disfunção gênito-urinária."}, "gabarito": "D", "fonte": "ENR FGV 2024/2025 Tipo 1", "area": "Neurofuncional"}, {"id": "ENR_FGV_2024_2025_Tipo_1_64", "numero": 64, "enunciado": "Os ligamentos da articulação do joelho, quando sofrem algum\ntrauma, podem interferir diretamente na estabilidade. Alguns\ntestes específicos podem ser realizados para identificar\ninstabilidade articular e comprovar lesão ligamentar em\ndeterminadas estruturas.\nAssinale a opção que indica o nome específico do teste, a\nestrutura ligamentar avaliada e a repercussão biomecânica caso a\nlesão seja confirmada pelo teste.", "alternativas": {"A": "O teste de Lachman avalia o ligamento cruzado anterior. Caso positivo, identifica instabilidade anterior de joelho.", "B": "O teste de McEnroe avalia o ligamento menisco-femoral. Caso positivo, identifica instabilidade ântero-posterior.", "C": "O teste de estresse em varo avalia o ligamento colateral medial. Caso positivo, identifica instabilidade medial.", "D": "O teste de estresse em valgo avalia o ligamento colateral lateral. Caso positivo, identifica Instabilidade lateral.", "E": "O teste de Lachman avalia o ligamento cruzado posterior. Caso positivo, identifica Instabilidade póstero-lateral."}, "gabarito": "A", "fonte": "ENR FGV 2024/2025 Tipo 1", "area": "Musculoesquelética"}, {"id": "ENR_FGV_2024_2025_Tipo_1_65", "numero": 65, "enunciado": "O exercício terapêutico deve ser estimulado ao longo dos\nprogramas de reabilitação dos pacientes com dor crônica. Além\ndas repercussões nos tecidos periféricos, o movimento ainda é\ncapaz de modular a dor no sistema nervoso central.\nA educação sobre os movimentos que devem ser realizados pelos\npacientes ao longo da reabilitação deve ser constante para que\nhaja adesão ao tratamento e efetividade da abordagem\nterapêutica. Assim, exercitar-se quando existe um quadro de dor\ncrônica, é fundamental.\nAssinale a opção que apresenta os efeitos produzidos pelo\nexercício.", "alternativas": {"A": "Reduzir a inflamação periférica e a lubrificação intra-articular.", "B": "Aumentar a tensão neural e diminuir o limiar de dor dos pacientes.", "C": "Incrementar a força para realizar atividades funcionais e acelerar a transmissão dos impulsos de dor.", "D": "Melhorar o sono, modular os estímulos dolorosos e interferir nas áreas de produção de dor do cérebro.", "E": "Aumentar a qualidade do sono, estimular a diminuição da produção de líquido sinovial e estimular as áreas que reconhecem a dor no cérebro."}, "gabarito": "D", "fonte": "ENR FGV 2024/2025 Tipo 1", "area": "Musculoesquelética"}, {"id": "ENR_FGV_2024_2025_Tipo_1_66", "numero": 66, "enunciado": "A artroplastia de quadril é uma abordagem cirúrgica usualmente\nindicada quando existe grande desgaste articular. Devido à\nevolução das técnicas e materiais cirúrgicos, somados às técnicas\nfisioterapêuticas, o processo de reabilitação alcança ótimos\nresultados e, geralmente, garante excelentes níveis de\nfuncionalidade a articulação substituída.\nQuanto à artroplastia de quadril e às respectivas orientações para\ninício do processo de reabilitação, assinale a afirmativa correta.", "alternativas": {"A": "A flexão de quadril deve permanecer limitada a 120° durante as 7 primeiras semanas. A adução sem limitações é liberada após a primeira semana de cirurgia.", "B": "O paciente pode levantar-se no primeiro dia de pós- operatório, mas deve evitar carga no membro operado, assim como movimentos de flexão e de adução do quadril.", "C": "A artroplastia total do quadril é a substituição da cabeça do fêmur por uma prótese artificial e o programa de reabilitação deve ser iniciado ainda no hospital e continuar no ambulatório de fisioterapia.", "D": "O paciente, nas primeiras 48 horas, deve permanecer com o membro imobilizado e não deve realizar nenhuma troca de decúbito para evitar luxação da prótese.", "E": "O paciente, nos primeiros três dias, deve ter um travesseiro entre os membros inferiores ao virar-se para decúbito lateral, porque o membro operado pode realizar uma abdução durante o movimento."}, "gabarito": "B", "fonte": "ENR FGV 2024/2025 Tipo 1", "area": "Geral"}, {"id": "ENR_FGV_2024_2025_Tipo_1_67", "numero": 67, "enunciado": "Um paciente de 52 anos, sexo masculino, foi diagnosticado com\nELA há 3 anos. Hoje, depende de cadeira de rodas para\ndeslocamento primário, devido à fraqueza dos membros\ninferiores. Também apresenta fraqueza nos membros superiores,\no que dificulta a realização de atividades básicas de vida diária.\nApresenta ainda dificuldade na fala e deglutição, levando à\nnecessidade do uso de uma dieta líquida espessada. Ao exame,\napresenta atrofia muscular generalizada, reflexos diminuídos,\npadrão de fraqueza muscular distal maior que proximal. Funções\ncognitivas preservadas, com relato de fadiga e de dificuldades\nrespiratórias leves.\nAssinale a opção que indica, na fase intermediária do problema\ndesse paciente, o manejo adequado.", "alternativas": {"A": "Visitas domiciliares ou tele consultas, manter equipe de cuidados paliativos, gestão ativa dos sintomas (dor e dispneia) e traqueostomia.", "B": "Adaptação à fraqueza em evolução; manejar as complicações secundárias, gerir os sintomas bulbares progressivos e a educação de pacientes e cuidadores.", "C": "Usar equipamentos adaptativos para membros superiores para prolongar a execução independente e segura das atividades de esporte, lazer e gastrotomia.", "D": "Equipe de cuidados paliativos, fortalecimento e treino aeróbico, prescrever órteses de membro superior, equilíbrio entre repouso e atividade com técnicas de conservação de energia.", "E": "Avaliar o risco de quedas (se alto, modificar o ambiente), prescrever órteses de membro inferior, treino aeróbico, exercícios de resistência/fortalecimento e exercícios de equilíbrio."}, "gabarito": "B", "fonte": "ENR FGV 2024/2025 Tipo 1", "area": "Hospitalar / UTI"}, {"id": "ENR_FGV_2024_2025_Tipo_1_68", "numero": 68, "enunciado": "A doença de Menière apresenta uma tríade de sinais e sintomas:\nataques recorrentes de vertigem, déficit auditivo flutuante com\nzumbidos e pressão no ouvido do lado comprometido. Durante as\ncrises, ao exame físico, surgem o nistagmo horizonto-rotatório,\ndesequilíbrio e hipoacusia.\nSobre a reabilitação vestibular, programa de movimentos da\ncabeça, olhos e pescoço, assinale a afirmativa correta.", "alternativas": {"A": "Reduz a pressão arterial.", "B": "Melhora a acuidade visual.", "C": "Restaura a audição perdida.", "D": "Minimiza a ocorrência de surtos e remissões.", "E": "Reeduca o sistema de equilíbrio e gravidade."}, "gabarito": "E", "fonte": "ENR FGV 2024/2025 Tipo 1", "area": "Neurofuncional"}, {"id": "ENR_FGV_2024_2025_Tipo_1_69", "numero": 69, "enunciado": "A recuperação bem-sucedida do equilíbrio exige que o centro de\nmassa permaneça dentro dos limites da base de suporte. Esse\nmecanismo compensatório pode ser alcançado por diferentes\nestratégias de movimento (tornozelo, quadril, de passos).\nNormalmente, adultos usam a estratégia de tornozelo para\nrestabelecer o equilíbrio. Ao reduzir a base de apoio ou limitar o\nuso de informações sensoriais, a demanda postural é aumentada\n(superfície pequena ou de espuma). Para compensar esta maior\ndemanda no controle postural, o uso da estratégia do quadril\nseria apropriado porque proporciona maior estabilização.\nAssinale a opção que apresenta a estratégia de tratamento que\nmelhora o equilíbrio em pessoas com ataxia cerebelar.", "alternativas": {"A": "Incorporar exercícios em ambientes visuais desafiadores; realizar treinamento em superfícies instáveis; limitar o uso de dispositivos de apoio e manter as superfícies estáveis durante todo o tratamento.", "B": "Aplicar carga axial apenas nos estágios iniciais; usar dispositivos de apoio para uma base ampla; limitar o uso de diferentes condições de visão e implementar superfícies instáveis apenas em situações específicas.", "C": "Implementar carga axial apenas nos estágios avançados; começar com superfícies instáveis e manter o apoio externo constante; usar apenas estímulos visuais desafiadores e limitar o uso de diferentes condições de visão.", "D": "Começar com superfícies estáveis diminuindo, gradativamente, o apoio externo; utilizar carga axial como cintas ou coletes com pesos; utilizar diferentes condições de visão; progredir para superfícies instáveis e utilizar dupla tarefa.", "E": "Iniciar com superfícies instáveis e aumentar gradualmente o apoio externo para melhorar o equilíbrio; usar dispositivos de suporte para reduzir a carga nos membros inferiores; incorporar estímulos visuais desafiadores e realizar exercícios de dupla tarefa."}, "gabarito": "D", "fonte": "ENR FGV 2024/2025 Tipo 1", "area": "Musculoesquelética"}, {"id": "ENR_FGV_2024_2025_Tipo_1_70", "numero": 70, "enunciado": "Estimulação Transcraniana por Corrente Contínua (ETCC) é uma\ntécnica não invasiva de neuromodulação que envolve a aplicação\nde uma corrente elétrica de baixa intensidade diretamente sobre\no couro cabeludo.\nDurante a ETCC, eletrodos são posicionados sobre a superfície do\ncouro cabeludo, acima de áreas relevantes para a condição\ntratada. A corrente elétrica contínua é então aplicada através\ndesses eletrodos, alterando a excitabilidade neuronal na área\nalvo, ou seja, aumentando ou diminuindo a excitabilidade dos\nneurônios. O objetivo principal dessa modalidade terapêutica é\nmodular o potencial plástico do encéfalo, auxiliando na\nrecuperação motora dos pacientes.\nPara esse caso, assinale a opção que indica o correto\nposicionamento dos eletrodos conforme seu objetivo.", "alternativas": {"A": "O eletrodo anódico deve ser posicionado sobre a área em que o fisioterapeuta deseja provocar aumento de excitabilidade.", "B": "O eletrodo catódico deve ser posicionado sobre a área em que o fisioterapeuta deseja provocar aumento de excitabilidade.", "C": "O eletrodo anódico deve ser posicionado sobre a área em que o fisioterapeuta deseja provocar diminuição de excitabilidade.", "D": "Ambos os eletrodos devem ser posicionados sobre a área na qual o fisioterapeuta deseja provocar diminuição de excitabilidade.", "E": "O eletrodo anódico deve ser posicionado na área oposta à região na qual o fisioterapeuta deseja provocar aumento de excitabilidade."}, "gabarito": "A", "fonte": "ENR FGV 2024/2025 Tipo 1", "area": "Geral"}, {"id": "ENR_FGV_2024_2025_Tipo_1_71", "numero": 71, "enunciado": "O sistema somatossensorial, que engloba a sensibilidade\nsuperficial (dor e temperatura, por exemplo) e a profunda\n(propriocepção e vibração, por exemplo), desempenha um papel\ncrucial na recuperação das sequelas motoras e da funcionalidade\ndecorrentes de lesões encefálicas. Sendo assim, é importante que\no fisioterapeuta faça uso de instrumentos de avaliação para\ninvestigar a presença dessas alterações.\nAssinale a opção que apresenta corretamente um exemplo de\ninstrumento de avaliação da sensibilidade.", "alternativas": {"A": "Escala de Ashworth modificada.", "B": "Teste de reflexos.", "C": "Escala de equilíbrio de Berg.", "D": "UPDRS parte III.", "E": "Sessão de sensibilidade da escala Fulgh-Meyer."}, "gabarito": "E", "fonte": "ENR FGV 2024/2025 Tipo 1", "area": "Geral"}, {"id": "ENR_FGV_2024_2025_Tipo_1_72", "numero": 72, "enunciado": "Um paciente de 18 anos, sexo masculino, sofreu fratura da coluna\ncervical após mergulhar em águas rasas. Permaneceu internado\npor 3 meses, devido a infeções de repetição, até a cirurgia ser\nrealizada.\nAo receber alta hospitalar, foi encaminhado ao ambulatório de\num serviço de Fisioterapia Neurofuncional. Ao exame, a escala de\nincapacidade da asia foi determinada como B, nível neurológico\nC5.\nA partir dessa descrição, sobre o quadro motor/sensitivo\napresentado e as atividades que o paciente seria capaz de\nrealizar, se treinado, assinale a afirmativa correta.", "alternativas": {"A": "Ausência de função motora ou sensitiva em S4-S5. Capaz de auxiliar no banho, alimentação, escrita e autocuidado com ou sem adaptações.", "B": "Função sensitiva em S4-S5 preservada, mas não a motora. Capaz de auxiliar no banho, alimentação, escrita e autocuidado com adaptações, sem necessidade de estabilizador de punho.", "C": "Ausência de função motora ou sensitiva em S4-S5. Capaz de segurar objetos com extensão de punho após tenodese funcional e auxiliar nas transferências com o uso do tríceps para extensão do cotovelo.", "D": "Função sensitiva em S4-S5 e função motora em mais de 3 níveis abaixo do nível motor ou função motora em S4-S5. Capaz de auxiliar no banho, alimentação, escrita e autocuidado com ou sem adaptações.", "E": "Função sensitiva em S4-S5 preservada, mas não a motora. Capaz de rolar com o uso de alavanca em flexão do cotovelo, levar o garfo à boca e realizar tarefas de cuidados pessoais com o uso de uma órtese para estabilizar o punho."}, "gabarito": "E", "fonte": "ENR FGV 2024/2025 Tipo 1", "area": "Musculoesquelética"}, {"id": "ENR_FGV_2024_2025_Tipo_1_73", "numero": 73, "enunciado": "Um paciente do sexo feminino, 50 anos, sofreu um AVC\nisquêmico que afetou a região motora e provocou espasticidade\ne fraqueza dos músculos antigravitacionais do membro superior\ndireito e perda da destreza manual. Sua queixa funcional é não\nconseguir alcançar e agarrar objetos com o membro superior\nafetado. Para alcançar tal objetivo, é necessário que o\nfisioterapeuta utilize um processo estruturado de análise de\nproblemas de movimento do membro superior, identificando os\ndesvios cinemáticos (compensações e componentes essenciais\nfaltantes) e formular hipóteses sobre as possíveis deficiências\npara propor estratégias de tratamentos. Assim, conhecer a\nbiomecânica normal dos movimentos de alcance (transporte),\npreensão e manipulação manual é essencial.\nA respeito da biomecânica normal destes movimentos, assinale a\nafirmativa correta.", "alternativas": {"A": "A mão começa a se
